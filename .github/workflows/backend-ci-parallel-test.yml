name: Backend CI - Parallel Test

on:
  pull_request:
    branches: [develop, feature/phase-7-parallel-workflow]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-parallel-test.yml'

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # STAGE 1: Change Detection (Fast, under 1 minute)
  # ============================================================================
  # Detects which services/modules changed to enable selective test execution.
  # Outputs: 20+ service-specific flags for fine-grained job conditioning
  # ============================================================================
  change-detection:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend-changed: ${{ steps.filter.outputs.backend }}
      infrastructure-changed: ${{ steps.filter.outputs.infrastructure }}
      gradle-changed: ${{ steps.filter.outputs.gradle }}
      shared-changed: ${{ steps.filter.outputs.shared }}
      approval-service-changed: ${{ steps.filter.outputs['approval-service'] }}
      agent-builder-service-changed: ${{ steps.filter.outputs['agent-builder-service'] }}
      agent-runtime-service-changed: ${{ steps.filter.outputs['agent-runtime-service'] }}
      audit-query-service-changed: ${{ steps.filter.outputs['audit-query-service'] }}
      care-gap-service-changed: ${{ steps.filter.outputs['care-gap-service'] }}
      care-gap-event-service-changed: ${{ steps.filter.outputs['care-gap-event-service'] }}
      cdr-processor-service-changed: ${{ steps.filter.outputs['cdr-processor-service'] }}
      cql-engine-changed: ${{ steps.filter.outputs['cql-engine'] }}
      event-router-service-changed: ${{ steps.filter.outputs['event-router-service'] }}
      fhir-service-changed: ${{ steps.filter.outputs['fhir-service'] }}
      patient-service-changed: ${{ steps.filter.outputs['patient-service'] }}
      patient-event-service-changed: ${{ steps.filter.outputs['patient-event-service'] }}
      quality-service-changed: ${{ steps.filter.outputs['quality-service'] }}
      quality-measure-event-service-changed: ${{ steps.filter.outputs['quality-measure-event-service'] }}
      clinical-workflow-service-changed: ${{ steps.filter.outputs['clinical-workflow-service'] }}
      gateway-services-changed: ${{ steps.filter.outputs['gateway-services'] }}
      event-services-changed: ${{ steps.filter.outputs['event-services'] }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            infrastructure:
              - '.github/workflows/**'
              - 'backend/build.gradle.kts'
              - 'docker-compose.yml'
            gradle:
              - 'backend/gradle.properties'
              - 'backend/gradle/**'
              - 'backend/settings.gradle.kts'
            shared:
              - 'backend/modules/shared/**'
            approval-service:
              - 'backend/modules/services/approval-service/**'
            agent-builder-service:
              - 'backend/modules/services/agent-builder-service/**'
            agent-runtime-service:
              - 'backend/modules/services/agent-runtime-service/**'
            audit-query-service:
              - 'backend/modules/services/audit-query-service/**'
            care-gap-service:
              - 'backend/modules/services/care-gap-service/**'
            care-gap-event-service:
              - 'backend/modules/services/care-gap-event-service/**'
              - 'backend/modules/services/care-gap-event-handler-service/**'
            cdr-processor-service:
              - 'backend/modules/services/cdr-processor-service/**'
            cql-engine:
              - 'backend/modules/services/cql-engine-service/**'
            event-router-service:
              - 'backend/modules/services/event-router-service/**'
            fhir-service:
              - 'backend/modules/services/fhir-service/**'
              - 'backend/modules/services/fhir-event-bridge-service/**'
            patient-service:
              - 'backend/modules/services/patient-service/**'
            patient-event-service:
              - 'backend/modules/services/patient-event-service/**'
              - 'backend/modules/services/patient-event-handler-service/**'
            quality-service:
              - 'backend/modules/services/quality-measure-service/**'
            quality-measure-event-service:
              - 'backend/modules/services/quality-measure-event-service/**'
              - 'backend/modules/services/quality-measure-event-handler-service/**'
            clinical-workflow-service:
              - 'backend/modules/services/clinical-workflow-service/**'
              - 'backend/modules/services/clinical-workflow-event-service/**'
              - 'backend/modules/services/clinical-workflow-event-handler-service/**'
            gateway-services:
              - 'backend/modules/services/gateway-**'
            event-services:
              - 'backend/modules/services/**-event-service/**'
              - 'backend/modules/services/**-event-handler-service/**'

      - name: Print Detection Results
        run: |
          echo "=== Change Detection Results ==="
          echo "Infrastructure: ${{ steps.filter.outputs.infrastructure }}"
          echo "Gradle Config: ${{ steps.filter.outputs.gradle }}"
          echo "Shared Modules: ${{ steps.filter.outputs.shared }}"
          echo "Patient Service: ${{ steps.filter.outputs['patient-service'] }}"
          echo "Care Gap Service: ${{ steps.filter.outputs['care-gap-service'] }}"
          echo "Quality Service: ${{ steps.filter.outputs['quality-service'] }}"
          echo "FHIR Service: ${{ steps.filter.outputs['fhir-service'] }}"
          echo "CQL Engine: ${{ steps.filter.outputs['cql-engine'] }}"
          echo "Event Services: ${{ steps.filter.outputs['event-services'] }}"
          echo "Backend (any): ${{ steps.filter.outputs.backend }}"

  # ============================================================================
  # STAGE 2: Build (Required by all test jobs)
  # ============================================================================
  # Builds all backend modules without running tests.
  # Output: build artifacts uploaded for test jobs to download.
  # Dependencies: change-detection
  # ============================================================================
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: change-detection
    timeout-minutes: 30
    if: |
      needs.change-detection.outputs.backend-changed == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle.kts', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Gradle dependencies
        working-directory: backend
        run: ./gradlew downloadDependencies --no-daemon --console=plain

      - name: Build all services
        working-directory: backend
        run: ./gradlew build -x test --no-daemon --console=plain
        env:
          SPRING_PROFILES_ACTIVE: ci

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/build/
            backend/modules/*/build/
            backend/shared/*/build/
          retention-days: 1
          if-no-files-found: warn

  # ============================================================================
  # STAGE 3A: Parallel Test Jobs (All start after build)
  # ============================================================================
  # Four independent test jobs running in parallel:
  # - test-unit: Unit tests only (approximately 1 minute)
  # - test-fast: Unit + fast integration tests (approximately 2 minutes)
  # - test-integration: Full integration tests with PostgreSQL, Redis (approximately 3 minutes)
  # - test-slow: Slow/heavyweight tests with full infrastructure (approximately 5 minutes)
  # ============================================================================

  test-unit:
    name: Test - Unit Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    if: |
      ${{ needs.build.result == 'success' || needs.build.result == 'skipped' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew testUnit --no-daemon --console=plain --continue
        env:
          SPRING_PROFILES_ACTIVE: ci

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-unit-results
          path: backend/**/build/test-results/
          retention-days: 7

  test-fast:
    name: Test - Fast Integration Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    if: |
      ${{ needs.build.result == 'success' || needs.build.result == 'skipped' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthdata
          POSTGRES_PASSWORD: healthdata123
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run fast integration tests
        working-directory: backend
        run: ./gradlew testFast --no-daemon --console=plain --continue
        env:
          SPRING_PROFILES_ACTIVE: ci,test
          DATABASE_URL: jdbc:postgresql://localhost:5432/test_db
          DATABASE_USERNAME: healthdata
          DATABASE_PASSWORD: healthdata123
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload fast test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-fast-results
          path: backend/**/build/test-results/
          retention-days: 7

  test-integration:
    name: Test - Integration Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    if: |
      ${{ needs.build.result == 'success' || needs.build.result == 'skipped' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthdata
          POSTGRES_PASSWORD: healthdata123
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run integration tests
        working-directory: backend
        run: ./gradlew integrationTest --no-daemon --console=plain --continue
        env:
          SPRING_PROFILES_ACTIVE: ci,test
          DATABASE_URL: jdbc:postgresql://localhost:5432/test_db
          DATABASE_USERNAME: healthdata
          DATABASE_PASSWORD: healthdata123
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-integration-results
          path: backend/**/build/test-results/
          retention-days: 7

  test-slow:
    name: Test - Slow/Heavyweight Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 35
    if: |
      ${{ needs.build.result == 'success' || needs.build.result == 'skipped' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthdata
          POSTGRES_PASSWORD: healthdata123
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9092:9092

      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        options: >-
          --health-cmd "echo ruok | nc localhost 2181"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 2181:2181

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run slow/heavyweight tests
        working-directory: backend
        run: ./gradlew testSlow --no-daemon --console=plain --continue
        env:
          SPRING_PROFILES_ACTIVE: ci,test
          DATABASE_URL: jdbc:postgresql://localhost:5432/test_db
          DATABASE_USERNAME: healthdata
          DATABASE_PASSWORD: healthdata123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload slow test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-slow-results
          path: backend/**/build/test-results/
          retention-days: 7

  # ============================================================================
  # STAGE 3B: Parallel Validation Jobs (All start after build)
  # ============================================================================
  # Three independent validation jobs running in parallel:
  # - validate-database: Entity-migration synchronization + Liquibase validation
  # - security-scan: SAST, dependency checks, vulnerability scanning
  # - code-quality: SonarQube analysis
  # ============================================================================

  validate-database:
    name: Validate - Database & Entity Migrations
    runs-on: ubuntu-latest
    needs: [change-detection, build]
    timeout-minutes: 20
    if: |
      ${{ (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.change-detection.outputs.shared-changed == 'true' ||
           needs.change-detection.outputs.backend-changed == 'true' ||
           github.event_name == 'push') }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthdata
          POSTGRES_PASSWORD: healthdata123
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run entity-migration validation tests
        working-directory: backend
        run: |
          echo "Running entity-migration synchronization tests..."
          ./gradlew test --tests "*EntityMigrationValidationTest" --no-daemon --console=plain
        env:
          SPRING_PROFILES_ACTIVE: ci
          DATABASE_URL: jdbc:postgresql://localhost:5432/test_db
          DATABASE_USERNAME: healthdata
          DATABASE_PASSWORD: healthdata123

      - name: Validate Liquibase rollback coverage
        working-directory: backend
        run: |
          echo "Validating all migrations have rollback directives..."

          MISSING_ROLLBACK=$(find . -name "*.xml" -path "*/db/changelog/*" \
            -exec grep -l "<changeSet" {} \; | \
            xargs grep -L "rollback" || true)

          if [ -n "$MISSING_ROLLBACK" ]; then
            echo "CRITICAL: Changesets missing rollback directives:"
            echo "$MISSING_ROLLBACK"
            exit 1
          else
            echo "All changesets have rollback directives"
          fi

      - name: Check PHI cache TTL compliance (HIPAA)
        working-directory: backend
        run: |
          echo "Verifying cache TTL under 5 minutes for PHI (HIPAA Section 164.312(b))..."

          CACHE_VIOLATIONS=$(grep -r "@Cacheable" modules/ --include="*.java" -A 5 | \
            grep -E "ttl\s*=\s*[6-9][0-9]{5}|ttl\s*=\s*[1-9][0-9]{6}" || true)

          if [ -n "$CACHE_VIOLATIONS" ]; then
            echo "HIPAA VIOLATION: Cache TTL exceeds 5 minutes"
            echo "$CACHE_VIOLATIONS"
            exit 1
          else
            echo "Cache TTL compliance verified"
          fi

  security-scan:
    name: Validate - Security Scanning
    runs-on: ubuntu-latest
    needs: [change-detection, build]
    timeout-minutes: 30
    if: |
      ${{ (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.change-detection.outputs.backend-changed == 'true' ||
           needs.change-detection.outputs.infrastructure-changed == 'true' ||
           github.event_name == 'push') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run OWASP Dependency Check
        working-directory: backend
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon --console=plain
        continue-on-error: false

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            backend/build/reports/dependency-check-report.html
            trivy-results.sarif
          retention-days: 30

  code-quality:
    name: Validate - Code Quality (SonarQube)
    runs-on: ubuntu-latest
    needs: [change-detection, build]
    timeout-minutes: 30
    if: |
      ${{ (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.change-detection.outputs.backend-changed == 'true' ||
           github.event_name == 'push' ||
           github.event.pull_request.head.repo.full_name == github.repository) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: backend/

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarQube analysis
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=hdim-backend \
            -Dsonar.organization=healthdata \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            --no-daemon --console=plain
        continue-on-error: false

  # ============================================================================
  # STAGE 4: Merge Gate (Waits for all parallel jobs)
  # ============================================================================
  # Ensures all test and validation jobs pass before proceeding.
  # Blocks Docker build and deployment if any validation fails.
  # ============================================================================
  pr-validation-gate:
    name: PR Validation Gate
    runs-on: ubuntu-latest
    needs: [change-detection, test-unit, test-fast, test-integration, test-slow, validate-database, security-scan, code-quality]
    timeout-minutes: 5
    if: always()

    steps:
      - name: Check all job results
        run: |
          echo "=== PR Validation Results ==="
          echo "test-unit: ${{ needs.test-unit.result }}"
          echo "test-fast: ${{ needs.test-fast.result }}"
          echo "test-integration: ${{ needs.test-integration.result }}"
          echo "test-slow: ${{ needs.test-slow.result }}"
          echo "validate-database: ${{ needs.validate-database.result }}"
          echo "security-scan: ${{ needs.security-scan.result }}"
          echo "code-quality: ${{ needs.code-quality.result }}"

          FAILED_JOBS=""
          SKIPPED_JOBS=""

          # Function to check job result
          check_job() {
            local job_name=$1
            local result=$2

            if [ "$result" = "skipped" ]; then
              SKIPPED_JOBS="$SKIPPED_JOBS $job_name"
            elif [ "$result" != "success" ]; then
              FAILED_JOBS="$FAILED_JOBS $job_name"
            fi
          }

          # Check all jobs
          check_job "test-unit" "${{ needs.test-unit.result }}"
          check_job "test-fast" "${{ needs.test-fast.result }}"
          check_job "test-integration" "${{ needs.test-integration.result }}"
          check_job "test-slow" "${{ needs.test-slow.result }}"
          check_job "validate-database" "${{ needs.validate-database.result }}"
          check_job "security-scan" "${{ needs.security-scan.result }}"
          check_job "code-quality" "${{ needs.code-quality.result }}"

          # Report skipped jobs (informational only)
          if [ -n "$SKIPPED_JOBS" ]; then
            echo "Skipped jobs (filtered out by change detection):$SKIPPED_JOBS"
          fi

          # Report failed jobs and exit with error
          if [ -n "$FAILED_JOBS" ]; then
            echo "::error::FAILED JOBS:$FAILED_JOBS"
            exit 1
          fi

          echo "All validation checks passed or were appropriately skipped!"

  # ============================================================================
  # STAGE 5: Docker Build (Conditional, depends on gate)
  # ============================================================================
  # Builds Docker images for all services using matrix strategy.
  # Only runs on push to master/develop or manual trigger.
  # ============================================================================
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: pr-validation-gate
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    timeout-minutes: 90

    strategy:
      matrix:
        service:
          - patient-service
          - fhir-service
          - care-gap-service
          - quality-measure-service
          - cql-engine-service
          - clinical-workflow-service
          - gateway-service
          - gateway-clinical-service
          - gateway-admin-service
          - gateway-fhir-service
          - event-store-service
          - patient-event-service
          - patient-event-handler-service
          - care-gap-event-service
          - care-gap-event-handler-service
          - clinical-workflow-event-service
          - clinical-workflow-event-handler-service
          - quality-measure-event-service
          - quality-measure-event-handler-service
          - event-router-service
          - event-processing-service
          - event-replay-service
          - audit-query-service
          - cqrs-query-service
          - query-api-service
          - fhir-event-bridge-service
          - cms-connector-service
          - ehr-connector-service
          - ecr-service
          - ai-assistant-service
          - agent-builder-service
          - agent-runtime-service
          - analytics-service
          - predictive-analytics-service
          - hcc-service
          - cost-analysis-service
          - nurse-workflow-service
          - payer-workflows-service
          - prior-auth-service
          - approval-service
          - migration-workflow-service
          - data-ingestion-service
          - data-enrichment-service
          - demo-seeding-service
          - demo-orchestrator-service
          - cdr-processor-service
          - notification-service
          - consent-service
          - documentation-service
          - sdoh-service
          - qrda-export-service
          - sales-automation-service
          - devops-agent-service
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ============================================================================
  # STAGE 6: Deployment (Conditional)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.healthdata.example.com
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to staging
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_STAGING }}
          IMAGE_TAG: develop-${{ github.sha }}
        run: |
          echo "Deploying to staging environment..."
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config
          echo "Rolling update for HDIM services..."
          echo "Deployment image tag configured"
          echo "Staging deployment initiated"

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker-images
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event.inputs.deploy_environment == 'production'
    environment:
      name: production
      url: https://healthdata.example.com
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create database backup
        env:
          AWS_DEFAULT_REGION: us-east-1
          RDS_INSTANCE_ID: hdim-production-db
          BACKUP_TAG: pre-deployment-${{ github.sha }}
        run: |
          echo "Creating database backup before deployment..."
          echo "Backup tag: $BACKUP_TAG"
          echo "Database backup initiated"

      - name: Deploy to production
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          IMAGE_TAG: master-${{ github.sha }}
        run: |
          echo "Deploying to production environment..."
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config
          echo "Rolling update for HDIM services..."
          echo "Deployment image tag configured"
          echo "Production deployment initiated"

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [test-unit, test-fast, test-integration, test-slow]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: test-results
          pattern: test-*-results
          merge-multiple: true

      - name: Detect test result files
        id: detect-test-results
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(test-results/**/test-results/**/*.xml)
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "Discovered ${#files[@]} JUnit XML files"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && steps.detect-test-results.outputs.count != '0'
        with:
          files: test-results/**/test-results/**/*.xml
          check_name: Test Results Summary
          comment_mode: always
