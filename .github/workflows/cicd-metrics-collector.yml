name: CI/CD Metrics Collector

# Triggers after Backend CI/CD Pipeline completes
# Collects performance metrics, stores them, and updates dashboards
on:
  workflow_run:
    workflows: ["Backend CI/CD Pipeline (Parallel V2)"]
    types: [completed]
  workflow_dispatch:

jobs:
  collect-metrics:
    name: Collect CI/CD Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download workflow run data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          echo "Collecting metrics for workflow run: $RUN_ID"

          # Create temporary directory for API responses
          mkdir -p /tmp/workflow_data

          # Fetch run details
          gh api repos/$REPO/actions/runs/$RUN_ID > /tmp/workflow_data/run.json

          # Fetch all jobs in this run
          gh api repos/$REPO/actions/runs/$RUN_ID/jobs --paginate > /tmp/workflow_data/jobs.json

          echo "✅ Workflow data downloaded"

      - name: Parse and calculate metrics
        run: |
          set -e

          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          from datetime import datetime
          from pathlib import Path

          # Read workflow data
          with open('/tmp/workflow_data/run.json') as f:
              run_data = json.load(f)

          with open('/tmp/workflow_data/jobs.json') as f:
              jobs_data = json.load(f)

          # Extract run-level information
          run_id = run_data.get('id')
          run_number = run_data.get('run_number')
          conclusion = run_data.get('conclusion')
          created_at = run_data.get('created_at')
          updated_at = run_data.get('updated_at')
          head_branch = run_data.get('head_branch')

          # Try to get PR number
          pr_number = None
          if run_data.get('pull_requests') and len(run_data['pull_requests']) > 0:
              pr_number = run_data['pull_requests'][0]['number']

          # Parse timestamps
          created_dt = datetime.fromisoformat(created_at.replace('Z', '+00:00'))
          updated_dt = datetime.fromisoformat(updated_at.replace('Z', '+00:00'))
          total_duration_sec = int((updated_dt - created_dt).total_seconds())
          total_duration_min = total_duration_sec / 60

          # Extract job metrics
          jobs = jobs_data.get('jobs', [])
          job_metrics = []
          max_job_duration = 0

          for job in jobs:
              job_name = job.get('name', 'Unknown')
              job_status = job.get('status')
              job_conclusion = job.get('conclusion')
              job_started = job.get('started_at')
              job_completed = job.get('completed_at')

              # Calculate job duration
              if job_started and job_completed:
                  start_dt = datetime.fromisoformat(job_started.replace('Z', '+00:00'))
                  end_dt = datetime.fromisoformat(job_completed.replace('Z', '+00:00'))
                  duration_sec = int((end_dt - start_dt).total_seconds())
              else:
                  duration_sec = 0

              max_job_duration = max(max_job_duration, duration_sec)

              job_metrics.append({
                  'name': job_name,
                  'status': job_status,
                  'conclusion': job_conclusion,
                  'duration_sec': duration_sec,
                  'duration_min': round(duration_sec / 60, 2)
              })

          # Create metrics entry
          metrics_entry = {
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'workflow_run_id': run_id,
              'run_number': run_number,
              'pr_number': pr_number,
              'branch': head_branch,
              'conclusion': conclusion,
              'created_at': created_at,
              'updated_at': updated_at,
              'total_duration_sec': total_duration_sec,
              'total_duration_min': round(total_duration_min, 2),
              'max_job_duration_sec': max_job_duration,
              'max_job_duration_min': round(max_job_duration / 60, 2),
              'jobs_count': len(jobs),
              'success': conclusion == 'success',
              'jobs': job_metrics
          }

          # Save metrics entry
          with open('/tmp/metrics_entry.json', 'w') as f:
              json.dump(metrics_entry, f, indent=2)

          print(f"✅ Metrics parsed:")
          print(f"   Run: #{run_number} (PR: {pr_number or 'N/A'})")
          print(f"   Duration: {round(total_duration_min, 1)}m")
          print(f"   Max Job: {round(max_job_duration / 60, 1)}m")
          print(f"   Status: {conclusion}")
          PYTHON_SCRIPT

      - name: Create metrics directory structure
        run: |
          mkdir -p .github/metrics/runs
          mkdir -p backend/docs/dashboards

      - name: Store run metrics
        run: |
          set -e

          python3 << 'PYTHON_SCRIPT'
          import json
          from datetime import datetime
          from pathlib import Path

          # Read metrics
          with open('/tmp/metrics_entry.json') as f:
              metrics = json.load(f)

          # Create filename based on timestamp
          timestamp = metrics['timestamp'].replace(':', '-').replace('Z', '')
          run_number = metrics['run_number']
          filename = f".github/metrics/runs/{run_number:05d}-{timestamp}.json"

          # Store metrics
          Path('.github/metrics/runs').mkdir(parents=True, exist_ok=True)

          with open(filename, 'w') as f:
              json.dump(metrics, f, indent=2)

          print(f"✅ Metrics stored: {filename}")
          PYTHON_SCRIPT

      - name: Update aggregated metrics
        run: |
          set -e

          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          from datetime import datetime, timedelta
          from pathlib import Path

          metrics_dir = Path('.github/metrics/runs')

          # Collect all metrics
          all_metrics = []

          if metrics_dir.exists():
              for metric_file in sorted(metrics_dir.glob('*.json')):
                  with open(metric_file) as f:
                      data = json.load(f)
                  all_metrics.append(data)

          # Sort by timestamp (most recent first)
          all_metrics.sort(key=lambda x: x['timestamp'], reverse=True)

          # Define time windows
          now = datetime.utcnow()
          cutoff_24h = now - timedelta(hours=24)
          cutoff_7d = now - timedelta(days=7)

          last_24h = []
          last_7d = []

          for metric in all_metrics:
              try:
                  timestamp = datetime.fromisoformat(metric['timestamp'].replace('Z', '+00:00'))
              except:
                  continue

              if timestamp > cutoff_24h:
                  last_24h.append(metric)

              if timestamp > cutoff_7d:
                  last_7d.append(metric)

          # Calculate summary statistics for 24 hours
          summary_24h = {
              'total_runs': len(last_24h),
              'successful_runs': len([m for m in last_24h if m.get('success')]),
              'failed_runs': len([m for m in last_24h if not m.get('success')])
          }

          if last_24h:
              durations = [m['total_duration_sec'] for m in last_24h]
              max_job_durations = [m['max_job_duration_sec'] for m in last_24h]

              summary_24h.update({
                  'avg_total_duration_sec': sum(durations) / len(durations),
                  'avg_total_duration_min': round(sum(durations) / len(durations) / 60, 2),
                  'min_total_duration_sec': min(durations),
                  'min_total_duration_min': round(min(durations) / 60, 2),
                  'max_total_duration_sec': max(durations),
                  'max_total_duration_min': round(max(durations) / 60, 2),
                  'avg_max_job_duration_sec': sum(max_job_durations) / len(max_job_durations),
                  'avg_max_job_duration_min': round(sum(max_job_durations) / len(max_job_durations) / 60, 2),
                  'success_rate': (summary_24h['successful_runs'] / summary_24h['total_runs'] * 100) if summary_24h['total_runs'] > 0 else 0
              })

          # Calculate summary for 7 days
          summary_7d = {
              'total_runs': len(last_7d),
              'successful_runs': len([m for m in last_7d if m.get('success')]),
              'failed_runs': len([m for m in last_7d if not m.get('success')])
          }

          if last_7d:
              durations = [m['total_duration_sec'] for m in last_7d]
              summary_7d.update({
                  'avg_total_duration_sec': sum(durations) / len(durations),
                  'avg_total_duration_min': round(sum(durations) / len(durations) / 60, 2),
                  'success_rate': (summary_7d['successful_runs'] / summary_7d['total_runs'] * 100) if summary_7d['total_runs'] > 0 else 0
              })

          # Create aggregated data
          aggregated = {
              'generated_at': datetime.utcnow().isoformat() + 'Z',
              'summary_24h': summary_24h,
              'summary_7d': summary_7d,
              'last_24h_runs': last_24h[:20],
              'last_7d_runs': last_7d[:50]
          }

          # Write aggregated metrics
          with open('.github/metrics/aggregated.json', 'w') as f:
              json.dump(aggregated, f, indent=2)

          print("✅ Aggregated metrics updated:")
          print(f"   24h: {summary_24h['total_runs']} runs, {summary_24h.get('success_rate', 0):.1f}% success rate")
          print(f"   7d: {summary_7d['total_runs']} runs, {summary_7d.get('success_rate', 0):.1f}% success rate")
          PYTHON_SCRIPT

      - name: Generate HTML dashboard
        run: |
          set -e

          python3 << 'PYTHON_SCRIPT'
          import json
          from datetime import datetime
          from pathlib import Path

          # Read aggregated metrics
          agg_file = Path('.github/metrics/aggregated.json')
          if not agg_file.exists():
              print("⚠️  No aggregated metrics found")
              exit(0)

          with open(agg_file) as f:
              agg_data = json.load(f)

          summary_24h = agg_data['summary_24h']

          # Determine status colors
          avg_duration = summary_24h.get('avg_total_duration_min', 0)
          success_rate = summary_24h.get('success_rate', 0)

          def get_status_color(metric, value):
              if metric == 'duration':
                  if value < 30:
                      return '#28a745'
                  elif value < 35:
                      return '#ffc107'
                  else:
                      return '#dc3545'
              elif metric == 'success':
                  if value >= 95:
                      return '#28a745'
                  elif value >= 90:
                      return '#ffc107'
                  else:
                      return '#dc3545'

          status_color = get_status_color('duration', avg_duration)
          success_color = get_status_color('success', success_rate)

          # Generate recent runs table
          runs_html = ''
          for run in agg_data['last_24h_runs'][:10]:
              status = '✅ Success' if run['success'] else '❌ Failed'
              status_class = 'success' if run['success'] else 'failed'
              pr_info = f"PR #{run['pr_number']}" if run['pr_number'] else 'Push'

              runs_html += f'''
              <tr class="run-row {status_class}">
                <td>#{run['run_number']}</td>
                <td>{pr_info}</td>
                <td>{run['branch']}</td>
                <td>{run['total_duration_min']:.1f}m</td>
                <td>{run['max_job_duration_min']:.1f}m</td>
                <td><span class="status-badge {status_class}">{status}</span></td>
              </tr>
              '''

