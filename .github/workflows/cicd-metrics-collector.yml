      - name: Commit metrics and dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A .github/metrics/ || true
          git add backend/docs/dashboards/ || true

          if git diff --cached --quiet; then
            echo "ℹ️  No metrics changes to commit"
          else
            git commit -m "metrics(phase-7): Update CI/CD performance metrics and dashboards

- Collected metrics for workflow run
- Updated aggregated statistics (24h, 7d)
- Generated HTML performance dashboard
- Generated markdown performance report
- Updated threshold analysis

Dashboard: backend/docs/dashboards/cicd-performance.html
Report: backend/docs/dashboards/cicd-performance.md
Raw metrics: .github/metrics/" || true

            git push origin master || true

            echo "✅ Metrics and dashboard committed"
          fi

      - name: Summary
        run: |
          echo "=========================================="
          echo "✅ Metrics Collection Complete"
          echo "=========================================="
          echo ""
          echo "📊 Artifacts Generated:"
          echo "  • Metrics JSON: .github/metrics/runs/"
          echo "  • Aggregated: .github/metrics/aggregated.json"
          echo "  • HTML Dashboard: backend/docs/dashboards/cicd-performance.html"
          echo "  • Markdown Report: backend/docs/dashboards/cicd-performance.md"
          echo ""
          echo "📈 Current Performance:"
          if [ -f ".github/metrics/aggregated.json" ]; then
            python3 << 'PYTHON'
          import json
          with open('.github/metrics/aggregated.json') as f:
              data = json.load(f)
          summary = data.get('summary_24h', {})
          print(f"  • Avg Time (24h): {summary.get('avg_total_duration_min', 'N/A')} min")
          print(f"  • Success Rate: {summary.get('success_rate', 'N/A')}%")
          print(f"  • Total Runs: {summary.get('total_runs', 0)}")
          PYTHON
          fi
          echo ""
          echo "🔗 Next Steps:"
          echo "  1. Monitor dashboard: backend/docs/dashboards/cicd-performance.html"
          echo "  2. Review alerts if any thresholds exceeded"
          echo "  3. Continue with Phase 7 Task 7: Cache Optimization"
          echo "=========================================="
