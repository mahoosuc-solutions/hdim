name: Monthly Compliance Evidence Snapshot

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: Capture monthly compliance evidence baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Prepare scripts
        run: |
          mkdir -p test-results validation-reports
          chmod +x scripts/security/validate-phase4-hipaa-controls.sh
          chmod +x scripts/validation/validate-compliance-evidence-gate.sh

      - name: Run HIPAA controls snapshot
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          bash scripts/security/validate-phase4-hipaa-controls.sh | tee "test-results/hipaa-controls-monthly-${ts}.log"

      - name: Run evidence gate snapshot (non-blocking backend CVE strictness)
        env:
          STRICT_BACKEND_CVE: "false"
        run: |
          bash scripts/validation/validate-compliance-evidence-gate.sh

      - name: Upload monthly evidence snapshot
        uses: actions/upload-artifact@v4
        with:
          name: monthly-compliance-evidence-snapshot
          retention-days: 400
          path: |
            validation-reports/compliance-evidence-gate-summary.md
            validation-reports/compliance-evidence-gate-summary.json
            test-results/hipaa-controls-monthly-*.log
