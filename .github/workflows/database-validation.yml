name: Database Schema Validation

on:
  pull_request:
    paths:
      - 'backend/modules/services/*/src/main/java/**/*Entity.java'
      - 'backend/modules/services/*/src/main/resources/db/changelog/**'
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run Entity-Migration Validation Tests
        run: |
          cd backend
          ./gradlew test --tests "*EntityMigrationValidationTest" --parallel --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/modules/services/*/build/reports/tests/
          retention-days: 7
