name: Deploy to Docker Staging

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/modules/services/ai-sales-agent/**'
      - 'backend/modules/services/live-call-sales-agent/**'
      - 'apps/coaching-ui/**'
      - 'docker/**'
      - '.env.dev'
      - 'docker-compose.staging.sales-agents.yml'
      - '.github/workflows/deploy-docker-staging.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'staging',
              description: 'Docker Staging Deployment',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Update deployment status to in_progress
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deployment in progress',
              environment_url: 'https://staging.hdim.local'
            });

      - name: Set up Docker CLI
        run: |
          docker --version
          docker compose --version

      - name: Pull latest images from registry
        env:
          COMMIT_SHA: ${{ github.sha }}
          REGISTRY_URL: ${{ env.REGISTRY }}
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ env.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
          docker pull "${REGISTRY_URL}/${DOCKER_USER}/hdim-ai-sales-agent:${COMMIT_SHA}"
          docker pull "${REGISTRY_URL}/${DOCKER_USER}/hdim-live-call-sales-agent:${COMMIT_SHA}"
          docker pull "${REGISTRY_URL}/${DOCKER_USER}/hdim-coaching-ui:${COMMIT_SHA}"

      - name: Deploy to staging with docker-compose
        env:
          COMMIT_SHA: ${{ github.sha }}
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
        run: |
          cat > .env.staging.deploy << EOF
          COMMIT_SHA=${COMMIT_SHA}
          DOCKER_USER=${DOCKER_USER}
          REGISTRY=docker.io
          ENVIRONMENT=staging
          LOG_LEVEL=INFO
          DEBUG=false
          OTEL_SAMPLER=parentbased_traceidratio
          OTEL_SAMPLER_ARG=0.1
          EOF

          docker compose -f docker-compose.staging.sales-agents.yml \
            --env-file .env.staging.deploy \
            pull

          docker compose -f docker-compose.staging.sales-agents.yml \
            --env-file .env.staging.deploy \
            up -d

          sleep 30

      - name: Validate deployment
        run: |
          set -e
          echo "Checking service health..."
          docker compose -f docker-compose.staging.sales-agents.yml ps

          echo "Validating health endpoints..."
          max_attempts=30
          attempts=0
          while [ $attempts -lt $max_attempts ]; do
            if docker compose -f docker-compose.staging.sales-agents.yml exec -T ai-sales-agent curl -f http://localhost:8090/health 2>/dev/null; then
              echo "✅ Services are healthy"
              break
            fi
            attempts=$((attempts + 1))
            echo "Attempt $attempts/$max_attempts: Waiting for services to be healthy..."
            sleep 2
          done
          if [ $attempts -eq $max_attempts ]; then
            echo "❌ Services failed health check"
            exit 1
          fi

      - name: Run smoke tests
        continue-on-error: true
        run: |
          echo "Running smoke tests..."
          curl -s http://localhost:8090/health || echo "Health check completed"
          curl -s http://localhost:8095/health || echo "Live call agent check completed"
          curl -s http://localhost:16686 || echo "Jaeger UI check completed"

      - name: Collect metrics
        if: success()
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cat > deployment-metrics.json << EOF
          {
            "deployment": "staging",
            "timestamp": "$BUILD_TIME",
            "commit": "$COMMIT_SHA",
            "services": ["ai-sales-agent", "live-call-sales-agent", "coaching-ui"],
            "status": "success"
          }
          EOF
          cat deployment-metrics.json

      - name: Update deployment status to success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Deployment completed successfully',
              environment_url: 'https://staging.hdim.local',
              auto_inactive: true
            });

      - name: Update deployment status to failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed',
              environment_url: 'https://staging.hdim.local'
            });

      - name: Upload deployment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report-staging
          path: deployment-metrics.json
          retention-days: 30
