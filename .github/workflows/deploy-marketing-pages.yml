name: Deploy Marketing Web to GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - "docs/marketing/web/**"
      - ".github/workflows/deploy-marketing-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-marketing"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare publish directory
        run: |
          rm -rf /tmp/marketing-pages
          mkdir -p /tmp/marketing-pages
          cp -R docs/marketing/web/* /tmp/marketing-pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/marketing-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
