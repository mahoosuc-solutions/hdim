name: Entity-Migration Validation

on:
  pull_request:
    paths:
      - 'backend/modules/**/domain/**/*.java'
      - 'backend/modules/**/persistence/**/*Entity.java'
      - 'backend/modules/**/resources/db/changelog/**/*.xml'
      - '.github/workflows/entity-migration-validation.yml'

jobs:
  validate-entity-migrations:
    name: Validate Entity-Migration Synchronization
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '${{ matrix.java-version }}'
          distribution: 'temurin'
          cache: gradle

      - name: Run entity-migration validation
        working-directory: ./backend
        run: |
          chmod +x ./gradlew
          ./gradlew test \
            --tests "*EntityMigrationValidationTest" \
            --parallel \
            --no-daemon \
            --console=plain \
            --stacktrace

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entity-migration-validation-report
          path: /tmp/entity-validation.log
          if-no-files-found: ignore

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Entity-Migration Validation Failed'
            })
