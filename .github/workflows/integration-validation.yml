name: Integration Validation (Backend + E2E + Health)

on:
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch: {}

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon --console=plain
        env:
          SPRING_PROFILES_ACTIVE: ci

  e2e-tests:
    name: E2E Tests (Demo Stack + Seed Validation)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install npm dependencies
        run: npm ci

      - name: Bring up demo stack + seed + validate counts
        run: |
          chmod +x ./scripts/ci/local-ci.sh
          SEED_PROFILE=smoke ./scripts/ci/local-ci.sh demo

      - name: Run clinical portal E2E smoke
        run: npm run e2e:clinical-portal:smoke

      - name: Tear down demo stack
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v --remove-orphans

  health-checks:
    name: Health Checks (Demo Stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bring up demo stack + seed + validate-system
        run: |
          chmod +x ./scripts/ci/local-ci.sh
          SEED_PROFILE=smoke ./scripts/ci/local-ci.sh demo

      - name: Tear down demo stack
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v --remove-orphans

