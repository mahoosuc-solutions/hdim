name: Landing Page CI

on:
  pull_request:
    paths:
      - 'landing-page-v0/**'
      - '!landing-page-v0/remotion/**'
      - '!landing-page-v0/**/*.md'
  push:
    branches: [master]
    paths:
      - 'landing-page-v0/**'
      - '!landing-page-v0/remotion/**'
      - '!landing-page-v0/**/*.md'

defaults:
  run:
    working-directory: landing-page-v0

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate links
        run: npm run validate:links
