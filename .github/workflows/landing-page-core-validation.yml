name: Landing Page Core Validation

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'landing-page-v0/**'
      - '.github/workflows/landing-page-core-validation.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'landing-page-v0/**'
      - '.github/workflows/landing-page-core-validation.yml'
  workflow_dispatch:

concurrency:
  group: landing-page-core-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ci:
    name: Validate CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run aggregate validation gate
        run: npm run validate:ci
