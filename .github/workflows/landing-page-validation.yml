name: Landing Page Validation

on:
  push:
    branches: [master]
    paths:
      - 'landing-page/**'
      - '.github/workflows/landing-page-validation.yml'
  pull_request:
    branches: [master]
    paths:
      - 'landing-page/**'
      - '.github/workflows/landing-page-validation.yml'
  workflow_dispatch:

concurrency:
  group: landing-page-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./landing-page

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build
