name: Landing Page Validation

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'landing-page-v0/**'
      - '.github/workflows/landing-page-validation.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'landing-page-v0/**'
      - '.github/workflows/landing-page-validation.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: landing-page-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run content validation
        run: npm run validate:content

      - name: Validate README workflow badge
        run: npm run validate:docs

  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run link checker
        run: npm run validate:links

  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  e2e-tests:
    name: E2E Tests
    needs: [content-validation, link-check, lint-and-build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: landing-page-v0/test-results/
          retention-days: 30

  lighthouse:
    name: Lighthouse Performance
    needs: [content-validation, link-check, lint-and-build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-page-v0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page-v0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: landing-page-v0/.lighthouseci/
          retention-days: 30
