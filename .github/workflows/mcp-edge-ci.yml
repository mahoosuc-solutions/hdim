name: MCP Edge CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'mcp-edge-common/**'
      - 'mcp-edge-devops/**'
      - 'mcp-edge-platform/**'
      - 'mcp-edge-clinical/**'
      - 'mcp-bridge-desktop/**'
      - '.github/workflows/mcp-edge-ci.yml'
  push:
    branches: [master]
    paths:
      - 'mcp-edge-common/**'
      - 'mcp-edge-devops/**'
      - 'mcp-edge-platform/**'
      - 'mcp-edge-clinical/**'
      - 'mcp-bridge-desktop/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: MCP Edge Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage enforcement
        run: npx jest --projects mcp-edge-common mcp-edge-devops mcp-edge-platform mcp-edge-clinical --coverage --ci
        env:
          HDIM_DEMO_MODE: 'true'

      - name: Run bridge tests
        run: npx jest --project mcp-bridge-desktop --ci
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-edge-coverage
          retention-days: 30
          path: coverage/
          if-no-files-found: warn

  lint:
    name: MCP Edge Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint mcp-edge-common
        run: npx eslint .
        working-directory: mcp-edge-common

      - name: Lint mcp-edge-devops
        run: npx eslint .
        working-directory: mcp-edge-devops

      - name: Lint mcp-edge-platform
        run: npx eslint .
        working-directory: mcp-edge-platform

      - name: Lint mcp-edge-clinical
        run: npx eslint .
        working-directory: mcp-edge-clinical

  live-tests:
    name: MCP Edge Live Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Start HDIM stack
        run: docker compose -f docker-compose.demo.yml up -d

      - name: Wait for gateway health
        run: |
          echo "Waiting for gateway..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18080/actuator/health > /dev/null 2>&1; then
              echo "Gateway healthy after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Gateway failed to start"
              docker compose -f docker-compose.demo.yml logs
              exit 1
            fi
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Load synthetic patients
        run: node test-data/synthetic-patients/load-test-patients.js
        env:
          HDIM_BASE_URL: http://localhost:18080

      - name: Run live tests
        run: npx jest --testPathPattern=live --runInBand --no-coverage --forceExit
        env:
          HDIM_BASE_URL: http://localhost:18080
          HDIM_DEMO_MODE: 'false'
          LIVE_TESTS: 'true'
          MCP_EDGE_ENFORCE_ROLE_AUTH: 'true'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-test-results
          path: /tmp/live-test-context.json
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v
