name: MCP Validation

on:
  pull_request:
    paths:
      - ".mcp.json"
      - "scripts/mcp/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [master]
    paths:
      - ".mcp.json"
      - "scripts/mcp/**"
      - "package.json"
      - "package-lock.json"
  schedule:
    # Nightly smoke test
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  mcp-config:
    name: Config (Unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:mcp

  mcp-smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # Only run smoke on schedule or manual trigger.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:mcp
        env:
          RUN_MCP_SMOKE: "1"

