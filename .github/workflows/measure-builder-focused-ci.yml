name: Measure Builder Focused CI

on:
  pull_request:
    paths:
      - 'apps/clinical-portal/src/app/pages/measure-builder/**'
      - 'apps/clinical-portal/src/testing/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/measure-builder-focused-ci.yml'
  workflow_dispatch: {}

jobs:
  focused-tests:
    name: Focused Measure Builder Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript app compile check
        run: npx tsc -p apps/clinical-portal/tsconfig.app.json --noEmit

      - name: Run focused measure-builder specs
        run: npm run test:measure-builder:focused

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run metadata retry e2e
        run: npm run e2e:measure-builder:retry
