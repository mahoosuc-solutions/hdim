name: Release Security Gate

on:
  push:
    branches: [master]
    paths:
      - 'backend/modules/services/event-processing-service/**'
      - 'backend/modules/shared/infrastructure/authentication/**'
      - 'backend/modules/shared/infrastructure/gateway-core/**'
      - '.github/workflows/release-security-gate.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'

jobs:
  auth-tenant-rbac-regressions:
    name: Auth Tenant RBAC Regressions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run targeted security regressions
        working-directory: backend
        run: |
          ./gradlew \
            :modules:shared:infrastructure:authentication:test --tests "*TrustedHeaderAuthFilterTest" \
            :modules:services:event-processing-service:test --tests "*DeadLetterQueueServiceTest" \
            --no-daemon --console=plain
