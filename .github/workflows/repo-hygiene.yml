name: Repository Hygiene Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: repo-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Forbidden Path Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run repository hygiene audit
        run: bash scripts/repo-hygiene-audit.sh --ci
