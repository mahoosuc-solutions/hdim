# Gitleaks configuration for HDIM
# All findings are documented false positives or intentional dev fixtures.
# See: docs/plans/2026-03-07-himss-open-source-launch-punchlist.md

title = "HDIM Gitleaks Configuration"

[allowlist]
  description = "Allowlisted findings — all are dev/test fixtures, not production secrets"

  # Self-signed localhost SSL certificates for local development (CN=localhost, OU=Development)
  paths = [
    '''ssl/dev/.*''',
  ]

  # Test JWT tokens used in unit/integration tests — not valid for any real service
  # Placeholder passwords in documentation and setup scripts
  # Example OIDC client IDs in Kong configuration guides
  regexTarget = "match"
  regexes = [
    '''your_redis_password''',
    '''healthdata_password''',
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9''',
    '''0oa1a2b3c4d5e6f7g8h9''',
  ]
