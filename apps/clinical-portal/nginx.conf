        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ensure authentication cookies are available to this API
        proxy_cookie_path ~^(.*)$ /;
        proxy_cookie_flags ~ httponly samesite=lax;
        
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

