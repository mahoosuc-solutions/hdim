        # ML inference may need longer timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Gateway Actuator (for health checks)
    location /actuator/ {
        proxy_pass http://gateway-edge:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Authentication API (CRITICAL: was missing, breaking browser login)
    location /auth/ {
        proxy_pass http://gateway-edge:8080/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie handling for HttpOnly authentication
        # Rewrite ALL cookie paths to / so browser sends them with ALL API requests
        # This is critical: without this, cookies are restricted to /api/*, /auth/* paths only
        # and subsequent requests to /fhir/, /cql-engine/, etc. fail with 401
        # Regex pattern: match any path and rewrite to /
        proxy_cookie_path ~^(.*)$ /;

        # Cookie security flags: httponly + samesite
        # Note: Secure flag NOT set here for HTTP development
        # In production (HTTPS), set via backend CookieService or docker env vars
        proxy_cookie_flags ~ httponly samesite=lax;

        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # Angular App Routes
    # =========================================================================

    # Angular routing - all routes redirect to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable logging for favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
