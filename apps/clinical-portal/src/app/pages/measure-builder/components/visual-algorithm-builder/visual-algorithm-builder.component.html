<div class="svg-canvas-container">
  <svg
    #svgCanvas
    width="1200"
    height="600"
    viewBox="0 0 1200 600"
    xmlns="http://www.w3.org/2000/svg"
    preserveAspectRatio="xMidYMid meet"
    class="algorithm-canvas">
    <!-- SVG content will be rendered by component -->
  </svg>
</div>

<!-- Hidden legend for accessibility -->
<div class="block-legend" aria-label="Block type legend">
  <div class="legend-item">
    <span class="legend-color" style="background-color: #2196F3;"></span>
    <span class="legend-label">Initial Population</span>
  </div>
  <div class="legend-item">
    <span class="legend-color" style="background-color: #4CAF50;"></span>
    <span class="legend-label">Denominator</span>
  </div>
  <div class="legend-item">
    <span class="legend-color" style="background-color: #FF9800;"></span>
    <span class="legend-label">Numerator</span>
  </div>
  <div class="legend-item">
    <span class="legend-color" style="background-color: #F44336;"></span>
    <span class="legend-label">Exclusion</span>
  </div>
  <div class="legend-item">
    <span class="legend-color" style="background-color: #9C27B0;"></span>
    <span class="legend-label">Exception</span>
  </div>
</div>
