<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="line-grad-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="60%" style="stop-color:#21cbf3"/>
      <stop offset="100%" style="stop-color:#21cbf3;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg-grad-a)"/>

  <!-- Pulse + data stream path -->
  <!-- Starts flat (data stream dots), rises into ECG spike, returns to stream -->
  <polyline
    points="8,50 22,50 26,50 30,38 34,62 38,44 42,50 56,50 62,50"
    fill="none"
    stroke="url(#line-grad-a)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Data stream continuation as dots -->
  <circle cx="67" cy="50" r="2.5" fill="#21cbf3" opacity="0.9"/>
  <circle cx="76" cy="50" r="2.5" fill="#21cbf3" opacity="0.6"/>
  <circle cx="85" cy="50" r="2.5" fill="#21cbf3" opacity="0.3"/>

  <!-- Subtle grid lines for data context -->
  <line x1="8" y1="62" x2="92" y2="62" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <line x1="8" y1="38" x2="92" y2="38" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
</svg>
