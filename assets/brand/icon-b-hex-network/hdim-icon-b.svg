<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg-grad-b)"/>

  <!-- Hexagon outline — flat-top orientation, centered -->
  <!-- 6 vertices of a regular hexagon, r=38, center (50,50) -->
  <!-- flat-top: top/bottom edges horizontal -->
  <polygon
    points="50,12 83,31 83,69 50,88 17,69 17,31"
    fill="none"
    stroke="#2196f3"
    stroke-width="3"
    stroke-linejoin="round"/>

  <!-- Internal network: 3 nodes forming a triangle -->
  <!-- Node top-center: (50, 34) -->
  <!-- Node bottom-left: (32, 65) -->
  <!-- Node bottom-right: (68, 65) -->

  <!-- Connecting lines between nodes -->
  <line x1="50" y1="34" x2="32" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>
  <line x1="50" y1="34" x2="68" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>
  <line x1="32" y1="65" x2="68" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>

  <!-- Node dots -->
  <circle cx="50" cy="34" r="5" fill="#21cbf3"/>
  <circle cx="32" cy="65" r="5" fill="#2196f3"/>
  <circle cx="68" cy="65" r="5" fill="#2196f3"/>

  <!-- Pulse arc on top-right hex edge — clinical data nod -->
  <!-- Arc sits between vertex (83,31) and (50,12), offset outward slightly -->
  <path
    d="M 59,16 Q 68,10 77,20"
    fill="none"
    stroke="#21cbf3"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.85"/>
</svg>
