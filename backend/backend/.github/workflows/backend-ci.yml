name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'modules/**'
      - 'shared/**'
      - 'authentication/**'
      - 'gateway-core/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthdata
          POSTGRES_PASSWORD: healthdata123
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ubuntu-latest
          restore-keys: |
            gradle-ubuntu-latest

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Download dependencies
        run: ./gradlew downloadDependencies --no-daemon --console=plain

      - name: Build all services
        run: ./gradlew build -x test --no-daemon --console=plain
        env:
          SPRING_PROFILES_ACTIVE: ci

      - name: Run unit tests
        run: ./gradlew test --no-daemon --console=plain --continue
        env:
          SPRING_PROFILES_ACTIVE: ci
          DATABASE_URL: jdbc:postgresql://localhost:5432/test_db
          DATABASE_USERNAME: healthdata
          DATABASE_PASSWORD: healthdata123
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: 'Test Results'
          comment_mode: failures

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: |
            **/build/reports/jacoco/**
            **/build/test-results/**
          retention-days: 30

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: 'modules/services/*/build/libs/*.jar'
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: trivy-results.sarif
          retention-days: 30
