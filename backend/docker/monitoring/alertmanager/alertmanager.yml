global:
  resolve_timeout: 5m
  # Slack webhook (configure in production)
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Alert routing
route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 30m

    # Compliance/HIPAA alerts - always notify
    - match:
        category: compliance
      receiver: 'compliance-alerts'
      group_wait: 0s
      repeat_interval: 1h

    # Security alerts
    - match:
        category: security
      receiver: 'security-alerts'
      group_wait: 30s
      repeat_interval: 2h

    # Warning alerts - batched
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m
      repeat_interval: 4h

    # Info alerts - low priority
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 10m
      repeat_interval: 24h

# Alert receivers
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    # Slack critical channel
    slack_configs:
      - channel: '#hdim-alerts-critical'
        title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
    # Email (configure SMTP)
    # email_configs:
    #   - to: 'oncall@example.com'
    #     headers:
    #       Subject: 'CRITICAL: {{ .GroupLabels.alertname }}'

  - name: 'compliance-alerts'
    slack_configs:
      - channel: '#hdim-compliance'
        title: '⚖️ HIPAA Compliance Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
    # PagerDuty for compliance
    # pagerduty_configs:
    #   - service_key: '${PAGERDUTY_SERVICE_KEY}'

  - name: 'security-alerts'
    slack_configs:
      - channel: '#hdim-security'
        title: '🔒 Security Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#hdim-alerts'
        title: '⚠️ Warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true

  - name: 'info-alerts'
    slack_configs:
      - channel: '#hdim-alerts'
        title: 'ℹ️ Info: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: false

# Inhibition rules (suppress alerts based on other alerts)
inhibit_rules:
  # Don't alert on individual services if entire cluster is down
  - source_match:
      alertname: 'ServiceDown'
      service: 'gateway-service'
    target_match:
      severity: 'warning'
    equal: ['service']

  # Don't alert on warnings if critical already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  # Don't alert on memory warnings if memory critical
  - source_match:
      alertname: 'CriticalMemoryUsage'
    target_match:
      alertname: 'HighMemoryUsage'
    equal: ['service']
