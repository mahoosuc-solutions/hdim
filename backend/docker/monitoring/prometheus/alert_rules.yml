groups:
  - name: hdim_service_alerts
    interval: 30s
    rules:
      # Service Down Alerts
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "{{ $labels.service }} has been down for more than 2 minutes (current value: {{ $value }})"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: system_cpu_usage > 0.85
        for: 5m
        labels:
          severity: warning
          category: resource
        annotations:
          summary: "High CPU usage on {{ $labels.service }}"
          description: "CPU usage is above 85% for 5 minutes (current: {{ $value | humanizePercentage }})"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          category: resource
        annotations:
          summary: "High memory usage on {{ $labels.service }}"
          description: "Heap memory usage is above 85% for 5 minutes (current: {{ $value | humanizePercentage }})"

      # Critical Memory Usage
      - alert: CriticalMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.95
        for: 2m
        labels:
          severity: critical
          category: resource
        annotations:
          summary: "Critical memory usage on {{ $labels.service }}"
          description: "Heap memory usage is above 95% (current: {{ $value | humanizePercentage }}). Service may crash soon."

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "5xx error rate is above 5% for 5 minutes (current: {{ $value | humanizePercentage }})"

      # Critical Error Rate
      - alert: CriticalErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.20
        for: 2m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "Critical error rate on {{ $labels.service }}"
          description: "5xx error rate is above 20% (current: {{ $value | humanizePercentage }})"

      # Slow Response Time
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Slow response time on {{ $labels.service }}"
          description: "P95 response time is above 2 seconds (current: {{ $value }}s)"

      # Database Connection Pool Exhaustion
      - alert: DatabaseConnectionPoolLow
        expr: (hikaricp_connections_active / hikaricp_connections_max) > 0.85
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Database connection pool running low on {{ $labels.service }}"
          description: "Connection pool utilization is above 85% (current: {{ $value | humanizePercentage }})"

      # JVM Thread Deadlock
      - alert: JVMThreadDeadlock
        expr: jvm_threads_deadlocked > 0
        for: 1m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "Thread deadlock detected on {{ $labels.service }}"
          description: "{{ $value }} deadlocked threads detected"

      # Disk Space Low (Node Exporter)
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Disk space low on node"
          description: "Less than 15% disk space remaining (current: {{ $value | humanizePercentage }})"

      # Critical Disk Space
      - alert: CriticalDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Critical disk space on node"
          description: "Less than 5% disk space remaining (current: {{ $value | humanizePercentage }})"

      # Kafka Lag (if kafka metrics available)
      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 10000
        for: 10m
        labels:
          severity: warning
          category: messaging
        annotations:
          summary: "High Kafka consumer lag on {{ $labels.service }}"
          description: "Consumer lag is above 10,000 messages (current: {{ $value }})"

  - name: hdim_business_alerts
    interval: 1m
    rules:
      # HIPAA Audit Log Failures
      - alert: AuditLogFailure
        expr: rate(audit_log_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: compliance
        annotations:
          summary: "Audit logging failure on {{ $labels.service }}"
          description: "HIPAA audit logs are failing ({{ $value }} failures/sec). This is a compliance violation."

      # PHI Access Rate Spike
      - alert: PHIAccessSpike
        expr: rate(phi_access_total[5m]) > (avg_over_time(rate(phi_access_total[1h])[1h:5m]) * 3)
        for: 5m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Unusual PHI access pattern on {{ $labels.service }}"
          description: "PHI access rate is 3x higher than normal (current: {{ $value }} accesses/sec)"

      # Cache Hit Rate Low
      - alert: LowCacheHitRate
        expr: (rate(cache_gets_total{result="hit"}[5m]) / rate(cache_gets_total[5m])) < 0.50
        for: 10m
        labels:
          severity: info
          category: performance
        annotations:
          summary: "Low cache hit rate on {{ $labels.service }}"
          description: "Cache hit rate is below 50% (current: {{ $value | humanizePercentage }})"
