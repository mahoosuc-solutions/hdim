# Gradle Local Properties - Optimized for WSL with Limited Memory
#
# Usage: Copy this file or use with -Dorg.gradle.project.config=local
#   ./gradlew build -Plocal
#   GRADLE_USER_HOME=. ./gradlew -g gradle-local build
#
# Or set in environment:
#   export GRADLE_OPTS="-Xmx2g -Dorg.gradle.daemon=false"

# Reduced JVM heap (2GB instead of 4GB)
org.gradle.jvmargs=-Xmx2g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError

# Disable parallel execution (reduces memory pressure)
org.gradle.parallel=false

# Disable daemon (prevents memory accumulation)
org.gradle.daemon=false

# Keep caching enabled (reduces redundant work)
org.gradle.caching=true

# Reduce worker count
org.gradle.workers.max=2

# Configure test JVM memory
systemProp.test.jvmargs=-Xmx512m -Xms256m

# Point to locally downloaded JDK
org.gradle.java.installations.paths=/usr/lib/jvm/java-21-openjdk-amd64
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=false

# Build scan disabled for local runs
org.gradle.scan.enabled=false
