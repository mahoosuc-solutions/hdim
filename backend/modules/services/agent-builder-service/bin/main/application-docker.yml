# Docker Profile Configuration for Agent Builder Service
# Overrides default settings for containerized deployment

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/agent_db
    username: healthdata
    password: healthdata_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate

hdim:
  agent-runtime:
    url: ${HDIM_AGENT_RUNTIME_URL:http://agent-runtime-service:8095}

  services:
    agent-runtime:
      url: ${HDIM_AGENT_RUNTIME_URL:http://agent-runtime-service:8095}

logging:
  level:
    com.healthdata: INFO
    org.springframework: WARN
    org.hibernate: WARN
