spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/agent_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-256-bits

hdim:
  agent-runtime:
    url: http://localhost:8095

  agent-builder:
    max-agents-per-tenant: 50
    max-versions-per-agent: 100
