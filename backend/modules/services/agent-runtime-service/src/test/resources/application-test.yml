# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test


spring:
  application:
    name: agent-runtime-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/agent_runtime_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    admin:
      auto-create: true
    listener:
      auto-startup: false
    producer:
      properties:
        interceptor.classes: ""
    consumer:
      properties:
        interceptor.classes: ""
audit:
  kafka:
    consumer:
      enabled: false
    sync: true
logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO

hdim:
  agent:
    config-listener:
      enabled: false
    custom:
      warm-cache: false
    security:
      encryption:
        master-key: test-master-key
        salt: test-salt
  approval:
    kafka-listener:
      enabled: false

tracing:
  enabled: false
