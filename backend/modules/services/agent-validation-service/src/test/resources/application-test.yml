spring:
  application:
    name: agent-validation-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
    open-in-view: false
  liquibase:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 0

# HDIM Validation Configuration (simplified for tests)
hdim:
  validation:
    orchestrator:
      max-concurrent-tests: 2
      test-timeout-seconds: 30
      default-pass-threshold: 0.80
    jaeger:
      api-url: http://localhost:16686
      trace-fetch-timeout-seconds: 5
    evaluation:
      harness-url: http://localhost:8500
      timeout-seconds: 10
    reflection:
      enabled: false
      calibration-threshold: 0.15
    regression:
      similarity-threshold: 0.85
      quality-degradation-threshold: 0.10
    qa:
      auto-flag-score-threshold: 0.70
      auto-flag-metric-threshold: 0.70
      confidence-miscalibration-threshold: 0.20
    providers:
      comparison-enabled: false

  services:
    agent-runtime:
      url: http://localhost:8088
    approval:
      url: http://localhost:8097
    jaeger:
      url: http://localhost:16686

# Disable circuit breakers for tests
resilience4j:
  circuitbreaker:
    instances:
      agent-runtime:
        registerHealthIndicator: false
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 1s
      jaeger-api:
        registerHealthIndicator: false
      evaluation-harness:
        registerHealthIndicator: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging (minimal for tests)
logging:
  level:
    root: WARN
    com.healthdata.agentvalidation: DEBUG
    org.springframework: WARN
    org.hibernate: WARN
