spring:
  application:
    name: ai-assistant-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hdim}
    username: ${DB_USERNAME:hdim}
    password: ${DB_PASSWORD:hdim}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      pool-name: HikariPool-AI
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50

  # Redis Cache Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Server Configuration
server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /

# Claude AI Configuration
claude:
  enabled: ${CLAUDE_ENABLED:false}
  api-key: ${ANTHROPIC_API_KEY:}
  api-url: https://api.anthropic.com/v1
  model: ${CLAUDE_MODEL:claude-3-5-sonnet-20241022}
  max-tokens: ${CLAUDE_MAX_TOKENS:4096}
  temperature: ${CLAUDE_TEMPERATURE:0.3}
  timeout-seconds: 60
  max-retries: 3
  rate-limit-per-minute: 60
  caching-enabled: true
  cache-ttl-seconds: 300
  debug-logging: ${CLAUDE_DEBUG:false}

# JWT Configuration (for authentication)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 604800

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Logging Configuration
logging:
  level:
    root: INFO
    com.healthdata.aiassistant: DEBUG
    org.springframework.web.reactive: DEBUG

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      claude:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
  ratelimiter:
    instances:
      claude:
        limitForPeriod: 60
        limitRefreshPeriod: 60s
        timeoutDuration: 5s

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
