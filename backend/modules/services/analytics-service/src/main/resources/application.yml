server:
  port: 8088
  servlet:
    context-path: /analytics

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5435/healthdata_analytics
    username: healthdata
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  data:
    redis:
      host: localhost
      port: 6381
      timeout: 2000ms

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
