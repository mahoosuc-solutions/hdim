# JWT Authentication Configuration for Tests
# Note: Two JWT config classes exist - JwtConfig (prefix: jwt) and SecurityProperties (prefix: healthdata.security)
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 15m
  refresh-token-expiration: 7d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

healthdata:
  database:
    enabled: true
    hikari:
      traffic-tier: LOW  # Minimal connections for tests
  security:
    jwt:
      secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      expiration: 1h
      issuer: healthdata-in-motion-test


spring:
  application:
    name: approval-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/approval_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: true
logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO
