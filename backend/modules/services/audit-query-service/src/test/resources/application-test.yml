# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: audit-query-service-test

  # Use single test datasource (no multi-tenancy for tests)
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: healthdata
    password:
    hikari:
      maximum-pool-size: 5

# Configure persistence module to use testcontainers
healthdata:
  persistence:
    primary:
      url: jdbc:tc:postgresql:16-alpine:///testdb
      username: healthdata
      password:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      pool-name: test-pool
      maximum-pool-size: 5
      minimum-idle: 2
    rls-enabled: false
    jpa:
      auditing-enabled: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # Disable Kafka for tests (we're not testing Kafka consumer)
  kafka:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # Disable Redis for tests (we're not testing cache)
  data:
    redis:
      enabled: false
  cache:
    type: none

# Audit query service specific configuration
audit-query:
  retention:
    years: 7
    cleanup-cron: "-"  # Disabled for tests
  export:
    max-records: 100000
    temp-directory: /tmp/audit-exports
  projection:
    daily-rollup-cron: "-"  # Disabled for tests

logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO
    liquibase: INFO
