server:
  port: 8111
  servlet:
    context-path: /care-gap-event

spring:
  application:
    name: care-gap-event-service

  main:
    allow-bean-definition-overriding: true  # Allow handler lib repos to override event service repos

  # Disable Redis autoconfiguration (event services don't use cache)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/care_gap_event_db}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    # ⚠️ SECURITY: Password MUST be provided via environment variable
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # Kafka configuration for event consumption
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: care-gap-event-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # HIPAA Compliance: Propagate user context via headers for audit trail
        interceptor.classes: com.healthdata.eventsourcing.kafka.UserContextKafkaInterceptor

  # Cache Configuration
  # No caching for event services (projection read model)
  cache:
    type: none

# Event Store Service Configuration
event-store:
  service:
    url: http://${EVENT_STORE_HOST:localhost}:${EVENT_STORE_PORT:8090}

# JWT Configuration (mapped from JWT_SECRET environment variable)
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm123456}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: MEDIUM  # CQRS read model: event-driven projections

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  flyway:
    enabled: false

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
