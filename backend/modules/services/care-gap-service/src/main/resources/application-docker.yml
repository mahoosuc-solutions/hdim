# Docker-specific configuration for Care Gap Service
server:
  port: 8086
  servlet:
    context-path: /care-gap

spring:
  application:
    name: care-gap-service

  # Note: This service uses JWT authentication via Gateway service
  # No local UserDetailsService needed

  datasource:
    url: jdbc:postgresql://postgres:5432/healthdata_cql  # Shared database with cql-engine-service
    username: healthdata
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes for care gap results

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: care-gap-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# FHIR Server Configuration
fhir:
  server:
    url: http://fhir-service:8083/fhir

# Patient Service Configuration
patient:
  service:
    url: http://patient-service:8084/patient

# CQL Engine Configuration
cql:
  engine:
    url: http://cql-engine-service:8081/cql-engine

# Quality Measure Configuration
quality-measure:
  service:
    url: http://quality-measure-service:8087

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
      patient-service:
        url: http://patient-service:8084
        connectTimeout: 5000
        readTimeout: 15000
      cql-engine-service:
        url: http://cql-engine-service:8081
        connectTimeout: 5000
        readTimeout: 30000  # CQL evaluation can take longer

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  login:
    per-minute: 5
    per-hour: 20
  register:
    per-hour: 3
  api:
    per-minute: 100

# Health Check Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true

# OpenTelemetry Tracing Configuration
tracing:
  enabled: true
  url: ${TRACING_URL:http://jaeger:4318/v1/traces}

# Logging for Docker
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.data.redis: INFO
    org.apache.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
