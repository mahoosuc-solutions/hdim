server:
  port: 8086
  servlet:
    context-path: /care-gap

spring:
  application:
    name: care-gap-service

  # Spring Cloud compatibility check - disable for Spring Boot 3.5.x until Spring Cloud updates
  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_care_gap}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    # ⚠️ SECURITY: Password MUST be provided via environment variable
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# FHIR Server Configuration
fhir:
  server:
    url: http://localhost:8085/fhir

# Patient Service Configuration
patient:
  service:
    url: http://localhost:8084/patient

# CQL Engine Configuration
cql:
  engine:
    url: http://localhost:8081/cql-engine

# Quality Measure Configuration
quality-measure:
  service:
    url: http://localhost:8087

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
      patient-service:
        url: http://localhost:8084
        connectTimeout: 5000
        readTimeout: 15000
      cql-engine-service:
        url: http://localhost:8081
        connectTimeout: 5000
        readTimeout: 30000  # CQL evaluation can take longer

# Cache Configuration (Redis)
spring.cache:
  type: redis
  redis:
    time-to-live: 300000  # 5 minutes for care gap results

# Kafka Configuration
spring.kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
  consumer:
    group-id: care-gap-service
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  login:
    per-minute: 5
    per-hour: 20
  register:
    per-hour: 3
  api:
    per-minute: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
