# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: care-gap-service

  # Disable Spring Boot auto-configurations for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration

  # Database Configuration - H2 in-memory for tests (no Docker required)
  datasource:
    url: jdbc:h2:mem:caregap_test_db;MODE=PostgreSQL;TRACE_LEVEL_SYSTEM_OUT=0
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Use create-drop for tests
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  liquibase:
    enabled: false  # Disable Liquibase in tests - use JPA schema generation instead
  # Redis - Embedded for tests
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka Configuration for Tests
  kafka:
    bootstrap-servers: 127.0.0.1:9092  # Local kafka or mock
    consumer:
      auto-offset-reset: earliest
      group-id: test-consumer-group
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 0
  # Disable kafka auto-configuration to avoid broker startup if not using embedded kafka
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Security - AUTHENTICATION IS ALWAYS ENABLED IN TEST PROFILE
# This is REQUIRED to properly test tenant isolation security controls
security:
  enabled: true
