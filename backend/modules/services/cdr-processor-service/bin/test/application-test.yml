# JWT Authentication Configuration for Tests
# Note: Two JWT config classes exist - JwtConfig (prefix: jwt) and SecurityProperties (prefix: healthdata.security)
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 15m
  refresh-token-expiration: 7d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

healthdata:
  database:
    enabled: true
    hikari:
      traffic-tier: LOW  # Minimal connections for tests
  persistence:
    primary:
      url: jdbc:h2:mem:cdr_test;MODE=PostgreSQL;TRACE_LEVEL_SYSTEM_OUT=0
      username: sa
      password:
      driver-class-name: org.h2.Driver
  security:
    jwt:
      secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      expiration: 1h
      issuer: healthdata-in-motion-test


spring:
  application:
    name: cdr-processor-service-test

  # Disable Spring Boot auto-configurations for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration

  datasource:
    url: jdbc:h2:mem:cdr_test;MODE=PostgreSQL;TRACE_LEVEL_SYSTEM_OUT=0
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Auto-create schema for tests
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: false  # Disable Liquibase for tests - use Hibernate auto-DDL instead
logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO
