# JWT Authentication Configuration for Tests
# Note: Two JWT config classes exist - JwtConfig (prefix: jwt) and SecurityProperties (prefix: healthdata.security)
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 15m
  refresh-token-expiration: 7d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

healthdata:
  security:
    jwt:
      secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      expiration: 1h
      issuer: healthdata-in-motion-test


spring:
  application:
    name: cdr-processor-service-test

  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: false

logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO
