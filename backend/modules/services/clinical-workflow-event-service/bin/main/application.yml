spring:
  application:
    name: clinical-workflow-event-service
  datasource:
    url: jdbc:postgresql://localhost:5435/workflow_db
    username: healthdata
    password: healthdata_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      bootstrap-servers: localhost:9094
      group-id: workflow-event-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.healthdata.workflow.*"
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8093
  compression:
    enabled: true

logging:
  level:
    root: INFO
    com.healthdata: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

app:
  name: clinical-workflow-event-service
  version: 5.0.0

---
# Docker Profile Configuration
spring:
  config:
    activate:
      on-profile: docker
  application:
    name: clinical-workflow-event-service
  datasource:
    url: jdbc:postgresql://postgres:5432/workflow_db
    username: healthdata
    password: healthdata_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public
  kafka:
    bootstrap-servers: kafka:29092

server:
  port: 8093
