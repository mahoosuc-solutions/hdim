spring:
  profiles:
    active: prod

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/clinical_workflow_db
    username: ${POSTGRES_USER:healthdata}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9094}

logging:
  level:
    com.healthdata: INFO
    org.springframework: WARN
    org.hibernate: WARN

management:
  tracing:
    sampling:
      probability: 0.1  # 10% sampling in production
