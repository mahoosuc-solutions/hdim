name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-ci-cd.yml'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'

env:
  REGISTRY: docker.io
  IMAGE_NAME: cms-connector-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Run unit tests
        run: mvn test

      - name: Generate coverage report
        run: mvn jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: false

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to dev environment
        env:
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEV_DEPLOY_KEY }}
          IMAGE_FULL_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$DEPLOY_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "$DEPLOY_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          
          ssh -i "$HOME/.ssh/deploy_key" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/cms-connector && \
             docker-compose -f docker-compose.dev.yml pull && \
             docker-compose -f docker-compose.dev.yml up -d && \
             docker-compose -f docker-compose.dev.yml exec -T cms-connector curl -f http://localhost:8080/actuator/health || exit 1"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: staging
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging environment
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          IMAGE_FULL_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$DEPLOY_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "$DEPLOY_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          
          ssh -i "$HOME/.ssh/deploy_key" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/cms-connector && \
             docker-compose -f docker-compose.prod.yml pull && \
             docker-compose -f docker-compose.prod.yml up -d && \
             docker-compose -f docker-compose.prod.yml exec -T cms-connector curl -f http://localhost:8080/actuator/health || exit 1"

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, security-scan, deploy-dev, deploy-staging]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check job status
        env:
          BUILD_STATUS: ${{ needs.build-and-test.result }}
          DOCKER_STATUS: ${{ needs.docker-build.result }}
          SECURITY_STATUS: ${{ needs.security-scan.result }}
          DEV_STATUS: ${{ needs.deploy-dev.result }}
          STAGING_STATUS: ${{ needs.deploy-staging.result }}
        run: |
          echo "Pipeline Summary:"
          echo "=================="
          echo "Build & Test: $BUILD_STATUS"
          echo "Docker Build: $DOCKER_STATUS"
          echo "Security Scan: $SECURITY_STATUS"
          echo "Dev Deployment: $DEV_STATUS"
          echo "Staging Deployment: $STAGING_STATUS"
          
          if [ "$BUILD_STATUS" = "failure" ] || [ "$DOCKER_STATUS" = "failure" ] || [ "$SECURITY_STATUS" = "failure" ]; then
            echo "Pipeline failed - check logs for details"
            exit 1
          fi
