# Production Environment Configuration
# CMS Connector Service - Live API Integration
# Environment: Production

spring:
  application:
    name: cms-connector-service
    version: 1.0.0

  # PostgreSQL Production Database
  datasource:
    url: ${DB_URL:jdbc:postgresql://cms-prod-db.internal:5432/cms_production}
    username: ${DB_USER:cms_service}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      max-lifetime: 1800000 # 30 minutes
      connection-timeout: 10000
      idle-timeout: 600000
      leak-detection-threshold: 60000

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    locations: classpath:/db/migration
    sql-migration-prefix: V
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    placeholders:
      app_role: cms_service
      audit_role: cms_auditor

  jpa:
    hibernate:
      ddl-auto: validate # Production: only validate, no auto-create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        jdbc:
          batch_size: 100
          fetch_size: 100
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # Production Redis Cache
  redis:
    host: ${REDIS_HOST:cms-redis.internal}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000
    lettuce:
      pool:
        max-active: 50
        max-idle: 10
        min-idle: 5
        max-wait: -1ms

  # Production Security
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://auth.cms.gov}
          jwk-set-uri: ${JWT_JWK_SET_URI:https://auth.cms.gov/.well-known/jwks.json}

# CMS APIs - Production Endpoints
cms:
  bcda:
    enabled: true
    sandbox: false
    base-url: ${BCDA_URL:https://api.bcda.cms.gov}
    oauth2:
      token-endpoint: ${BCDA_TOKEN_URL:https://api.bcda.cms.gov/auth/token}
      client-id: ${BCDA_CLIENT_ID:}
      client-secret: ${BCDA_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read
    timeout:
      connect-ms: 5000
      read-ms: 30000
    retry:
      max-attempts: 3
      backoff-ms: 1000
    circuit-breaker:
      failure-threshold: 5
      delay-ms: 60000

  dpc:
    enabled: true
    sandbox: false
    base-url: ${DPC_URL:https://api.dpc.cms.gov}
    oauth2:
      token-endpoint: ${DPC_TOKEN_URL:https://api.dpc.cms.gov/auth/token}
      client-id: ${DPC_CLIENT_ID:}
      client-secret: ${DPC_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read
    timeout:
      connect-ms: 3000
      read-ms: 10000
    retry:
      max-attempts: 3
      backoff-ms: 500
    circuit-breaker:
      failure-threshold: 5
      delay-ms: 60000

  ab2d:
    enabled: true
    sandbox: false
    base-url: ${AB2D_URL:https://api.ab2d.cms.gov}
    oauth2:
      token-endpoint: ${AB2D_TOKEN_URL:https://api.ab2d.cms.gov/auth/token}
      client-id: ${AB2D_CLIENT_ID:}
      client-secret: ${AB2D_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read
    timeout:
      connect-ms: 5000
      read-ms: 30000
    retry:
      max-attempts: 3
      backoff-ms: 1000
    circuit-breaker:
      failure-threshold: 5
      delay-ms: 60000

# Scheduled Sync Configuration
scheduling:
  bcda-sync:
    enabled: true
    cron: "0 0 2 * * ?" # Daily at 2 AM
    batch-size: 1000
    timeout-minutes: 120

  dpc-sync:
    enabled: false # On-demand only for real-time
    batch-size: 100
    timeout-minutes: 5

  ab2d-sync:
    enabled: true
    cron: "0 0 3 * * ?" # Daily at 3 AM
    batch-size: 500
    timeout-minutes: 90

# Health Check Configuration
health:
  db:
    enabled: true
    timeout-ms: 5000

  redis:
    enabled: true
    timeout-ms: 2000

  bcda-api:
    enabled: true
    timeout-ms: 10000

  dpc-api:
    enabled: true
    timeout-ms: 5000

  ab2d-api:
    enabled: true
    timeout-ms: 10000

# Monitoring and Observability
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,env
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db

  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    defaults:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: cms-connector-service
      environment: production
      version: 1.0.0
    distribution:
      percentiles-histogram:
        http.server.requests: true
        cms.import.duration: true
        cms.sync.duration: true
        cms.claim.validation.duration: true
      slo:
        http.server.requests: 100ms,200ms,500ms,1s,2s
        cms.sync.duration: 1000ms,5000ms,10000ms,30000ms
        cms.claim.validation.duration: 100ms,500ms,1000ms,5000ms

  # Enhanced health indicators
  endpoints:
    health:
      corsAllowedOrigins: "*"

# Logging Configuration
logging:
  level:
    root: INFO
    com.healthdata.cms: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: /var/log/cms-connector/cms-connector.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api/v1

  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 30000
    max-connections: 10000

  compression:
    enabled: true
    min-response-size: 1024

# JPA/Hibernate Configuration
jpa:
  show-sql: false
  properties:
    hibernate:
      format_sql: false
      use_sql_comments: false

# Error Handling
error:
  include-message: when-param
  include-stacktrace: never
  include-binding-errors: never
