# Staging Environment Configuration
# CMS Connector Service - Testing with Real Sandbox APIs
# Environment: Staging (BCDA/DPC sandbox, but production database)

spring:
  application:
    name: cms-connector-service
    version: 1.0.0

  # PostgreSQL Staging Database
  datasource:
    url: ${DB_URL:jdbc:postgresql://cms-staging-db.internal:5432/cms_staging}
    username: ${DB_USER:cms_service}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      max-lifetime: 1800000
      connection-timeout: 10000

  # Liquibase Database Migration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate # Staging: validate schema via Flyway
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
    show-sql: false

  # Staging Redis Cache
  redis:
    host: ${REDIS_HOST:cms-staging-redis.internal}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 3000

# CMS APIs - Staging with Sandbox Endpoints
cms:
  bcda:
    enabled: true
    sandbox: true # Use sandbox API
    base-url: ${BCDA_URL:https://sandbox.bcda.cms.gov}
    oauth2:
      token-endpoint: ${BCDA_TOKEN_URL:https://sandbox.bcda.cms.gov/auth/token}
      client-id: ${BCDA_CLIENT_ID:}
      client-secret: ${BCDA_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read
    timeout:
      connect-ms: 5000
      read-ms: 30000
    retry:
      max-attempts: 3
      backoff-ms: 1000
    circuit-breaker:
      failure-threshold: 5
      delay-ms: 60000

  dpc:
    enabled: true
    sandbox: true # Use sandbox API
    base-url: ${DPC_URL:https://sandbox.dpc.cms.gov}
    oauth2:
      token-endpoint: ${DPC_TOKEN_URL:https://sandbox.dpc.cms.gov/auth/token}
      client-id: ${DPC_CLIENT_ID:}
      client-secret: ${DPC_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read
    timeout:
      connect-ms: 3000
      read-ms: 10000
    retry:
      max-attempts: 3
      backoff-ms: 500

  ab2d:
    enabled: true
    sandbox: true # Use sandbox API
    base-url: ${AB2D_URL:https://sandbox.ab2d.cms.gov}
    oauth2:
      token-endpoint: ${AB2D_TOKEN_URL:https://sandbox.ab2d.cms.gov/auth/token}
      client-id: ${AB2D_CLIENT_ID:}
      client-secret: ${AB2D_CLIENT_SECRET:}
      scope: system/Claim.read patient/*.read

# Scheduled Sync Configuration - Staging
scheduling:
  bcda-sync:
    enabled: true
    cron: "0 */4 * * * ?" # Every 4 hours in staging
    batch-size: 500

  dpc-sync:
    enabled: false

  ab2d-sync:
    enabled: true
    cron: "0 */6 * * * ?" # Every 6 hours in staging

# Health Check Configuration
health:
  db:
    enabled: true
  redis:
    enabled: true
  bcda-api:
    enabled: true
  dpc-api:
    enabled: true
  ab2d-api:
    enabled: true

# Monitoring and Observability
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,env,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      environment: staging

# Logging Configuration - More Verbose in Staging
logging:
  level:
    root: INFO
    com.healthdata.cms: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api/v1
