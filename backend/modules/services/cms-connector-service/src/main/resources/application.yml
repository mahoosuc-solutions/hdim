spring:
  application:
    name: cms-connector-service
    version: 1.0.1-SNAPSHOT

  # Default profile configuration
  profiles:
    active: dev

---

# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/cms_development
    username: cms_dev_user
    password: dev_password_change_me
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (CMS connector)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections)
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  redis:
    host: localhost
    port: 6379

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: INFO
    com.healthdata.cms: DEBUG

# CMS OAuth2 Configuration (Development)
cms:
  oauth2:
    client-id: ${CMS_OAUTH2_CLIENT_ID:dev-client-id}
    client-secret: ${CMS_OAUTH2_CLIENT_SECRET:dev-client-secret}
    token-endpoint: https://sandbox.cms.gov/oauth/token
    scopes: beneficiary-claims
    token-refresh-interval: 3000000  # 50 minutes in ms

---

# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cms_production}
    username: ${SPRING_DATASOURCE_USERNAME:cms_service}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (CMS connector)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections)
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info

logging:
  level:
    root: WARN
    com.healthdata.cms: INFO

# CMS OAuth2 Configuration (Production)
cms:
  oauth2:
    client-id: ${CMS_OAUTH2_CLIENT_ID}
    client-secret: ${CMS_OAUTH2_CLIENT_SECRET}
    token-endpoint: https://api.cms.gov/oauth/token
    scopes: beneficiary-claims
    token-refresh-interval: 3000000  # 50 minutes in ms

---

# Test Profile
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  redis:
    host: localhost
    port: 6379

server:
  port: 8080

# CMS OAuth2 Configuration (Test)
cms:
  oauth2:
    client-id: test-client-id
    client-secret: test-client-secret
    token-endpoint: http://localhost:8888/oauth/token
    scopes: test-scope
    token-refresh-interval: 3000000  # 50 minutes in ms

logging:
  level:
    root: WARN
