server:
  port: 8082
  servlet:
    context-path: /consent

spring:
  application:
    name: consent-service
  main:
    allow-bean-definition-overriding: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_consent}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    # ⚠️ SECURITY: Password MUST be provided via environment variable
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      # Liquibase handles all schema management and validation
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Disable Liquibase's SessionFactoryObserver schema validation
        # that runs even when ddl-auto is 'none'. This prevents validation
        # of User entity against the wrong database.
        jakarta.persistence.schema-generation.database.action: none
        jakarta.persistence.schema-generation.create-source: none
        jakarta.persistence.schema-generation.drop-source: none
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # Consent management: <10 req/sec, simple queries

# HIPAA Audit Configuration
audit:
  enabled: true
  retention-days: 2555  # 7 years for HIPAA
  include-phi: false
  kafka:
    enabled: true
    topic:
      ai-decisions: ai.agent.decisions
      config-changes: configuration.engine.changes
      user-actions: user.configuration.actions

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      consentDefault:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5

  retry:
    instances:
      consentDefault:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      consentDefault:
        timeoutDuration: 30s
        cancelRunningFuture: true

  ratelimiter:
    instances:
      consentDefault:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
