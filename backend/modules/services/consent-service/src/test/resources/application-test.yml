server:
  port: 0

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 15m
  refresh-token-expiration: 7d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

healthdata:
  database:
    enabled: true
    hikari:
      traffic-tier: LOW  # Minimal connections for tests
  security:
    jwt:
      secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      expiration: 1h
      issuer: healthdata-in-motion-test

spring:
  application:
    name: consent-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/consent_db
    username: healthdata
    password: healthdata_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      auto-offset-reset: earliest
      group-id: consent-test-group
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    root: WARN
    com.healthdata.consent: INFO
    org.springframework.test: INFO
