databaseChangeLog:
  - changeSet:
      id: 0004-create-optimization-recommendation-table
      author: hdim
      changes:
        - createTable:
            tableName: optimization_recommendation
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: service_name
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: recommendation_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: estimated_savings
                  type: numeric(14, 2)
                  constraints:
                    nullable: false
              - column:
                  name: actual_savings
                  type: numeric(14, 2)
              - column:
                  name: savings_currency
                  type: varchar(8)
              - column:
                  name: savings_timeframe
                  type: varchar(32)
              - column:
                  name: confidence_score
                  type: numeric(5, 2)
              - column:
                  name: implementation_effort
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: risk_level
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: implementation_date
                  type: timestamptz
        - createIndex:
            indexName: idx_opt_tenant_status
            tableName: optimization_recommendation
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status
        - createIndex:
            indexName: idx_opt_tenant_service
            tableName: optimization_recommendation
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: service_name
      rollback:
        - dropTable:
            tableName: optimization_recommendation
