# Test configuration for CQL Engine Service Integration Tests
# Uses H2 in-memory database with PostgreSQL compatibility mode

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    username: sa
    password:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop  # Auto-create schema from entities
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  h2:
    console:
      enabled: false

  liquibase:
    enabled: false  # Not needed for tests - using JPA auto-schema

  cache:
    type: simple  # Use simple cache instead of Redis for tests

  # Disable Redis autoconfiguration for tests (mock RedisTemplate provided by TestRedisConfiguration)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # Security Configuration for Tests
  security:
    enabled: false  # Security disabled but JWT beans needed for context loading

  main:
    allow-bean-definition-overriding: true  # Allow test beans to override production beans

# Visualization/Kafka Configuration for tests
visualization:
  kafka:
    enabled: false  # Disable Kafka consumer for tests (WebSocket visualization not needed)
    topics:
      batch-progress: test-batch-progress
      evaluation-update: test-evaluation-update
      evaluation-started: test-evaluation-started
      evaluation-completed: test-evaluation-completed
      evaluation-failed: test-evaluation-failed

logging:
  level:
    root: WARN
    com.healthdata.cql: DEBUG
    org.springframework.test: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
