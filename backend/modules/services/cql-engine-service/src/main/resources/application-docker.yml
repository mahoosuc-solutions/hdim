# Docker Profile Configuration for CQL Engine Service
# This profile is activated when running in Docker containers

spring:
  application:
    name: cql-engine-service

  # Security Configuration
  # ⚠️ SECURITY: Credentials MUST be provided via environment variables
  # Never hardcode credentials in configuration files
  security:
    user:
      name: ${SERVICE_AUTH_USERNAME:}
      password: ${SERVICE_AUTH_PASSWORD:}

  # Database Configuration (environment variables from docker-compose)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/healthdata_cql}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        default_schema: public

  # Liquibase
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: ${SPRING_CACHE_REDIS_TIME_TO_LIVE:86400000} # 24 hours
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "cql-engine:"

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
        batch.size: 16384
    consumer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      group-id: cql-engine-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# Server Configuration
server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# CORS Configuration for development
cors:
  allowed-origins: "http://localhost:4200,http://localhost:3000,http://localhost:5173"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  allowed-headers: "*"
  exposed-headers: "Authorization,X-Tenant-ID"
  allow-credentials: true
  max-age: 3600

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
      base-path: /actuator
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: docker

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.healthdata.cql: ${LOGGING_LEVEL_COM_HEALTHDATA_CQL:DEBUG}
    org.springframework.web: INFO
    org.springframework.cloud.openfeign: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/cql-engine-service.log
    max-size: 10MB
    max-history: 10
    total-size-cap: 100MB

# FHIR Service Client Configuration
fhir:
  server:
    url: ${FHIR_SERVICE_URL:http://fhir-service-mock:8080/fhir}
    timeout: ${FHIR_SERVICE_TIMEOUT:30000}

# Async Configuration
async:
  measure-evaluation:
    core-pool-size: ${MEASURE_EVALUATION_CORE_POOL_SIZE:10}
    max-pool-size: ${MEASURE_EVALUATION_MAX_POOL_SIZE:50}
    queue-capacity: ${MEASURE_EVALUATION_QUEUE_CAPACITY:500}
    thread-name-prefix: "measure-eval-"

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: true

# Visualization configuration for real-time data processing monitoring
visualization:
  websocket:
    enabled: true
    allowed-origins: "http://localhost:4200,http://localhost:3000,http://localhost:5173,http://localhost:8082,http://localhost:3002"
  kafka:
    enabled: ${VISUALIZATION_KAFKA_ENABLED:true}  # Enable Kafka consumer for WebSocket streaming
    topics:
      evaluation-started: "evaluation.started"
      evaluation-completed: "evaluation.completed"
      evaluation-failed: "evaluation.failed"
      batch-progress: "batch.progress"
      cache-event: "cache.event"
      template-loaded: "template.loaded"
  batch-progress:
    emit-interval-seconds: 5
    emit-every-n-patients: 10

# Audit Configuration for Healthcare Compliance
audit:
  kafka:
    topic: "healthdata.audit.events"
    enabled: ${AUDIT_ENABLED:true}
  data-flow-tracking:
    enabled: ${AUDIT_DATA_FLOW_ENABLED:true}
    max-steps: 50 # Maximum data flow steps to track per evaluation
