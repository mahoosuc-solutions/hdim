spring:
  application:
    name: data-enrichment-service

  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthdata_enrichment}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (data enrichment)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections)
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Liquibase Configuration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # Disable Flyway (using Liquibase instead)
  flyway:
    enabled: false

  # Redis for caching
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ⚠️ HIPAA COMPLIANCE: PHI cache TTL must be ≤ 5 minutes (300000ms)
  # See: backend/HIPAA-CACHE-COMPLIANCE.md
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes (HIPAA compliant for PHI)

  # Kafka configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Distributed tracing: Propagate trace context through Kafka messages
        interceptor.classes: com.healthdata.tracing.KafkaProducerTraceInterceptor
    consumer:
      group-id: data-enrichment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Distributed tracing: Extract trace context from Kafka messages
        interceptor.classes: com.healthdata.tracing.KafkaConsumerTraceInterceptor

server:
  port: 8089
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.healthdata.enrichment: DEBUG
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# NLP Configuration
enrichment:
  nlp:
    enabled: true
    confidence-threshold: 0.7
  cache:
    terminology-ttl: 86400 # 24 hours
  async:
    enabled: true
    large-document-threshold: 10000 # characters
