spring:
  application:
    name: data-ingestion-service

  # Disable JPA and database entirely (stateless service with in-memory tracking)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  liquibase:
    enabled: false

server:
  port: 8080

# Downstream service URLs
fhir:
  service:
    url: http://localhost:8085/fhir

care-gap:
  service:
    url: http://localhost:8086/care-gap

quality-measure:
  service:
    url: http://localhost:8087/quality-measure

# OpenTelemetry distributed tracing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0  # Sample all traces (100%)

# Logging configuration
logging:
  level:
    root: INFO
    com.healthdata.ingestion: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

---
# Docker profile - used when running in Docker container
spring:
  config:
    activate:
      on-profile: docker

fhir:
  service:
    url: http://fhir-service:8085/fhir

care-gap:
  service:
    url: http://care-gap-service:8086/care-gap

quality-measure:
  service:
    url: http://quality-measure-service:8087/quality-measure
