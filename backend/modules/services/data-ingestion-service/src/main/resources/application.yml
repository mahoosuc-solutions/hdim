spring:
  application:
    name: data-ingestion-service

  # Database Configuration (dedicated schema for ingestion tracking)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/data_ingestion_db
    username: ${DB_USER:healthdata}
    password: ${DB_PASSWORD:healthdata123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC
    show-sql: false

  # Liquibase Configuration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: public

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# OpenTelemetry Tracing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Data Ingestion Configuration
ingestion:
  # Patient generation limits
  min-patients: 10
  max-patients: 10000
  default-patients: 500
  
  # Service URLs (configurable for different environments)
  fhir-service-url: ${FHIR_SERVICE_URL:http://localhost:8085/fhir}
  care-gap-service-url: ${CARE_GAP_SERVICE_URL:http://localhost:8086/care-gap}
  quality-measure-service-url: ${QUALITY_MEASURE_SERVICE_URL:http://localhost:8087/quality-measure}
  
  # Batch processing
  batch-size: 50  # Process 50 patients at a time
  
  # Verbose logging for demonstrations
  verbose-logging: ${ENABLE_DETAILED_METRICS:true}

# Logging Configuration
logging:
  level:
    com.healthdata.ingestion: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
