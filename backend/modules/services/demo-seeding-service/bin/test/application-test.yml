server:
  port: 0

spring:
  application:
    name: demo-seeding-service-test

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_db
    username: ${SPRING_DATASOURCE_USERNAME:test}
    password: ${SPRING_DATASOURCE_PASSWORD:test}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
  cache:
    type: simple

demo:
  snapshots:
    directory: ./test-snapshots
  database:
    name: testdb
  generation:
    default-care-gap-percentage: 28
    default-patient-count: 100
  cache:
    warmup:
      enabled: false
  persistence:
    enabled: false
  services:
    fhir-service:
      url: http://localhost:9999/fhir
    care-gap-service:
      url: http://localhost:9999/care-gap
    gateway-service:
      url: http://localhost:9999

logging:
  level:
    root: WARN
    com.healthdata.demo: INFO
    org.hibernate.SQL: WARN
