server:
  port: 8098
  servlet:
    context-path: /demo

spring:
  application:
    name: demo-seeding-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_demo?sslmode=disable}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:healthdata_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (demo data generation)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections) - FIXED from 600000
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        # Connection release mode for batch operations
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  cache:
    type: simple

# Demo-specific configuration
demo:
  snapshots:
    directory: ${DEMO_SNAPSHOTS_DIR:./demo-snapshots}
  database:
    name: ${POSTGRES_DB:healthdata_demo}
  generation:
    default-care-gap-percentage: 28
    default-patient-count: 5000
    batch-size: 100
  # Cache warmup on startup
  cache:
    warmup:
      enabled: ${DEMO_CACHE_WARMUP:true}
  # Performance tuning
  performance:
    parallel-generation: true
    max-concurrent-requests: 16
  # Enable persistence to downstream services (FHIR, Care Gap)
  persistence:
    enabled: ${DEMO_PERSISTENCE_ENABLED:true}
  # Downstream service URLs
  services:
    fhir:
      internal-url: ${FHIR_SERVICE_URL:http://fhir-service:8085/fhir}
      external-url: ${FHIR_EXTERNAL_URL:}
      target: ${FHIR_TARGET:internal}
    care-gap-service:
      url: ${CARE_GAP_SERVICE_URL:http://care-gap-service:8086/care-gap}
    gateway-service:
      url: ${GATEWAY_SERVICE_URL:http://gateway-service:8080}
    gateway-db:
      url: ${GATEWAY_DB_URL:jdbc:postgresql://postgres:5432/gateway_db}
      username: ${GATEWAY_DB_USER:healthdata}
      password: ${GATEWAY_DB_PASSWORD:healthdata_password}

# Logging
logging:
  level:
    root: INFO
    com.healthdata.demo: DEBUG
    org.hibernate.SQL: WARN

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
