spring:
  application:
    name: documentation-service

  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthdata_docs}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # Documentation: <10 req/sec, simple queries

  # Document Storage Configuration
  document:
    storage:
      base-path: ${DOCUMENT_STORAGE_PATH:/var/lib/healthdata/documents}
      max-file-size: ${DOCUMENT_MAX_FILE_SIZE:10485760}  # 10MB in bytes
      allowed-content-types:
        - application/pdf
        - image/png
        - image/jpeg
        - image/jpg
        - image/tiff

    # OCR Configuration
    ocr:
      enabled: ${OCR_ENABLED:true}
      async: ${OCR_ASYNC:true}  # Process OCR asynchronously
      tesseract:
        language: ${TESSERACT_LANGUAGE:eng}
        oem: ${TESSERACT_OEM:1}  # LSTM engine
        psm: ${TESSERACT_PSM:3}  # Automatic page segmentation
        dpi: ${TESSERACT_DPI:300}  # DPI for PDF rendering

server:
  port: ${SERVER_PORT:8091}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      documentationDefault:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5

  retry:
    instances:
      documentationDefault:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      documentationDefault:
        timeoutDuration: 30s
        cancelRunningFuture: true

  ratelimiter:
    instances:
      documentationDefault:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Logging
logging:
  level:
    com.healthdata.documentation: INFO
    org.springframework.security: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
