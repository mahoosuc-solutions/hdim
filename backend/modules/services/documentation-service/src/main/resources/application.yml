spring:
  application:
    name: documentation-service

  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthdata_docs}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (documentation)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections)
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8091}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      documentationDefault:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5

  retry:
    instances:
      documentationDefault:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      documentationDefault:
        timeoutDuration: 30s
        cancelRunningFuture: true

  ratelimiter:
    instances:
      documentationDefault:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Logging
logging:
  level:
    com.healthdata.documentation: INFO
    org.springframework.security: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
