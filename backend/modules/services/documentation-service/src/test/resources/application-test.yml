# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: documentation-service-test

  # Test database configuration (overridden by Testcontainers)
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///testdb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Disable Redis for tests (use in-memory cache)
  cache:
    type: simple

  # Disable Kafka for tests
  kafka:
    enabled: false

# HealthData Configuration for Tests
healthdata:
  database:
    hikari:
      traffic-tier: LOW

  # Test document storage configuration
  document:
    storage:
      base-path: ${java.io.tmpdir}/test-documents
      max-file-size: 10485760  # 10MB
      allowed-content-types:
        - application/pdf
        - image/png
        - image/jpeg
        - image/jpg
        - image/tiff

    # OCR Configuration for Tests
    ocr:
      enabled: true
      async: false  # Synchronous for easier testing
      tesseract:
        language: eng
        oem: 1  # LSTM engine
        psm: 3  # Automatic page segmentation
        dpi: 300

server:
  port: 0  # Random port for tests

# Logging
logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    com.healthdata.documentation: DEBUG
    org.springframework.security: WARN
    org.springframework.test: INFO
    org.testcontainers: INFO

# Disable Actuator for tests
management:
  endpoints:
    enabled-by-default: false
