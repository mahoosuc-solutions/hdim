server:
  port: 8101

spring:
  application:
    name: ecr-service

  datasource:
    url: jdbc:postgresql://localhost:5432/healthdata
    username: ${DB_USERNAME:healthdata}
    password: ${DB_PASSWORD:healthdata}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ecr
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: ecr

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ecr-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-for-development-only}
  expiration: 86400000

# External Service URLs
services:
  patient-service:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}
  fhir-service:
    url: ${FHIR_SERVICE_URL:http://localhost:8082}

# AIMS Platform Configuration
ecr:
  aims:
    enabled: ${ECR_AIMS_ENABLED:false}
    base-url: ${ECR_AIMS_URL:https://ecr.aimsplatform.org/api}
    client-id: ${ECR_AIMS_CLIENT_ID:}
    client-secret: ${ECR_AIMS_CLIENT_SECRET:}
    submission-endpoint: /eicr/submit
    status-endpoint: /eicr/status
    retry:
      max-attempts: 3
      initial-interval-ms: 1000
      multiplier: 2.0
      max-interval-ms: 30000

  # RCTC (Reportable Condition Trigger Codes) Configuration
  rctc:
    value-set-update-cron: "0 0 2 * * SUN"  # Weekly Sunday 2 AM
    cache-ttl-hours: 168  # 7 days

  # eICR Generation Settings
  eicr:
    author-organization: ${ECR_AUTHOR_ORG:HealthData-in-Motion}
    custodian-oid: ${ECR_CUSTODIAN_OID:2.16.840.1.113883.3.xxx}
    include-phi: true

  # Trigger Categories to Monitor
  triggers:
    categories:
      - diagnosis
      - lab_result
      - medication
      - procedure

  # Urgency-based Processing
  urgency:
    immediate:
      - "Anthrax"
      - "Botulism"
      - "Plague"
      - "Smallpox"
      - "Viral Hemorrhagic Fever"
    within-24-hours:
      - "Measles"
      - "Pertussis"
      - "Meningococcal Disease"
    within-72-hours:
      - "Hepatitis A"
      - "Salmonellosis"
      - "Tuberculosis"

# Resilience4j Configuration
resilience4j:
  retry:
    instances:
      aims-api:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
  circuitbreaker:
    instances:
      aims-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.healthdata.ecr: DEBUG
    org.springframework.kafka: INFO
    org.apache.http: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
