server:
  port: 0  # Random port for tests

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: ehr-connector-service-test

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://localhost:5435/ehr_connector_db
    username: healthdata
    password: healthdata_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaStreamsAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cache:
    type: simple

  # Kafka Configuration (disable for tests)
  kafka:
    producer:
      bootstrap-servers: localhost:9092
    consumer:
      bootstrap-servers: localhost:9092
      auto-offset-reset: earliest

# Cerner Configuration for Tests
cerner:
  fhir:
    base-url: https://fhir-ehr-code.cerner.com/r4/ec2458f2-1e24-41c8-b71b-0e701af7583d
    token-url: https://authorization.cerner.com/oauth2/token
    client-id: test-client-id
    client-secret: test-client-secret
    tenant-id: ec2458f2-1e24-41c8-b71b-0e701af7583d
    scope: system/*.read
    sandbox-mode: true
    connection-timeout: 10000
    read-timeout: 10000
    max-retries: 1
    token-cache-duration: 300

# Epic Configuration for Tests (prefix: epic)
epic:
  base-url: https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4
  token-url: https://fhir.epic.com/interconnect-fhir-oauth/oauth2/token
  client-id: test-epic-client-id
  private-key-path: classpath:test-epic-private-key.pem
  sandbox-mode: true
  request-timeout-seconds: 30
  max-retries: 1

# HIPAA Audit Configuration
audit:
  enabled: false

logging:
  level:
    root: WARN
    com.healthdata.ehr: INFO
    org.springframework.test: INFO
