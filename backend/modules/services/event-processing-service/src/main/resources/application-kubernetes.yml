# Kubernetes profile configuration for event-processing-service
server:
  port: 8083

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/healthdata_events}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:healthdata_dev_password}

  # Disable Flyway and Liquibase - schema already exists
  flyway:
    enabled: false
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# Actuator endpoints for K8s probes
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

intelligence:
  features:
    ingest-enabled: ${INTELLIGENCE_FEATURE_INGEST_ENABLED:false}
    recommendation-review-enabled: ${INTELLIGENCE_FEATURE_RECOMMENDATION_REVIEW_ENABLED:false}
    validation-status-update-enabled: ${INTELLIGENCE_FEATURE_VALIDATION_STATUS_UPDATE_ENABLED:false}
    trust-dashboard-enabled: ${INTELLIGENCE_FEATURE_TRUST_DASHBOARD_ENABLED:false}
    ingest-tenant-allowlist: ${INTELLIGENCE_FEATURE_INGEST_TENANTS:}
    recommendation-review-tenant-allowlist: ${INTELLIGENCE_FEATURE_REVIEW_TENANTS:}
    validation-status-update-tenant-allowlist: ${INTELLIGENCE_FEATURE_VALIDATION_TENANTS:}
    trust-dashboard-tenant-allowlist: ${INTELLIGENCE_FEATURE_TRUST_TENANTS:}
  preflight:
    enabled: ${INTELLIGENCE_PREFLIGHT_ENABLED:true}
    kafka-check:
      enabled: ${INTELLIGENCE_PREFLIGHT_KAFKA_CHECK_ENABLED:true}
      bootstrap-servers: ${INTELLIGENCE_PREFLIGHT_KAFKA_BOOTSTRAP_SERVERS:${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
