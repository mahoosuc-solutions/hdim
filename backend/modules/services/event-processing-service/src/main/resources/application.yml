server:
  port: 8083
  servlet:
    context-path: /events

spring:
  application:
    name: event-processing-service
  main:
    allow-bean-definition-overriding: true

  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_events}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      # Liquibase handles all schema management and validation
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Disable Liquibase's SessionFactoryObserver schema validation
        # that runs even when ddl-auto is 'none'. This prevents validation
        # of User entity against the wrong database.
        jakarta.persistence.schema-generation.database.action: none
        jakarta.persistence.schema-generation.create-source: none
        jakarta.persistence.schema-generation.drop-source: none
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # Event processing pipeline: <10 req/sec, async workflows

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: event-processing-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: event-processing
    distribution:
      percentiles-histogram:
        event.processing.duration: true
      sla:
        event.processing.duration: 10ms,50ms,100ms,500ms,1000ms
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      eventProcessingDefault:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5

  retry:
    instances:
      eventProcessingDefault:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      eventProcessingDefault:
        timeoutDuration: 30s
        cancelRunningFuture: true

  ratelimiter:
    instances:
      eventProcessingDefault:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.apache.kafka: INFO
    io.micrometer: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
