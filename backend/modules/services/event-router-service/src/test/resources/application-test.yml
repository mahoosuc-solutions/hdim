# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test


spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: event-router-test-group
      auto-offset-reset: earliest
    producer:
      bootstrap-servers: localhost:9092

  main:
    allow-bean-definition-overriding: true

logging:
  level:
    root: WARN
    com.healthdata.eventrouter: DEBUG
