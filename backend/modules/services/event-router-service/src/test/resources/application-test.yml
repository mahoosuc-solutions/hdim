spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/event_router_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: event-router-test-group
      auto-offset-reset: earliest
    producer:
      bootstrap-servers: localhost:9092

  main:
    allow-bean-definition-overriding: true

logging:
  level:
    root: WARN
    com.healthdata.eventrouter: DEBUG
