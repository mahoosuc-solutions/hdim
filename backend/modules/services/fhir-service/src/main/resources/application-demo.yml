# Demo profile for FHIR Service
# Use with: --spring.profiles.active=demo
# Tables are created automatically via Hibernate DDL

server:
  port: 8085
  servlet:
    context-path: /fhir

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5435/fhir_db
    username: healthdata
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    change-log: classpath:db/changelog/db.changelog-master.xml
  flyway:
    enabled: false

  cache:
    type: simple

# JWT Configuration
jwt:
  secret: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-demo
  audience: healthdata-api-demo

# Disable HIPAA audit for demo
audit:
  enabled: false

# Disable rate limiting for demo
rate-limiting:
  enabled: false

# Demo-facing base URL for SMART + capability statement
smart:
  base-url: http://localhost:18080/fhir

logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.hibernate.SQL: DEBUG
