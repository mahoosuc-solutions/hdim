initial_prompt: |
  # Gateway Service - API Gateway & Authentication

  ## Service Overview
  **Port**: 8001
  **Context Path**: `/` (root)
  **Purpose**: API gateway, JWT validation, request routing, rate limiting

  ## Key Responsibilities
  - JWT token validation
  - Inject trusted X-Auth-* headers for backend services
  - Request routing to backend services
  - Tenant-based rate limiting
  - API key management (future)

  ## CRITICAL: Gateway Trust Architecture

  This service is the **ONLY** component that validates JWT tokens.
  Backend services trust the headers injected by this gateway.

  ### Authentication Flow
  ```
  Client
    → Gateway (validates JWT)
      → Injects X-Auth-* headers
        → Backend Service (trusts headers)
  ```

  ## Injected Headers

  | Header | Description |
  |--------|-------------|
  | X-Auth-User-Id | User's UUID |
  | X-Auth-Username | User's login name |
  | X-Auth-Tenant-Ids | Comma-separated authorized tenants |
  | X-Auth-Roles | Comma-separated roles |
  | X-Auth-Validated | HMAC signature (production only) |

  ## Key Components

  ### GatewayAuthenticationFilter
  - Validates JWT from Authorization header
  - Extracts user info from JWT claims
  - Injects X-Auth-* headers
  - Generates HMAC signature for production

  ### ApiGatewayController
  - Routes requests to backend services
  - Preserves X-Auth-* headers
  - Handles errors and timeouts

  ### TenantRateLimitFilter (planned)
  - Tenant-based rate limiting
  - Prevents abuse
  - Configurable limits per tenant

  ## Tech Stack
  - Java 21, Spring Boot 3.x
  - JWT (io.jsonwebtoken:jjwt)
  - RestTemplate for service routing

  ## Critical Requirements

  ### JWT Validation
  - Validate signature using JWT_SECRET
  - Check expiration (exp claim)
  - Extract user info from claims (sub, username, tenant_ids, roles)

  ### HMAC Signing (Production)
  - Generate HMAC signature for X-Auth-Validated header
  - Use GATEWAY_AUTH_SIGNING_SECRET
  - Backend services verify HMAC in production

  ### Development Mode
  - Set GATEWAY_AUTH_DEV_MODE=true to skip HMAC
  - Simplifies local development
  - NEVER use in production

  ## Configuration

  ### Development
  ```yaml
  gateway:
    auth:
      dev-mode: true  # Skip HMAC validation
      jwt-secret: ${JWT_SECRET}
  ```

  ### Production
  ```yaml
  gateway:
    auth:
      dev-mode: false
      jwt-secret: ${VAULT:jwt-secret}
      signing-secret: ${VAULT:gateway-signing-secret}
  ```

  ## API Routing

  ### Example Routes
  - `/patient/**` → patient-service (8084)
  - `/fhir/**` → fhir-service (8085)
  - `/care-gap/**` → care-gap-service (8086)
  - `/quality-measure/**` → quality-measure-service (8087)

  ## Build & Run
  ```bash
  ./gradlew :modules:services:gateway-service:build
  ./gradlew :modules:services:gateway-service:bootRun
  docker compose up -d gateway-service
  ```

  ## Testing

  ### Test Authentication Flow
  ```bash
  # Get JWT token
  TOKEN=$(curl -X POST http://localhost:8001/auth/login \
    -H "Content-Type: application/json" \
    -d '{"username":"test_admin","password":"password123"}' \
    | jq -r '.token')

  # Use token to access backend service
  curl http://localhost:8001/patient/api/v1/patients/123 \
    -H "Authorization: Bearer $TOKEN" \
    -H "X-Tenant-ID: TENANT001"
  ```

  ### Verify Headers Injected
  ```bash
  # Check backend service logs
  docker compose logs patient-service | grep "X-Auth-User-Id"
  ```

  ## Common Tasks

  ### Adding New Route
  1. Update ApiGatewayController with new route mapping
  2. Configure service URL in application.yml
  3. Test routing with sample request
  4. Verify headers injected correctly

  ### Debugging Authentication Issues
  1. Verify JWT is valid (not expired)
  2. Check JWT claims include required fields
  3. Enable debug logging for GatewayAuthenticationFilter
  4. Verify HMAC secret matches between gateway and services
  5. Check X-Auth-* headers in backend service logs

  ### Rotating JWT Secret
  1. Generate new secret (64-char hex string)
  2. Update Vault or environment variable
  3. Restart gateway service
  4. Invalidate existing tokens
  5. Users must re-login

  ## Security Checklist
  - [ ] JWT secret is strong (64+ chars)
  - [ ] JWT expiration is reasonable (15 minutes)
  - [ ] HMAC signing enabled in production
  - [ ] HMAC secret rotated quarterly
  - [ ] Rate limiting configured
  - [ ] HTTPS enforced in production
  - [ ] No secrets in logs

  ## Troubleshooting

  ### Issue: 401 Unauthorized
  - JWT missing or invalid
  - Check Authorization header format
  - Verify JWT not expired
  - Confirm JWT_SECRET matches

  ### Issue: Backend returns 403
  - User not authorized for tenant
  - Check X-Auth-Tenant-Ids includes requested tenant
  - Verify JWT claims are correct

  ### Issue: HMAC validation fails
  - HMAC secret mismatch
  - Verify GATEWAY_AUTH_SIGNING_SECRET same in gateway and backend
  - Check GATEWAY_AUTH_DEV_MODE setting

  ## Performance Best Practices
  - Cache JWT validation results (short TTL)
  - Use connection pooling for backend services
  - Monitor response times
  - Implement circuit breaker for backend failures

  ## Related Services
  - **All backend services** depend on this gateway
  - Kong API Gateway (8000) may sit in front of this service

  ## Parent Memories
  - ../../../../.serena/memories/gateway-trust-auth.md (MUST READ)
  - ../../../../.serena/memories/architecture-overview.md
  - ../../../../.serena/memories/troubleshooting-guide.md

  ## Key References
  - Gateway Trust Architecture: backend/docs/GATEWAY_TRUST_ARCHITECTURE.md
  - JWT Spec: https://tools.ietf.org/html/rfc7519

  **This service is CRITICAL for security. All changes must be thoroughly tested.**

