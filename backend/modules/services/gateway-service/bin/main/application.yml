# Gateway Feature Flags
gateway:
  auth:
    # Enable/disable gateway authentication
    enabled: true
    # Enforce authentication for all requests (default: true for security)
    # Set GATEWAY_AUTH_ENFORCED=false only for local development/demo mode
    enforced: ${GATEWAY_AUTH_ENFORCED:true}
    # Secret for signing X-Auth-Validated header (min 32 chars for production)
    # Generate with: openssl rand -base64 32
    header-signing-secret: ${GATEWAY_AUTH_SIGNING_SECRET:dev-signing-secret-change-in-production}
    # Signature validity period in seconds
    signature-validity-seconds: 300
    # Strip X-Auth-* headers from incoming requests (SECURITY: always true in production)
    strip-external-auth-headers: true
    # Log authentication events for audit
    audit-logging: true
    # Public paths that don't require authentication
    # Note: /api/v1/auth/register is NOT public - requires ADMIN/SUPER_ADMIN authentication
    public-paths:
      global:
        # Specific auth endpoints (not /**)
        - /api/v1/auth/login
        - /api/v1/auth/refresh
        - /api/v1/auth/logout
        - /api/v1/auth/mfa/verify
        # Demo seeding status endpoints (allow pre-login UI checks)
        - /demo/api/v1/demo/status
        - /demo/api/v1/demo/scenarios/**
        # Health and documentation
        - /actuator/health/**
        - /actuator/info
        - /actuator/prometheus
        - /v3/api-docs/**
        - /swagger-ui/**
      fhir-service:
        - /fhir/metadata
        - /fhir/.well-known/**
      cql-engine-service:
        - /cql-engine/health
    # Demo user configuration used when auth is not enforced
    demo-user:
      tenant-ids:
        - demo-tenant
    # CORS configuration
    cors:
      allowed-origins:
        - http://localhost:4200
        - http://localhost:4201
        - http://localhost:4202
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
      max-age: 3600
    # Rate limiting for auth endpoints
    rate-limit:
      enabled: true
      login-attempts-per-minute: 10
      refresh-attempts-per-minute: 20
      block-duration-seconds: 300
  routing:
    enabled: true
  rate-limit:
    enabled: true
    requests-per-second: 100
    burst-capacity: 150

