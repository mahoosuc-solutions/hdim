server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  
  main:
    allow-circular-references: true
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  cache:
    type: none  # Disable Redis cache to avoid circular dependencies

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/gateway_db}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 2000ms

# Enable authentication controller in Gateway
authentication:
  controller:
    enabled: true
  audit:
    enabled: false
  rateLimit:
    enabled: false

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # Main API gateway: Fixed pool size (10 connections)

# Multi-Factor Authentication (MFA) Configuration
# HIPAA §164.312(d) - Person or Entity Authentication
mfa:
  issuer: ${MFA_ISSUER:HDIM Platform}
  grace-period-days: ${MFA_GRACE_PERIOD_DAYS:7}
  secret-length: 32  # TOTP secret length
  recovery-codes-count: 8  # Number of recovery codes per user
  code-validity-seconds: 30  # TOTP code validity period

# JWT Configuration
# ⚠️ SECURITY: JWT secret MUST be provided via environment variable in production
# Generate with: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:}
  accessTokenExpirationMs: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}  # 15 minutes
  refreshTokenExpirationMs: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7 days
  issuer: ${JWT_ISSUER:healthdata-in-motion}
  audience: ${JWT_AUDIENCE:healthdata-api}

