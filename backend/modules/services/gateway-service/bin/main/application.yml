# Logging
logging:
  level:
    com.healthdata: INFO
    com.healthdata.gateway: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Distributed Tracing
tracing:
  url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

---
# Development Profile - 100% Trace Sampling
spring:
  config:
    activate:
      on-profile: dev

management:
  tracing:
    sampling:
      probability: 1.0  # 100% sampling - capture all traces for debugging

---
# Staging Profile - 50% Trace Sampling
spring:
  config:
    activate:
      on-profile: staging

management:
  tracing:
    sampling:
      probability: 0.5  # 50% sampling - balance between visibility and performance

---
# Production Profile - 10% Trace Sampling
spring:
  config:
    activate:
      on-profile: prod

management:
  tracing:
    sampling:
      probability: 0.1  # 10% sampling - reduce overhead, still get representative sample
