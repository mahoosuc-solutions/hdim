server:
  port: 9000

spring:
  application:
    name: gateway-service
  
  main:
    allow-circular-references: true
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  cache:
    type: none

  # ⚠️ SECURITY: Database password MUST be provided via DB_PASSWORD environment variable
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:healthdata_cql}
    username: ${DB_USERNAME:healthdata}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

# Authentication Configuration
authentication:
  controller:
    enabled: true
  audit:
    enabled: false
  rateLimit:
    enabled: false

# JWT Configuration
# ⚠️ SECURITY: JWT secret MUST be provided via JWT_SECRET environment variable
# Generate with: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:}
  accessTokenExpirationMs: ${JWT_ACCESS_EXPIRATION:900000}  # 15 minutes
  refreshTokenExpirationMs: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days
  issuer: ${JWT_ISSUER:healthdata-in-motion}
  audience: ${JWT_AUDIENCE:healthdata-api}

# Backend Service URLs
backend:
  services:
    cql-engine:
      url: ${CQL_ENGINE_URL:http://cql-engine-service:8081}
      timeout: 30000
    quality-measure:
      url: ${QUALITY_MEASURE_URL:http://quality-measure-service:8087}
      timeout: 30000
    fhir:
      url: ${FHIR_SERVICE_URL:http://fhir-service:8083}
      timeout: 30000
    patient:
      url: ${PATIENT_SERVICE_URL:http://patient-service:8084}
      timeout: 30000
    care-gap:
      url: ${CARE_GAP_URL:http://care-gap-service:8085}
      timeout: 30000

# Gateway Feature Flags
gateway:
  auth:
    # ⚠️ SECURITY: Authentication MUST be enabled and enforced in production
    enabled: true
    enforced: true  # CRITICAL: Must be true - prevents demo mode bypass
    # ⚠️ SECURITY: MUST be provided via GATEWAY_AUTH_SIGNING_SECRET env var
    # Generate with: openssl rand -base64 32
    header-signing-secret: ${GATEWAY_AUTH_SIGNING_SECRET:}
    signature-validity-seconds: 300
    # ⚠️ SECURITY: Must be true to prevent header injection attacks
    strip-external-auth-headers: true
    # Required for HIPAA compliance
    audit-logging: true
    # Rate limiting to prevent brute force attacks
    rate-limit:
      enabled: true
      login-attempts-per-minute: 5
      refresh-attempts-per-minute: 10
      block-duration-seconds: 600  # 10 minutes
  cors:
    enabled: true
    # ⚠️ SECURITY: Configure allowed origins for your production domains
    allowed-origins: ${CORS_ORIGINS:}
  rate-limit:
    enabled: true
    requests-per-second: 50
    burst-capacity: 100

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    redis:
      enabled: false

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
