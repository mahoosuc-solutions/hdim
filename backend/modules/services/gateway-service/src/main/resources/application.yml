server:
  port: 9000

spring:
  application:
    name: gateway-service
  
  main:
    allow-circular-references: true
  
  liquibase:
    enabled: false
  
  cache:
    type: none  # Disable Redis cache to avoid circular dependencies
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_cql}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 2000ms

# Enable authentication controller in Gateway
authentication:
  controller:
    enabled: true
  audit:
    enabled: false
  rateLimit:
    enabled: false

# JWT Configuration
# ⚠️ SECURITY: JWT secret MUST be provided via environment variable in production
# Generate with: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:}
  accessTokenExpirationMs: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}  # 15 minutes
  refreshTokenExpirationMs: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7 days
  issuer: ${JWT_ISSUER:healthdata-gateway}
  audience: ${JWT_AUDIENCE:healthdata-services}

# Backend Service URLs
backend:
  services:
    cql-engine:
      url: http://localhost:8081
      timeout: 30000
    quality-measure:
      url: http://localhost:8087
      timeout: 30000
    fhir:
      url: http://localhost:8083
      timeout: 30000
    patient:
      url: http://localhost:8084
      timeout: 30000
    care-gap:
      url: http://localhost:8085
      timeout: 30000

# Gateway Feature Flags
gateway:
  auth:
    enabled: true
    enforced: false  # Set to true for production
  routing:
    enabled: true
  rate-limit:
    enabled: true
    requests-per-second: 100
    burst-capacity: 150

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      cqlEngine:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
      qualityMeasure:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      fhirService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      careGapService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      cqlEngine:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      qualityMeasure:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      fhirService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      patientService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      careGapService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  timelimiter:
    instances:
      cqlEngine:
        timeoutDuration: 30s
        cancelRunningFuture: true
      qualityMeasure:
        timeoutDuration: 30s
        cancelRunningFuture: true
      fhirService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      patientService:
        timeoutDuration: 15s
        cancelRunningFuture: true
      careGapService:
        timeoutDuration: 15s
        cancelRunningFuture: true
  ratelimiter:
    instances:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Logging
logging:
  level:
    com.healthdata: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
