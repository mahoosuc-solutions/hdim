server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  
  main:
    allow-circular-references: true
  
  liquibase:
    enabled: false
  
  cache:
    type: none  # Disable Redis cache to avoid circular dependencies
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_cql}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 2000ms

# Enable authentication controller in Gateway
authentication:
  controller:
    enabled: true
  audit:
    enabled: false
  rateLimit:
    enabled: false

# JWT Configuration
# ⚠️ SECURITY: JWT secret MUST be provided via environment variable in production
# Generate with: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:}
  accessTokenExpirationMs: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}  # 15 minutes
  refreshTokenExpirationMs: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7 days
  issuer: ${JWT_ISSUER:healthdata-gateway}
  audience: ${JWT_AUDIENCE:healthdata-services}

# Backend Service URLs
backend:
  services:
    cql-engine:
      url: ${BACKEND_SERVICES_CQL_ENGINE_URL:http://localhost:8081}
      timeout: 30000
    quality-measure:
      url: ${BACKEND_SERVICES_QUALITY_MEASURE_URL:http://localhost:8087}
      timeout: 30000
    fhir:
      url: ${BACKEND_SERVICES_FHIR_URL:http://localhost:8085}
      timeout: 30000
    patient:
      url: ${BACKEND_SERVICES_PATIENT_URL:http://localhost:8084}
      timeout: 30000
    care-gap:
      url: ${BACKEND_SERVICES_CARE_GAP_URL:http://localhost:8086}
      timeout: 30000
    consent:
      url: ${BACKEND_SERVICES_CONSENT_URL:http://localhost:8082}
      timeout: 30000
    events:
      url: ${BACKEND_SERVICES_EVENTS_URL:http://localhost:8083}
      timeout: 30000
    agent-runtime:
      url: ${BACKEND_SERVICES_AGENT_RUNTIME_URL:http://localhost:8095}
      timeout: 120000  # Higher timeout for AI operations
    agent-builder:
      url: ${BACKEND_SERVICES_AGENT_BUILDER_URL:http://localhost:8096}
      timeout: 30000
    qrda-export:
      url: ${BACKEND_SERVICES_QRDA_EXPORT_URL:http://localhost:8104}
      timeout: 60000  # Longer timeout for QRDA generation
    hcc:
      url: ${BACKEND_SERVICES_HCC_URL:http://localhost:8105}
      timeout: 30000
    ecr:
      url: ${BACKEND_SERVICES_ECR_URL:http://localhost:8101}
      timeout: 30000
    prior-auth:
      url: ${BACKEND_SERVICES_PRIOR_AUTH_URL:http://localhost:8102}
      timeout: 60000  # Longer timeout for payer API calls

# Gateway Feature Flags
gateway:
  auth:
    enabled: true
    enforced: false  # Set to true for production
  routing:
    enabled: true
  rate-limit:
    enabled: true
    requests-per-second: 100
    burst-capacity: 150

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      cqlEngine:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
      qualityMeasure:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      fhirService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      careGapService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      agentRuntime:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s  # Longer wait for AI services
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallDurationThreshold: 30s
        slowCallRateThreshold: 80
      agentBuilder:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      qrdaExport:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 30s
        slowCallRateThreshold: 80
      hccService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      ecrService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      priorAuth:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s  # Longer wait for payer API failures
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallDurationThreshold: 30s
        slowCallRateThreshold: 80
  retry:
    instances:
      cqlEngine:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      qualityMeasure:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      fhirService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      patientService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      careGapService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      agentRuntime:
        maxAttempts: 2  # Fewer retries for AI - expensive operations
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      agentBuilder:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      qrdaExport:
        maxAttempts: 2  # Fewer retries - document generation is expensive
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      hccService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      ecrService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      priorAuth:
        maxAttempts: 2  # Fewer retries - payer APIs may have rate limits
        waitDuration: 3s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
  timelimiter:
    instances:
      cqlEngine:
        timeoutDuration: 30s
        cancelRunningFuture: true
      qualityMeasure:
        timeoutDuration: 30s
        cancelRunningFuture: true
      fhirService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      patientService:
        timeoutDuration: 15s
        cancelRunningFuture: true
      careGapService:
        timeoutDuration: 15s
        cancelRunningFuture: true
      agentRuntime:
        timeoutDuration: 120s  # AI operations can take longer
        cancelRunningFuture: true
      agentBuilder:
        timeoutDuration: 30s
        cancelRunningFuture: true
      qrdaExport:
        timeoutDuration: 60s  # QRDA generation can take longer
        cancelRunningFuture: true
      hccService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      ecrService:
        timeoutDuration: 30s
        cancelRunningFuture: true
      priorAuth:
        timeoutDuration: 60s  # Payer API calls may be slow
        cancelRunningFuture: true
  ratelimiter:
    instances:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

# Logging
logging:
  level:
    com.healthdata: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
