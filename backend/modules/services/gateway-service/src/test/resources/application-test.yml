server:
  port: 0

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: gateway-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/gateway_db
    username: healthdata
    password: healthdata_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: WARN
    com.healthdata.gateway: INFO
    org.springframework.test: INFO

# Gateway Configuration for Tests
gateway:
  rate-limit:
    enabled: true
    use-redis: false

# Backend Service URLs for Tests (not used in unit tests)
backend:
  services:
    cql-engine:
      url: http://localhost:8081
    quality-measure:
      url: http://localhost:8082
    fhir:
      url: http://localhost:8083
    patient:
      url: http://localhost:8084
    care-gap:
      url: http://localhost:8085
    agent-builder:
      url: http://localhost:8086
    consent:
      url: http://localhost:8087
    events:
      url: http://localhost:8088
    agent-runtime:
      url: http://localhost:8089
    qrda-export:
      url: http://localhost:8090
    hcc:
      url: http://localhost:8091
    ecr:
      url: http://localhost:8092
    prior-auth:
      url: http://localhost:8093
