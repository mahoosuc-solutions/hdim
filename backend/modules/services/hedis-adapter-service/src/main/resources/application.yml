server:
  port: 8122
  servlet:
    context-path: /hedis-adapter

spring:
  application:
    name: hedis-adapter-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: hedis-adapter
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.healthdata.*,java.util,java.lang"
        spring.json.value.default.type: "java.util.LinkedHashMap"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:hedis_adapter_db}
    username: ${DB_USERNAME:healthdata}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  flyway:
    enabled: false

external:
  hedis:
    enabled: ${HEDIS_ENABLED:false}
    base-url: ${HEDIS_BASE_URL:http://localhost:3333}
    cql-url: ${HEDIS_CQL_URL:http://localhost:8090}
    api-key: ${HEDIS_API_KEY:}
    timeout-ms: ${HEDIS_TIMEOUT_MS:10000}
    connect-timeout-ms: ${HEDIS_CONNECT_TIMEOUT_MS:5000}
    measure-sync-interval-ms: ${HEDIS_MEASURE_SYNC_INTERVAL_MS:3600000}
    max-websocket-connections: ${HEDIS_MAX_WS_CONNECTIONS:1000}

resilience4j:
  circuitbreaker:
    instances:
      hedis-measures:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 15
        minimum-number-of-calls: 5
      hedis-cql:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 15
        minimum-number-of-calls: 5
      hedis-crm:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 3
  retry:
    instances:
      hedis-api:
        max-attempts: 3
        wait-duration: 1s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.healthdata.hedisadapter: DEBUG
