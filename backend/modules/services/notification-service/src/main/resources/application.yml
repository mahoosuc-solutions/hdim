server:
  port: 8107
  servlet:
    context-path: /notification

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_notification}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.zoho.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Notification Channel Configuration
notification:
  # Email Configuration
  email:
    from: ${MAIL_FROM:notifications@healthdatainmotion.com}
    reply-to: ${MAIL_REPLY_TO:}
    provider: smtp
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}

  # SMS Configuration (Twilio)
  sms:
    provider: ${NOTIFICATION_SMS_PROVIDER:twilio}
    twilio:
      enabled: ${NOTIFICATION_SMS_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
      messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
      default-sender-id: HealthData
      max-message-length: 1600

  # Push Notification Configuration (Firebase)
  push:
    provider: ${NOTIFICATION_PUSH_PROVIDER:firebase}
    firebase:
      enabled: ${NOTIFICATION_PUSH_ENABLED:false}
      project-id: ${FIREBASE_PROJECT_ID:}
      credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
      android-icon: ic_notification
      android-color: "#1976D2"
      android-channel-id: healthdata_notifications
      default-ttl-seconds: 86400
      dry-run: false

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic

# Cache Configuration (Redis)
spring.cache:
  type: redis
  redis:
    time-to-live: 300000

spring.data.redis:
  host: ${SPRING_DATA_REDIS_HOST:localhost}
  port: ${SPRING_DATA_REDIS_PORT:6379}
  timeout: 2000ms

# Kafka Configuration
spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: notification-service
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  api:
    per-minute: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Resilience4j Configuration
resilience4j:
  retry:
    instances:
      twilio-sms:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - com.twilio.exception.TwilioException
      firebase-push:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - com.google.firebase.messaging.FirebaseMessagingException
  circuitbreaker:
    instances:
      twilio-sms:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      firebase-push:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.mail: DEBUG
    com.twilio: INFO
    com.google.firebase: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
