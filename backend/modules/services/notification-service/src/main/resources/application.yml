server:
  port: 8107
  servlet:
    context-path: /notification

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:postgresql://localhost:5435/healthdata_notification
    username: healthdata
    password: healthdata

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # Notification: <10 req/sec, simple queries

spring:
  data:
    redis:
      host: localhost
      port: 6380
      password: ""
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  cache:
    type: redis
    redis:
      time-to-live: 300000

# Notification configuration
notification:
  email:
    enabled: true
    from-address: noreply@healthdata.com
    from-name: HealthData Platform
  sms:
    twilio:
      enabled: false
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
      messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
      default-sender-id: HealthData
      max-message-length: 1600
  reminders:
    enabled: true
    cron: "0 0 9 * * *"  # Daily at 9 AM
  retry:
    max-attempts: 3
    delay-ms: 60000

# Service URLs
fhir:
  service:
    url: ${FHIR_SERVICE_URL:http://fhir-service:8085}

patient:
  service:
    url: ${PATIENT_SERVICE_URL:http://patient-service:8084}

# Kafka topics
kafka:
  topics:
    clinical-alerts: clinical-alerts
    care-gaps: care-gap-events
    approvals: approval-events

# Security
security:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 900000

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      twilio-sms:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        minimum-number-of-calls: 10
        sliding-window-size: 10
        record-exceptions:
          - com.twilio.exception.ApiException
          - java.io.IOException
          - java.net.SocketTimeoutException
  retry:
    instances:
      twilio-sms:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.twilio.exception.ApiException
