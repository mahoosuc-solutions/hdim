server:
  port: 8084
  servlet:
    context-path: /patient

spring:
  application:
    name: patient-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/healthdata_patient}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    # ⚠️ SECURITY: Password MUST be provided via environment variable
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: MEDIUM  # Patient demographics and records: 10-100 req/sec, core service

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Disable Hibernate's auto-detection of entities on classpath
        # Only use entities explicitly configured via @EntityScan
        archive:
          autodetection: none
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

  flyway:
    enabled: false  # Explicitly disable Flyway (using Liquibase for migrations)

# FHIR Server Configuration
fhir:
  server:
    url: http://localhost:8085/fhir

# Consent Service Configuration
consent:
  server:
    url: http://localhost:8086/consent

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      fhir-service:
        url: http://localhost:8085
        connectTimeout: 5000
        readTimeout: 10000
      consent-service:
        url: http://localhost:8086
        connectTimeout: 5000
        readTimeout: 10000

# Cache Configuration (Redis)
# ⚠️ CRITICAL HIPAA COMPLIANCE SETTING - DO NOT INCREASE TTL ⚠️
# TTL reduced from 10 minutes to 2 minutes to comply with HIPAA data minimization
# See: /backend/HIPAA-CACHE-COMPLIANCE.md for full documentation
spring.cache:
  type: redis
  redis:
    time-to-live: 120000  # 2 minutes (HIPAA compliant for PHI)

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  login:
    per-minute: 5
    per-hour: 20
  register:
    per-hour: 3
  api:
    per-minute: 100

# Actuator & Distributed Tracing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  # Enable distributed tracing observations (automatic HTTP span generation)
  observations:
    enabled: true
  tracing:
    sampling:
      probability: 1.0  # 100% sampling (development - see application-prod.yml for production)

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    show-extensions: true
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-rendering: model
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Logging
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Production Profile
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/healthdata_patient}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.healthdata: INFO

# Enable Feign's Resilience4j circuit breaker integration
# This wraps every Feign client method with the named circuit breaker automatically
feign:
  circuitbreaker:
    enabled: true

# Resilience4j Circuit Breaker Configuration
# Prevents cascading failures when downstream services (fhir-service, care-gap-service) are degraded
resilience4j:
  circuitbreaker:
    instances:
      fhir-service:
        # Open circuit after 50% failures in a 10-call sliding window
        slidingWindowSize: 10
        failureRateThreshold: 50
        # Wait 30s in OPEN state before trying again (HALF_OPEN)
        waitDurationInOpenState: 30s
        # Allow 3 calls through in HALF_OPEN to test recovery
        permittedNumberOfCallsInHalfOpenState: 3
        # Treat slow calls (>5s) as failures
        slowCallDurationThreshold: 5s
        slowCallRateThreshold: 50
        # Exceptions that count as failures
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
      care-gap-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 5s
        slowCallRateThreshold: 50
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
  retry:
    instances:
      fhir-service:
        # Retry up to 3 times with 500ms delay, exponential backoff
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - feign.RetryableException
      care-gap-service:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - feign.RetryableException

# Production Tracing Configuration
management:
  tracing:
    sampling:
      probability: 0.1  # 10% sampling (reduced overhead for production)
