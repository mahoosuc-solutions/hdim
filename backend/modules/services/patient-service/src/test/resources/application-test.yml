server:
  port: 0  # Random port for tests

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

spring:
  application:
    name: patient-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: false

  # Cache Configuration (use simple cache for tests)
  cache:
    type: simple

# Disable external service URLs for tests (use mocks)
fhir:
  server:
    url: http://localhost:8085/fhir

consent:
  service:
    url: http://localhost:8083/consent

# Feign Client Configuration for tests
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# HIPAA Audit Configuration
audit:
  enabled: false

# Logging Configuration
logging:
  level:
    root: WARN
    com.healthdata.patient: INFO
    org.springframework.test: INFO
