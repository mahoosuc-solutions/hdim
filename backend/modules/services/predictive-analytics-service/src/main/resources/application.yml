spring:
  application:
    name: predictive-analytics-service

  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthdata_predictive}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10              # LOW traffic tier (predictive analytics/reporting)
      minimum-idle: 5
      connection-timeout: 20000          # 20 seconds (fail fast)
      idle-timeout: 300000               # 5 minutes (matches Docker/PostgreSQL TCP timeout)
      max-lifetime: 1800000              # 30 minutes (CRITICAL: prevent stale connections)
      keepalive-time: 240000             # 4 minutes (proactive keepalive before 5-minute timeout)
      leak-detection-threshold: 60000    # 60 seconds (detect connection leaks)
      validation-timeout: 5000           # 5 seconds (fail fast on dead connections)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # ⚠️ HIPAA COMPLIANCE: PHI cache TTL must be ≤ 5 minutes (300000ms)
  # See: backend/HIPAA-CACHE-COMPLIANCE.md
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes (HIPAA compliant for PHI)

server:
  port: ${SERVER_PORT:8093}

logging:
  level:
    com.healthdata.predictive: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      predictiveAnalyticsDefault:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5

  retry:
    instances:
      predictiveAnalyticsDefault:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

  timelimiter:
    instances:
      predictiveAnalyticsDefault:
        timeoutDuration: 30s
        cancelRunningFuture: true

  ratelimiter:
    instances:
      predictiveAnalyticsDefault:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
