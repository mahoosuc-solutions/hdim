spring:
  application:
    name: predictive-analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5432/hdim_predictive
    username: ${DB_USERNAME:hdim}
    password: ${DB_PASSWORD:hdim}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour

server:
  port: 8089

logging:
  level:
    com.healthdata.predictive: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
