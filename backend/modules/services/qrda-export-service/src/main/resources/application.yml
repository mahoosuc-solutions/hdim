server:
  port: 8104
  servlet:
    context-path: /qrda-export

spring:
  application:
    name: qrda-export-service

  datasource:
    url: jdbc:postgresql://localhost:5435/healthdata_cql
    username: healthdata
    password: ${DB_PASSWORD:healthdata_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public

# HealthData Database Configuration
healthdata:
  database:
    hikari:
      traffic-tier: LOW  # QRDA export: <10 req/sec, batch reporting

# Quality Measure Service (for measure results)
quality-measure:
  service:
    url: ${QUALITY_MEASURE_SERVICE_URL:http://quality-measure-service:8087/quality-measure}

# CQL Engine Service (for measure calculation)
cql:
  engine:
    url: ${CQL_ENGINE_URL:http://cql-engine-service:8081/cql-engine}

# Patient Service (for patient demographics)
patient:
  service:
    url: ${PATIENT_SERVICE_URL:http://patient-service:8084/patient}

# FHIR Server (for clinical data)
fhir:
  server:
    url: ${FHIR_SERVICE_URL:http://fhir-service:8085/fhir}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dev_secret_key_for_local_testing_only_change_in_production}
  expiration: 3600000

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000
        loggerLevel: basic
      quality-measure-service:
        url: ${QUALITY_MEASURE_SERVICE_URL:http://quality-measure-service:8087}
        connectTimeout: 5000
        readTimeout: 30000
      cql-engine-service:
        url: ${CQL_ENGINE_URL:http://cql-engine-service:8081}
        connectTimeout: 5000
        readTimeout: 60000  # CQL evaluation can take longer
      patient-service:
        url: ${PATIENT_SERVICE_URL:http://patient-service:8084}
        connectTimeout: 5000
        readTimeout: 15000

# Cache Configuration (Redis)
spring.cache:
  type: redis
  redis:
    time-to-live: 300000  # 5 minutes for QRDA templates

# Kafka Configuration
spring.kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
    properties:
      # Distributed tracing: Propagate trace context through Kafka messages
      interceptor.classes: com.healthdata.tracing.KafkaProducerTraceInterceptor
  consumer:
    group-id: qrda-export-service
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      # Distributed tracing: Extract trace context from Kafka messages
      interceptor.classes: com.healthdata.tracing.KafkaConsumerTraceInterceptor

# QRDA Export Configuration
qrda:
  export:
    # Storage location for generated QRDA documents
    storage-path: ${QRDA_STORAGE_PATH:/tmp/qrda-exports}
    # Retention period in days
    retention-days: 90
    # Max patients per QRDA III batch
    max-batch-size: 1000
  validation:
    # Enable Schematron validation
    enabled: true
    # CMS QRDA validation schematron paths
    category-i-schematron: classpath:schematron/qrda-cat-i.sch
    category-iii-schematron: classpath:schematron/qrda-cat-iii.sch

# HIPAA Audit Configuration
audit:
  enabled: true
  encryption:
    enabled: true

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  api:
    per-minute: 60

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging Configuration
logging:
  level:
    root: INFO
    com.healthdata.qrda: DEBUG
    ca.uhn.fhir: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
