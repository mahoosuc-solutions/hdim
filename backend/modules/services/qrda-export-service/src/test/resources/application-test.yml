spring:
  application:
    name: qrda-export-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/qrda_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
# QRDA Configuration
qrda:
  validation:
    enabled: true
    category-i-schematron: schematron/qrda-cat-i.sch
    category-iii-schematron: schematron/qrda-cat-iii.sch
  export:
    storage-path: /tmp/qrda-test-exports

# Security - permit all for tests
security:
  enabled: false

# Logging
logging:
  level:
    com.healthdata.qrda: DEBUG
    org.springframework.security: WARN
