# ====================================================================================================
# Spring Boot Production Configuration - Quality Measure Service
# ====================================================================================================
# This configuration is activated with: -Dspring.profiles.active=production

spring:
  application:
    name: quality-measure-service

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: QualityMeasureHikariPool

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
        jdbc:
          batch_size: 20
    open-in-view: false

  # Redis Configuration
  redis:
    host: ${SPRING_REDIS_HOST}
    port: ${SPRING_REDIS_PORT}
    password: ${SPRING_REDIS_PASSWORD}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
    time-zone: UTC

# ====================================================================================================
# Server Configuration with SSL/TLS
# ====================================================================================================
server:
  port: 8087

  # SSL Configuration
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEY_STORE:/etc/ssl/keystore.p12}
    key-store-password: ${SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: healthdata-production
    protocol: TLS
    enabled-protocols: TLSv1.3,TLSv1.2
    ciphers:
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384

  # HTTP/2 support
  http2:
    enabled: true

  # Compression
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/json,application/xml
    min-response-size: 1024

  # Context path
  servlet:
    context-path: /quality-measure
    session:
      timeout: 30m
      cookie:
        secure: true
        http-only: true
        same-site: strict

  # Error handling
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

  # Shutdown
  shutdown: graceful

  # Tomcat settings
  tomcat:
    max-connections: 8000
    threads:
      max: 150
      min-spare: 10
    connection-timeout: 20000

# ====================================================================================================
# Spring Actuator Configuration
# ====================================================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: production

# ====================================================================================================
# Application-Specific Configuration
# ====================================================================================================
application:
  # CQL Engine Service Integration
  cql-engine:
    service-url: ${CQL_ENGINE_SERVICE_URL}
    api-key: ${SERVICE_API_KEY}
    timeout: 60000
    max-retry-attempts: 3

  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

  # Cache Configuration
  cache:
    ttl:
      measure-result: 3600
      measure-list: 1800

# ====================================================================================================
# Logging Configuration
# ====================================================================================================
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.healthdata: INFO
    org.springframework: INFO
    org.hibernate: WARN
  file:
    name: /var/log/healthdata/quality-measure-service.log
    max-size: 10MB
    max-history: 30
