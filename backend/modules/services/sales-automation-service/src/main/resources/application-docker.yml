server:
  port: 8106

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/sales_automation_db
    username: healthdata
    password: healthdata_password

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:29092

  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    change-log: classpath:db/changelog/db.changelog-master.xml

# Gateway trust authentication (dev mode for local testing)
gateway:
  auth:
    dev-mode: true

logging:
  level:
    com.healthdata.sales: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
