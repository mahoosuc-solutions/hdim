# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test


spring:
  application:
    name: sales-automation-service-test

  datasource:
    url: jdbc:postgresql://localhost:5435/sales_automation_db
    driver-class-name: org.postgresql.Driver
    username: healthdata
    password: healthdata_password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  liquibase:
    enabled: true
logging:
  level:
    root: WARN
    com.healthdata: DEBUG
    org.springframework.test: INFO
