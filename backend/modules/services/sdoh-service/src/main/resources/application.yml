spring:
  application:
    name: sdoh-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hdim_sdoh
    username: ${DB_USERNAME:hdim_user}
    password: ${DB_PASSWORD:hdim_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8089}

# API Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Multi-tenant configuration
multitenancy:
  enabled: true

# Logging
logging:
  level:
    com.healthdata.sdoh: INFO
    org.springframework.security: DEBUG
