# Production Configuration for Audit Infrastructure
# HIPAA/SOC 2 Compliant Settings

spring:
  application:
    name: audit-service
  
  profiles:
    active: prod
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-1:9092,kafka-2:9092,kafka-3:9092}
    
    producer:
      # Reliability settings
      acks: all
      retries: 3
      compression-type: lz4
      batch-size: 32768  # 32KB
      linger-ms: 10
      buffer-memory: 67108864  # 64MB
      max-in-flight-requests-per-connection: 5
      enable-idempotence: true
      
      # Serialization
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      
      # Security
      properties:
        security.protocol: SSL
        ssl.truststore.location: ${KAFKA_TRUSTSTORE_PATH:/etc/kafka/truststore.jks}
        ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
        ssl.keystore.location: ${KAFKA_KEYSTORE_PATH:/etc/kafka/keystore.jks}
        ssl.keystore.password: ${KAFKA_KEYSTORE_PASSWORD}
        ssl.key.password: ${KAFKA_KEY_PASSWORD}
        ssl.protocol: TLSv1.3
        ssl.enabled.protocols: TLSv1.3
        
        # Timeouts
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        max.block.ms: 60000
    
    consumer:
      group-id: audit-event-consumer-${INSTANCE_ID:1}
      auto-offset-reset: earliest
      enable-auto-commit: false
      fetch-min-size: 1024
      fetch-max-wait: 500
      max-poll-records: 500
      max-poll-interval-ms: 300000
      
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      
      properties:
        isolation.level: read_committed
        session.timeout.ms: 30000
        heartbeat.interval.ms: 3000
        
        # Security (same as producer)
        security.protocol: SSL
        ssl.truststore.location: ${KAFKA_TRUSTSTORE_PATH:/etc/kafka/truststore.jks}
        ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
    
    # Topic configuration
    topics:
      ai-decisions:
        name: ai.agent.decisions
        partitions: 30
        replication-factor: 3
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:audit-db}:${DB_PORT:5432}/${DB_NAME:audit_db}?ssl=true&sslmode=require
    username: ${DB_USERNAME:audit_service}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AuditHikariPool
      auto-commit: false
      
      # Performance tuning
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        reWriteBatchedInserts: true
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Never auto-create in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        format_sql: false
        use_sql_comments: false
  
  # Redis Configuration
  redis:
    host: ${REDIS_HOST:redis-cluster}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    timeout: 2000ms
    ssl: true
    lettuce:
      pool:
        max-active: 50
        max-idle: 10
        min-idle: 5
        max-wait: -1ms

# Audit Configuration
audit:
  # Enable/disable audit publishing
  kafka:
    enabled: true
    topic:
      ai-decisions: ai.agent.decisions
  
  # Batch processing
  batch:
    enabled: true
    size: 100
    timeout: 1000  # 1 second
    max-queue-size: 10000
  
  # Retention policy (6 years for HIPAA)
  retention:
    enabled: true
    days: 2190  # 6 years
  
  # Event replay
  replay:
    enabled: true
    batch-size: 1000

# Logging Configuration
logging:
  level:
    root: INFO
    com.healthdata.audit: INFO
    org.springframework.kafka: WARN
    org.hibernate: WARN
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: /var/log/audit/audit-service.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: production
      instance: ${INSTANCE_ID:unknown}
  
  health:
    kafka:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  
  # SSL/TLS (if terminating at application)
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:/etc/ssl/keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
  
  # Security headers
  servlet:
    context-path: /
  
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 100

# Security Configuration
security:
  # JWT validation (if applicable)
  jwt:
    enabled: ${JWT_ENABLED:true}
    issuer: ${JWT_ISSUER:https://auth.healthdata.com}
    audience: ${JWT_AUDIENCE:audit-api}
    jwks-uri: ${JWKS_URI:https://auth.healthdata.com/.well-known/jwks.json}

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      kafkaProducer:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  
  retry:
    instances:
      databaseQuery:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  
  timelimiter:
    instances:
      default:
        timeoutDuration: 5s

# Feature Flags
features:
  audit:
    replay: ${FEATURE_AUDIT_REPLAY:true}
    encryption: ${FEATURE_AUDIT_ENCRYPTION:true}
    checksums: ${FEATURE_AUDIT_CHECKSUMS:true}

# Application-specific
app:
  name: ${spring.application.name}
  version: @project.version@
  description: "HIPAA-compliant AI Agent Decision Audit Service"
