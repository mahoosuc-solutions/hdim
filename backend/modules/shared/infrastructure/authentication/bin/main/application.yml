# JWT Authentication Configuration
jwt:
  secret: ${JWT_SECRET:change_this_secret_key_in_production_must_be_at_least_256_bits_for_hs512}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:15m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}
  issuer: ${JWT_ISSUER:healthdata-in-motion}
  audience: ${JWT_AUDIENCE:healthdata-api}

# Security Configuration
security:
  authentication:
    jwt-enabled: ${JWT_ENABLED:true}
    basic-auth-enabled: ${BASIC_AUTH_ENABLED:true}  # Keep for backward compatibility

# Scheduling Configuration
spring:
  task:
    scheduling:
      enabled: true
      pool:
        size: 2
      cron:
        token-cleanup: ${TOKEN_CLEANUP_CRON:0 0 2 * * ?}  # Daily at 2 AM
        token-stats: ${TOKEN_STATS_CRON:0 0 * * * ?}      # Hourly

# Liquibase Configuration
# DISABLED: Authentication migrations will be managed by Gateway service
# See: Gateway-based authentication architecture decision
  liquibase:
    enabled: false
    # change-log: classpath:db/changelog/db.changelog-master.xml
    # default-schema: public

# Cookie Configuration for HttpOnly Authentication
# Development: HTTP (secure=false, same-site=Lax)
# Production: HTTPS (secure=true, same-site=Strict)
authentication:
  cookie:
    secure: ${COOKIE_SECURE:false}          # Allow HTTP in development
    same-site: ${COOKIE_SAME_SITE:Lax}     # More permissive in development
    http-only: true                         # ALWAYS HttpOnly (HIPAA requirement)
    path: /api/v1/auth                      # Cookie path for auth endpoints
    max-age: 604800                         # 7 days (matches refresh token TTL)

# MFA Configuration
mfa:
  sms:
    enabled: ${MFA_SMS_ENABLED:false}       # Enable SMS MFA (requires Twilio credentials)
  issuer: ${MFA_ISSUER:HDIM}                # Issuer name for TOTP apps

# Twilio SMS Configuration
# Required for SMS MFA - obtain from https://console.twilio.com
twilio:
  enabled: ${TWILIO_ENABLED:false}                              # Enable Twilio SMS client
  account-sid: ${TWILIO_ACCOUNT_SID:}                           # Twilio Account SID
  auth-token: ${TWILIO_AUTH_TOKEN:}                             # Twilio Auth Token
  from-phone-number: ${TWILIO_FROM_PHONE_NUMBER:}               # Twilio phone number (E.164 format)
