server:
  port: 0  # Random port for tests

# JWT Authentication Configuration for Tests
jwt:
  secret: test_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
  access-token-expiration: 1h
  refresh-token-expiration: 1d
  issuer: healthdata-in-motion-test
  audience: healthdata-api-test

# Security Configuration for Tests
security:
  authentication:
    jwt-enabled: true
    basic-auth-enabled: true

spring:
  application:
    name: authentication-test

  main:
    allow-bean-definition-overriding: true  # Allow test beans to override production beans

  task:
    scheduling:
      enabled: false  # Disable scheduled tasks in tests

  datasource:
    url: jdbc:h2:mem:authtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false

  liquibase:
    enabled: false

# Disable rate limiting for tests
rate-limiting:
  enabled: false
  redis:
    enabled: false  # Also disable Redis rate limiting components

# Logging Configuration
logging:
  level:
    root: WARN
    com.healthdata.authentication: DEBUG
    org.springframework.security: DEBUG
    org.springframework.test: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.jdbc: DEBUG
