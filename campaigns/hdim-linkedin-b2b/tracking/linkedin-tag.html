<!-- LinkedIn Insight Tag Installation Guide -->
<!-- 
STEP 1: Get Your LinkedIn Partner ID
1. Log in to LinkedIn Campaign Manager
2. Go to Account Assets → Insight Tag
3. Copy your Partner ID (looks like: 1234567)

STEP 2: Install this code on ALL pages of your website
Place this code immediately before the closing </head> tag
-->

<script type="text/javascript">
_linkedin_partner_id = "YOUR_PARTNER_ID_HERE";
window._linkedin_data_partner_ids = window._linkedin_data_partner_ids || [];
window._linkedin_data_partner_ids.push(_linkedin_partner_id);
</script><script type="text/javascript">
(function(l) {
if (!l){window.lintrk = function(a,b){window.lintrk.q.push([a,b])};
window.lintrk.q=[]}
var s = document.getElementsByTagName("script")[0];
var b = document.createElement("script");
b.type = "text/javascript";b.async = true;
b.src = "https://snap.licdn.com/li.lms-analytics/insight.min.js";
s.parentNode.insertBefore(b, s);})(window.lintrk);
</script>
<noscript>
<img height="1" width="1" style="display:none;" alt="" src="https://px.ads.linkedin.com/collect/?pid=YOUR_PARTNER_ID_HERE&fmt=gif" />
</noscript>
