# HDIM Care Gap Demo - Minimal Single-VM Deployment
#
# This configuration runs the essential services needed to demonstrate
# real-time care gap identification and closure on a single VM.
#
# Requirements:
#   - Docker 24.0+
#   - Docker Compose 2.20+
#   - 8GB RAM minimum (16GB recommended)
#   - 20GB disk space
#
# Usage:
#   cd demo
#   docker compose -f docker-compose.demo.yml up -d
#   ./seed-demo-data.sh
#   Open http://localhost:4200 in browser
#
# Ports Used:
#   - 4200: Clinical Portal (frontend)
#   - 8080: API Gateway
#   - 8081: CQL Engine Service
#   - 8084: Patient Service
#   - 8085: FHIR Service
#   - 8086: Care Gap Service
#   - 8087: Quality Measure Service
#   - 5435: PostgreSQL
#   - 6380: Redis

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  postgres:
    container_name: hdim-demo-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: demo_password_123
      POSTGRES_DB: healthdata_demo
    ports:
      - "5435:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./init-demo-db.sh:/docker-entrypoint-initdb.d/init-demo-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hdim-demo-network

  redis:
    container_name: hdim-demo-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hdim-demo-network

  zookeeper:
    container_name: hdim-demo-zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hdim-demo-network

  kafka:
    container_name: hdim-demo-kafka
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hdim-demo-network

  elasticsearch:
    container_name: hdim-demo-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - demo_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - hdim-demo-network

  jaeger:
    container_name: hdim-demo-jaeger
    image: jaegertracing/all-in-one:1.52
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - hdim-demo-network

  prometheus:
    container_name: hdim-demo-prometheus
    image: prom/prometheus:v2.47.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - demo_prometheus_data:/prometheus
    networks:
      - hdim-demo-network

  grafana:
    container_name: hdim-demo-grafana
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=demo_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - demo_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - hdim-demo-network

  # ============================================
  # CORE CLINICAL SERVICES (Demo Profile)
  # ============================================

  gateway-service:
    container_name: hdim-demo-gateway
    build:
      context: ../backend
      dockerfile: modules/services/gateway-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8080
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      # Service URLs
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8085/fhir/fhir
      BACKEND_SERVICES_CQL_ENGINE_URL: http://cql-engine-service:8081/cql-engine
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087/quality-measure
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084/patient
      BACKEND_SERVICES_CARE_GAP_URL: http://care-gap-service:8086/care-gap
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  cql-engine-service:
    container_name: hdim-demo-cql-engine
    build:
      context: ../backend
      dockerfile: modules/services/cql-engine-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cql_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GATEWAY_AUTH_DEV_MODE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: cql-engine-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/cql-engine/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  patient-service:
    container_name: hdim-demo-patient
    build:
      context: ../backend
      dockerfile: modules/services/patient-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      GATEWAY_AUTH_DEV_MODE: "true"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/patient/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  fhir-service:
    container_name: hdim-demo-fhir
    build:
      context: ../backend
      dockerfile: modules/services/fhir-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      GATEWAY_AUTH_DEV_MODE: "true"
      # Elasticsearch configuration
      HAPI_FHIR_ELASTICSEARCH_ENABLED: "true"
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # OpenTelemetry/Jaeger tracing
      MANAGEMENT_TRACING_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: fhir-service
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/fhir/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  care-gap-service:
    container_name: hdim-demo-care-gap
    build:
      context: ../backend
      dockerfile: modules/services/care-gap-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fhir-service:
        condition: service_started
      patient-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caregap_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HEALTHDATA_CACHE_REDIS_HOST: redis
      HEALTHDATA_CACHE_REDIS_PORT: 6379
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      GATEWAY_AUTH_DEV_MODE: "true"
      # Performance tuning for demo
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 25
      SPRING_JPA_PROPERTIES_HIBERNATE_ORDER_INSERTS: "true"
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/care-gap/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  quality-measure-service:
    container_name: hdim-demo-quality-measure
    build:
      context: ../backend
      dockerfile: modules/services/quality-measure-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cql-engine-service:
        condition: service_started
      fhir-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quality_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
      SPRING_KAFKA_CONSUMER_GROUP_ID: quality-measure-demo
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      JWT_SECRET: DemoSecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm123456789
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      CQL_ENGINE_SERVICE_URL: http://cql-engine-service:8081/cql-engine
      FHIR_SERVICE_URL: http://fhir-service:8085
      GATEWAY_AUTH_DEV_MODE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: quality-measure-service
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8087/quality-measure/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - hdim-demo-network

  # ============================================
  # FRONTEND (Clinical Portal)
  # ============================================

  clinical-portal:
    container_name: hdim-demo-portal
    build:
      context: ..
      dockerfile: apps/clinical-portal/Dockerfile
    restart: unless-stopped
    depends_on:
      - gateway-service
    environment:
      API_URL: http://gateway-service:8080
    ports:
      - "4200:80"
    networks:
      - hdim-demo-network

networks:
  hdim-demo-network:
    driver: bridge

volumes:
  demo_postgres_data:
  demo_elasticsearch_data:
  demo_prometheus_data:
  demo_grafana_data:
