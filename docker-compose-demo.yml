# Docker Compose for DEMO environment
# Complete demo with frontend, gateway, and all core services
# Usage: docker compose -f docker-compose-demo.yml up -d --build
#
# Demo Credentials:
#   Username: admin
#   Password: admin123
#
# Access URLs:
#   Clinical Portal: http://localhost:4202
#   Gateway API:     http://localhost:9000
#   API Docs:        http://localhost:9000/swagger-ui.html

services:
  # Infrastructure Services
  postgres:
    container_name: healthdata-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: healthdata_password
      POSTGRES_DB: healthdata_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata -d ${POSTGRES_DB:-healthdata_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  redis:
    container_name: healthdata-redis
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  zookeeper:
    container_name: healthdata-zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  kafka:
    container_name: healthdata-kafka
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - healthdata-network

  # Backend Services - DEMO MODE (test profile = no auth required)
  fhir-service:
    container_name: healthdata-fhir-service
    build:
      context: ./backend
      dockerfile: modules/services/fhir-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker  # DEMO: Use docker profile for proper Redis config
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8081
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_LIQUIBASE_ENABLED: "false"  # DEMO: Use Hibernate DDL instead
      SPRING_FLYWAY_ENABLED: "false"  # DEMO: Disable Flyway migrations
      HEALTH_TENANT_ID: service-health-fhir
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:8081/fhir/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  quality-measure-service:
    container_name: healthdata-quality-measure-service
    build:
      context: ./backend
      dockerfile: modules/services/quality-measure-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker  # DEMO: Use docker profile for proper Redis config
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quality_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8087
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_LIQUIBASE_ENABLED: "false"  # DEMO: Use Hibernate DDL instead
      SPRING_FLYWAY_ENABLED: "false"  # DEMO: Disable Flyway migrations
      CQL_ENGINE_SERVICE_URL: http://cql-engine-service:8086
      CQL_ENGINE_URL: http://cql-engine-service:8086
      FHIR_SERVICE_URL: http://fhir-service:8081
      FHIR_SERVER_URL: http://fhir-service:8081
      HEALTH_TENANT_ID: service-health-quality-measure
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  cql-engine-service:
    container_name: healthdata-cql-engine-service
    build:
      context: ./backend
      dockerfile: modules/services/cql-engine-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker  # DEMO: Use docker profile for proper Redis config
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cql_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8086
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_LIQUIBASE_ENABLED: "false"  # DEMO: Use Hibernate DDL instead
      SPRING_FLYWAY_ENABLED: "false"  # DEMO: Disable Flyway migrations
      FHIR_SERVICE_URL: http://fhir-service:8081
      FHIR_SERVER_URL: http://fhir-service:8081
      HEALTH_TENANT_ID: service-health-cql-engine
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:8086/cql-engine/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Gateway Service - API Gateway with Authentication
  gateway-service:
    container_name: healthdata-gateway
    build:
      context: ./backend
      dockerfile: modules/services/gateway-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,demo
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 9000
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_FLYWAY_ENABLED: "false"
      # Service URLs for routing
      FHIR_SERVICE_URL: http://fhir-service:8081
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8081
      CQL_ENGINE_SERVICE_URL: http://cql-engine-service:8086
      BACKEND_SERVICES_CQL_ENGINE_URL: http://cql-engine-service:8086
      QUALITY_MEASURE_SERVICE_URL: http://quality-measure-service:8087
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087
      PATIENT_SERVICE_URL: http://patient-service:8084
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084
      CARE_GAP_SERVICE_URL: http://care-gap-service:8085
      BACKEND_SERVICES_CARE_GAP_URL: http://care-gap-service:8085
      # CORS for demo
      GATEWAY_CORS_ALLOWED_ORIGINS: http://localhost:4202,http://localhost:4200
      HEALTH_TENANT_ID: service-health-gateway
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:9000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Patient Service
  patient-service:
    container_name: healthdata-patient-service
    build:
      context: ./backend
      dockerfile: modules/services/patient-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8084
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_FLYWAY_ENABLED: "false"
      FHIR_SERVICE_URL: http://fhir-service:8081
      FHIR_SERVER_URL: http://fhir-service:8081
      HEALTH_TENANT_ID: service-health-patient
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Care Gap Service
  care-gap-service:
    container_name: healthdata-care-gap-service
    build:
      context: ./backend
      dockerfile: modules/services/care-gap-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: demo_jwt_secret_key_for_testing_only_minimum_256_bits_required_for_hs512_algorithm_this_is_long_enough
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caregap_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8085
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_FLYWAY_ENABLED: "false"
      CQL_ENGINE_SERVICE_URL: http://cql-engine-service:8086
      CQL_ENGINE_URL: http://cql-engine-service:8086
      QUALITY_MEASURE_SERVICE_URL: http://quality-measure-service:8087
      HEALTH_TENANT_ID: service-health-care-gap
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Tenant-ID: $$HEALTH_TENANT_ID\" http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Clinical Portal - Angular Frontend
  clinical-portal:
    container_name: healthdata-clinical-portal
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile
    depends_on:
      - gateway-service
    ports:
      - "4202:80"
    environment:
      # Angular environment variables (if needed for runtime config)
      API_URL: http://localhost:9000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - healthdata-network

networks:
  healthdata-network:
    driver: bridge

volumes:
  postgres_data:
