# HDIM Demo Sandbox Environment
# Lightweight configuration for prospect self-service evaluation
#
# Usage:
#   ./start-demo.sh              # Start demo with seed data
#   docker compose -f docker-compose.demo.yml up -d    # Start manually
#   docker compose -f docker-compose.demo.yml down     # Stop demo
#
# Access:
#   API Gateway: http://localhost:8080
#   Jaeger Tracing: http://localhost:16686
#
# Demo Users:
#   demo_admin@hdim.ai / demo123    (ADMIN, EVALUATOR)
#   demo_analyst@hdim.ai / demo123  (ANALYST, EVALUATOR)
#   demo_viewer@hdim.ai / demo123   (VIEWER)

services:
  postgres:
    container_name: hdim-demo-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: demo_password_2024
      POSTGRES_DB: healthdata_db
    ports:
      - "5435:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/01-init-multi-db.sh
      - ./docker/demo/demo-users.sql:/docker-entrypoint-initdb.d/02-demo-users.sql
      # Note: demo-seed-data.sql requires backend services to create patient_demographics table via migrations
      # It will be loaded after backend services start
      # - ./docker/demo/demo-seed-data.sql:/docker-entrypoint-initdb.d/03-demo-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    container_name: hdim-demo-redis
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 128M

  kafka:
    container_name: hdim-demo-kafka
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: demo-cluster-hdim-2024
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "9094:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  gateway-service:
    container_name: hdim-demo-gateway
    build:
      context: ./backend
      dockerfile: modules/services/gateway-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      quality-measure-service:
        condition: service_healthy
      care-gap-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx256m -Xms128m"
      # Backend service URLs (using Docker service names and correct ports)
      # Note: Include service context paths so gateway routing works correctly
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8085/fhir
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084/patient
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087/quality-measure
      BACKEND_SERVICES_CARE_GAP_URL: http://care-gap-service:8086/care-gap
      # Cookie Configuration for HTTP development
      # Allows HttpOnly cookies to be set over HTTP (not just HTTPS)
      # In production, set AUTHENTICATION_COOKIE_SECURE=true to force HTTPS-only
      AUTHENTICATION_COOKIE_SECURE: "false"
      AUTHENTICATION_COOKIE_SAME_SITE: "Lax"
      # HMAC Enforcement: Sign X-Auth-* headers with this secret (Phase 5 testing)
      # When enabled, gateway validates JWT and signs headers with HMAC-SHA256
      # Backend services validate the X-Auth-Validated signature
      GATEWAY_AUTH_SIGNING_SECRET: '2J3YcbuHgPp0xyMq3GHYJ/MNolqB+Hvp4j/fsA6LQYM='
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  fhir-service:
    container_name: hdim-demo-fhir
    build:
      context: ./backend
      dockerfile: modules/services/fhir-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8085
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx384m -Xms192m"
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/fhir/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  patient-service:
    container_name: hdim-demo-patient
    build:
      context: ./backend
      dockerfile: modules/services/patient-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8084
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx384m -Xms192m"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/patient/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  quality-measure-service:
    container_name: hdim-demo-quality-measure
    build:
      context: ./backend
      dockerfile: modules/services/quality-measure-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quality_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8087
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FHIR_SERVICE_URL: http://fhir-service:8085
      JAVA_OPTS: "-Xmx384m -Xms192m"
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8087/quality-measure/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  care-gap-service:
    container_name: hdim-demo-care-gap
    build:
      context: ./backend
      dockerfile: modules/services/care-gap-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caregap_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8086
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx384m -Xms192m"
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/care-gap/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Demo Seeding Service - for generating synthetic demo data
  demo-seeding-service:
    container_name: hdim-demo-seeding
    build:
      context: ./backend
      dockerfile: modules/services/demo-seeding-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
      care-gap-service:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8098
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_demo
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      JAVA_OPTS: "-Xmx384m -Xms192m"
      # Downstream service URLs
      FHIR_SERVICE_URL: http://fhir-service:8085/fhir
      CARE_GAP_SERVICE_URL: http://care-gap-service:8086/care-gap
      GATEWAY_SERVICE_URL: http://gateway-service:8080
      GATEWAY_DB_URL: jdbc:postgresql://postgres:5432/gateway_db
      GATEWAY_DB_USER: healthdata
      GATEWAY_DB_PASSWORD: demo_password_2024
      # Snapshot storage
      DEMO_SNAPSHOTS_DIR: /app/snapshots
      DEMO_PERSISTENCE_ENABLED: "true"
    ports:
      - "8098:8098"
    volumes:
      - demo_snapshots:/app/snapshots
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8098/demo/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  clinical-portal:
    container_name: hdim-demo-clinical-portal
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile
    depends_on:
      gateway-service:
        condition: service_healthy
      demo-seeding-service:
        condition: service_healthy
    environment:
      API_URL: http://gateway-service:8080
      DEFAULT_TENANT_ID: DEMO001
      DEMO_SEEDING_URL: http://demo-seeding-service:8098
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /usr/share/nginx/html/index.html && exit 0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  hdim-demo-network:
    driver: bridge

volumes:
  demo_postgres_data:
    driver: local
  demo_snapshots:
    driver: local
