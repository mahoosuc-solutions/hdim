# HDIM Demo Sandbox Environment
# Lightweight configuration for prospect self-service evaluation
#
# Usage:
#   ./start-demo.sh              # Start demo with seed data
#   docker compose -f docker-compose.demo.yml up -d    # Start manually
#   docker compose -f docker-compose.demo.yml down     # Stop demo
#
# Access:
#   API Gateway: http://localhost:8080
#   Jaeger Tracing: http://localhost:16686
#
# Demo Users:
#   demo_admin@hdim.ai / demo123    (ADMIN, EVALUATOR)
#   demo_analyst@hdim.ai / demo123  (ANALYST, EVALUATOR)
#   demo_viewer@hdim.ai / demo123   (VIEWER)

services:
  postgres:
    container_name: hdim-demo-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: demo_password_2024
      POSTGRES_DB: healthdata_db
    ports:
      - "5435:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/01-init-multi-db.sh
      - ./docker/postgres/init-auth-schema.sql:/docker-entrypoint-initdb.d/02-init-auth-schema.sql
      - ./docker/demo/demo-users.sql:/docker-entrypoint-initdb.d/03-demo-users.sql
      # Note: demo-seed-data.sql requires backend services to create patient_demographics table via migrations
      # It will be loaded after backend services start
      # - ./docker/demo/demo-seed-data.sql:/docker-entrypoint-initdb.d/03-demo-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    container_name: hdim-demo-redis
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 128M

  kafka:
    container_name: hdim-demo-kafka
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: demo-cluster-hdim-2024
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "9094:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  jaeger:
    container_name: hdim-demo-jaeger
    image: jaegertracing/all-in-one:1.53
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # Jaeger gRPC
      - "14268:14268"   # Jaeger HTTP Thrift
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 256M

