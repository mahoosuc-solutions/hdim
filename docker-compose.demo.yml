  gateway-edge:
    container_name: hdim-demo-gateway-edge
    image: nginx:1.27-alpine
    depends_on:
      gateway-admin-service:
        condition: service_healthy
      gateway-fhir-service:
        condition: service_healthy
      gateway-clinical-service:
        condition: service_healthy
    ports:
      - "18080:8080"
    # Avoid bind-mounting `./docker/gateway-edge/default.conf` so the demo stack works in
    # environments where host path mounts are not shared into Docker (e.g., Docker Desktop + WSL).
    command:
      - sh
      - -lc
      - |
        set -euo pipefail
        mkdir -p /etc/nginx/conf.d
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        resolver 127.0.0.11 valid=10s;

        upstream gateway_admin {
            zone gateway_admin 64k;
            server gateway-admin-service:8080 resolve;
        }

        upstream gateway_fhir {
            zone gateway_fhir 64k;
            server gateway-fhir-service:8080 resolve;
        }

        upstream gateway_clinical {
            zone gateway_clinical 64k;
            server gateway-clinical-service:8080 resolve;
        }

        upstream demo_seeding {
            zone demo_seeding 64k;
            server demo-seeding-service:8098 resolve;
        }

        map "$$http_authorization:$$cookie_hdim_access_token" $$hdim_missing_auth {
            default 0;
            ":" 1;
        }

        server {
            listen 8080;
            client_max_body_size 50m;

            add_header X-Edge gateway-edge always;
            add_header X-Edge-Upstream $$upstream_addr always;
            add_header X-Edge-Request-ID $$request_id always;

            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_set_header X-Request-ID $$request_id;

            location ~ ^/api/v1/auth/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/v1/agent-builder/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/v1/tools/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/v1/providers/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/v1/runtime/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/sales/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/sales-automation/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/fhir/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location = /fhir/metadata {
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/fhir/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/api/patients/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/patient/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/api/cql/ {
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/cql-engine/ {
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/api/quality/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/api/v1/quality-measures {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/quality-measure/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_fhir;
            }

            location ~ ^/api/care-gaps/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/care-gaps {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/care-gap/ {
                if ($$http_x_tenant_id = "") { return 400; }
                if ($$hdim_missing_auth = 1) { return 401; }
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/analytics {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/analytics/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/notification/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/nurse-workflow/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/consent/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/consent/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/events/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/events/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/qrda/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/hcc/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/ecr/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/prior-auth/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/provider-access/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/api/v1/audit/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/audit/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/api/v1/compliance/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/compliance/ {
                proxy_pass http://gateway_clinical;
            }

            location ~ ^/actuator/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/demo/ {
                proxy_pass http://demo_seeding;
            }

            location ~ ^/v3/api-docs/ {
                proxy_pass http://gateway_admin;
            }

            location ~ ^/swagger-ui/ {
                proxy_pass http://gateway_admin;
            }

            location = /swagger-ui.html {
                proxy_pass http://gateway_admin;
            }

            location / {
                proxy_pass http://gateway_admin;
            }
        }
        EOF

        nginx -t
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
