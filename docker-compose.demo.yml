      TRACING_URL: http://jaeger:4318/v1/traces
      GATEWAY_AUTH_SIGNING_SECRET: '2J3YcbuHgPp0xyMq3GHYJ/MNolqB+Hvp4j/fsA6LQYM='
      GATEWAY_AUTH_DEV_MODE: "true"
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:db/changelog/db.changelog-master.xml
      SPRING_FLYWAY_ENABLED: "false"
      # Using update mode for demo to handle shared authentication entities
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # FHIR service for patient conditions
      FHIR_SERVER_URL: http://fhir-service:8085/fhir
      # Patient service URL
      PATIENT_SERVICE_URL: http://patient-service:8084/patient
      # Care Gap service URL
      CARE_GAP_SERVICE_URL: http://hdim-demo-care-gap:8086/care-gap
      # HCC model weights (V24/V28 transition blending)
      HCC_MODEL_V24_WEIGHT: "0.33"
      HCC_MODEL_V28_WEIGHT: "0.67"
      JAVA_OPTS: "-Xmx1024m -Xms512m"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      HEALTH_TENANT_ID: service-health-hcc
    ports:
      - "8105:8105"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8105/hcc/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Demo Seeding Service - for generating synthetic demo data
  demo-seeding-service:
    container_name: hdim-demo-seeding
    build:
      context: ./backend
      dockerfile: modules/services/demo-seeding-service/Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
      care-gap-service:
        condition: service_healthy
      gateway-edge:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,demo
      SERVER_PORT: 8098
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_demo
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_LIQUIBASE_CLEAR_CHECKSUMS: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: demo-seeding-service
      JAVA_OPTS: "-Xmx384m -Xms192m"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      # Downstream service URLs - Use direct service URLs to avoid gateway timeout issues
      FHIR_SERVICE_URL: http://fhir-service:8085/fhir
      FHIR_EXTERNAL_URL: http://fhir-service:8085/fhir
      FHIR_TARGET: internal
      CARE_GAP_SERVICE_URL: http://hdim-demo-care-gap:8086/care-gap
      GATEWAY_SERVICE_URL: http://gateway-edge:8080
      GATEWAY_DB_URL: jdbc:postgresql://postgres:5432/gateway_db
      GATEWAY_DB_USER: healthdata
      GATEWAY_DB_PASSWORD: demo_password_2024
      DEMO_SERVICES_GATEWAY_DB_URL: jdbc:postgresql://postgres:5432/gateway_db
      DEMO_SERVICES_GATEWAY_DB_USERNAME: healthdata
      DEMO_SERVICES_GATEWAY_DB_PASSWORD: demo_password_2024
      DEMO_SERVICES_FHIR_DB_URL: jdbc:postgresql://postgres:5432/fhir_db
      DEMO_SERVICES_FHIR_DB_USERNAME: healthdata
      DEMO_SERVICES_FHIR_DB_PASSWORD: demo_password_2024
      # Snapshot storage
      DEMO_SNAPSHOTS_DIR: /app/snapshots
      DEMO_PERSISTENCE_ENABLED: "true"
      DEMO_QUALITY_MEASURES_ENABLED: "false"
      DEMO_GENERATION_DEFAULT_PATIENT_COUNT: "200"
      DEMO_MULTI_TENANT_PATIENTS_PER_TENANT: "100"
      DEMO_PERFORMANCE_PARALLEL_GENERATION: "false"
      DEMO_PERFORMANCE_MAX_CONCURRENT_REQUESTS: "2"
      HEALTH_TENANT_ID: service-health-demo-seeding
    ports:
      - "8098:8098"
    volumes:
      - demo_snapshots:/app/snapshots
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8098/demo/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 2048M

  # Ops Service - orchestrates on-prem deployment steps for MFE console
  ops-service:
    container_name: hdim-demo-ops
    build:
      context: .
      dockerfile: tools/ops-server/Dockerfile
    environment:
      PORT: 4710
      WORKSPACE_DIR: /workspace
      COMPOSE_FILE: /workspace/docker-compose.demo.yml
      COMPOSE_PROJECT_NAME: hdim-master
      DEMO_SEEDING_URL: http://demo-seeding-service:8098
      AUTH_USERNAME: demo-evaluator
      AUTH_PASSWORD: demo
      SKIP_FRONTEND_VALIDATE: "1"
      GATEWAY_URL: http://gateway-edge:8080
      QUALITY_API_BASE: http://gateway-edge:8080/api/quality
      QUALITY_DIRECT_BASE: http://quality-measure-service:8087/quality-measure
      QUALITY_HEALTH_URL: http://quality-measure-service:8087/quality-measure/actuator/health
      FHIR_URL: http://fhir-service:8085/fhir
      PATIENT_API_BASE: http://patient-service:8084/patient/api/v1
      CARE_GAP_API_BASE: http://care-gap-service:8086/care-gap/api/v1
      QUALITY_MEASURE_API_BASE: http://quality-measure-service:8087/quality-measure
      FHIR_BASE_URL: http://fhir-service:8085/fhir
      CARE_GAP_BASE_URL: http://care-gap-service:8086/care-gap
      AUDIT_DIRECT_URL: http://audit-query-service:8088/api/v1/audit/logs/statistics
      AUDIT_GATEWAY_URL: http://gateway-edge:8080/api/v1/audit/logs/statistics
      SKIP_FHIR_QUERY: "1"
      CURL_MAX_TIME: "300"
      CURL_CONNECT_TIMEOUT: "5"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    ports:
      - "4710:4710"
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Clinical Portal ─────────────────────────────────────────────────────────
  # Demo mode: include the clinical portal container for deterministic local CI
  # and for media capture (screenshots/videos) without requiring `nx serve`.
  clinical-portal:
    container_name: hdim-demo-clinical-portal
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile.prebuilt
    depends_on:
      gateway-edge:
        condition: service_healthy
      demo-seeding-service:
        condition: service_healthy
    environment:
      API_URL: http://gateway-edge:8080
      DEFAULT_TENANT_ID: acme-health
      DEMO_SEEDING_URL: http://demo-seeding-service:8098
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /usr/share/nginx/html/index.html && exit 0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  hdim-demo-network:
    name: demo_hdim-demo-network
    external: true

volumes:
  demo_postgres_data:
    driver: local
  demo_snapshots:
    driver: local
  # customer_fhir_data and customer_cdr_data moved to docker-compose.customer-sim.yml
