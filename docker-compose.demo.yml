      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Dsun.net.inetaddr.ttl=60 -Dsun.net.inetaddr.negative.ttl=0"
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_SERVICE: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_AUTH: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: gateway-clinical-service
      BACKEND_SERVICES_CARE_GAP_URL: http://hdim-demo-care-gap:8086/care-gap
      BACKEND_SERVICES_EVENTS_URL: http://event-processing-service:8083/events
      BACKEND_SERVICES_QRDA_EXPORT_URL: http://qrda-export-service:8104/qrda-export
      BACKEND_SERVICES_HCC_URL: http://hcc-service:8105/hcc
      BACKEND_SERVICES_ECR_URL: http://ecr-service:8101/ecr
      BACKEND_SERVICES_PRIOR_AUTH_URL: http://prior-auth-service:8102/prior-auth
      BACKEND_SERVICES_AUDIT_URL: http://audit-query-service:8088/api/v1/audit
      AUTHENTICATION_COOKIE_SECURE: "false"
      AUTHENTICATION_COOKIE_SAME_SITE: "Lax"
      GATEWAY_AUTH_SIGNING_SECRET: '2J3YcbuHgPp0xyMq3GHYJ/MNolqB+Hvp4j/fsA6LQYM='
      GATEWAY_AUTH_ENFORCED: "false"
      GATEWAY_RATE_LIMIT_ENABLED: "false"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS: "demo-tenant,acme-health,demo-admin,summit-care,valley-health,blue-shield-demo,united-demo"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_0: "demo-tenant"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_1: "acme-health"
