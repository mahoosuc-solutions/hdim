      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx256m -Xms128m"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Dsun.net.inetaddr.ttl=60 -Dsun.net.inetaddr.negative.ttl=0"
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_SERVICE: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_AUTH: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: gateway-fhir-service
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8085/fhir
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084/patient
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087/quality-measure
      BACKEND_SERVICES_CQL_ENGINE_URL: http://cql-engine-service:8081/cql-engine
      AUTHENTICATION_COOKIE_SECURE: "false"
      AUTHENTICATION_COOKIE_SAME_SITE: "Lax"
      GATEWAY_AUTH_SIGNING_SECRET: '2J3YcbuHgPp0xyMq3GHYJ/MNolqB+Hvp4j/fsA6LQYM='
      GATEWAY_AUTH_ENFORCED: "false"
      GATEWAY_RATE_LIMIT_ENABLED: "false"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS: "demo-tenant,acme-health,demo-admin,summit-care,valley-health,blue-shield-demo,united-demo"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_0: "demo-tenant"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_1: "acme-health"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_2: "demo-admin"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_3: "summit-care"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_4: "valley-health"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_5: "blue-shield-demo"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS_6: "united-demo"
      HEALTH_TENANT_ID: service-health-gateway-fhir
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  audit-query-service:
    container_name: hdim-demo-audit-query
    build:
      context: ./backend
      dockerfile: modules/services/audit-query-service/Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: demo_password_2024
      HEALTHDATA_PERSISTENCE_PRIMARY_URL: jdbc:postgresql://postgres:5432/audit_db
      HEALTHDATA_PERSISTENCE_PRIMARY_USERNAME: healthdata
      HEALTHDATA_PERSISTENCE_PRIMARY_PASSWORD: demo_password_2024
      HEALTHDATA_PERSISTENCE_PRIMARY_DRIVER_CLASS_NAME: org.postgresql.Driver
      HEALTHDATA_PERSISTENCE_PRIMARY_POOL_NAME: audit-pool
      HEALTHDATA_PERSISTENCE_PRIMARY_MAXIMUM_POOL_SIZE: 10
      HEALTHDATA_PERSISTENCE_PRIMARY_MINIMUM_IDLE: 2
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8088
      JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      HEALTHDATA_SECURITY_JWT_SECRET: DemoSecretKeyForHDIMShouldBeAtLeast256BitsLongForHS256Algorithm12345678
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:db/changelog/db.changelog-master.xml
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: audit-query-service
      GATEWAY_AUTH_DEV_MODE: "true"
      GATEWAY_AUTH_SIGNING_SECRET: '2J3YcbuHgPp0xyMq3GHYJ/MNolqB+Hvp4j/fsA6LQYM='
      JAVA_OPTS: "-Xmx3g -Xms512m"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      HEALTH_TENANT_ID: service-health-audit
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s
    networks:
      - hdim-demo-network
    deploy:
      resources:
        limits:
          memory: 512M

  gateway-clinical-service:
    container_name: hdim-demo-gateway-clinical
    build:
      context: ./backend/modules/services/gateway-clinical-service
      dockerfile: Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
