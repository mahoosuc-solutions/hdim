      BACKEND_SERVICES_AGENT_BUILDER_URL: http://agent-builder-service:8096
      BACKEND_SERVICES_SALES_AUTOMATION_URL: http://sales-automation-service:8106
      AUTHENTICATION_COOKIE_SECURE: "false"
