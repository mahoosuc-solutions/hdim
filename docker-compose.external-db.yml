# Docker Compose Override for External PostgreSQL
# Use this when connecting to a PostgreSQL instance outside Docker
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.external-db.yml --profile core up -d
#
# Prerequisites:
#   1. Run external-db-setup.sql on your PostgreSQL instance
#   2. Set POSTGRES_HOST in .env (default: host.docker.internal for Docker Desktop)
#   3. For WSL2: Use Windows host IP from /etc/resolv.conf

services:
  # Disable the Docker PostgreSQL container
  postgres:
    profiles: ["disabled"]

  # Override each service to use external PostgreSQL
  gateway-service:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/gateway_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fhir-service:
