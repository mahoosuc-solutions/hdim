# External FHIR Server for Customer Simulation
# Simulates customer's EHR data source (Epic, Cerner, etc.)
#
# Usage:
#   docker compose -f docker-compose.fhir-server.yml up -d
#
# FHIR Server: http://localhost:8088/fhir
# FHIR Metadata: http://localhost:8088/fhir/metadata
#
# Load synthetic data:
#   docker exec external-fhir-server /load-synthea-data.sh
#   OR
#   curl -X POST http://localhost:8088/fhir -H "Content-Type: application/fhir+json" -d @patient.json

services:
  # ============================================
  # HAPI FHIR SERVER
  # ============================================

  hapi-fhir:
    container_name: external-fhir-server
    image: hapiproject/hapi:latest
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      # FHIR Configuration
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_contains_searches: "true"
      hapi.fhir.allow_override_default_search_params: "true"
      hapi.fhir.reuse_cached_search_results_millis: 60000
      hapi.fhir.subscription.resthook_enabled: "true"
      hapi.fhir.cr_enabled: "true"

      # Performance tuning
      hapi.fhir.expunge_enabled: "true"
      hapi.fhir.binary_storage_enabled: "true"
      hapi.fhir.default_page_size: 20
      hapi.fhir.max_page_size: 200

      # Database (H2 in-memory for simplicity)
      spring.datasource.url: jdbc:h2:mem:hapi;DB_CLOSE_DELAY=-1
      spring.datasource.driverClassName: org.h2.Driver
      spring.datasource.username: sa
      spring.datasource.password: sa
      spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.H2Dialect
      spring.jpa.hibernate.ddl-auto: update

      # Memory settings
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Xms512m -Xmx2g"
    volumes:
      - hapi_data:/data/hapi
      - ./docker/fhir-server/synthea-data:/synthea-data:ro
    # Distroless image: use JVM liveness check since curl/wget aren't available.
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - fhir-network
      - demo-network

  # ============================================
  # SYNTHEA DATA GENERATOR (Optional)
  # ============================================

  synthea-generator:
    container_name: synthea-generator
    image: synthetichealth/synthea:latest
    profiles: ["generate"]
    command: >
      -p 100
      --exporter.fhir.export=true
      --exporter.fhir.bulk_data=true
      --exporter.years_of_history=5
      Massachusetts
    volumes:
      - synthea_output:/output
    networks:
      - fhir-network

  # ============================================
  # FHIR DATA LOADER (Load Synthea data into HAPI)
  # ============================================

  fhir-loader:
    container_name: fhir-data-loader
    image: curlimages/curl:latest
    profiles: ["load"]
    depends_on:
      hapi-fhir:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Loading synthetic FHIR data...'
        for file in /synthea-data/fhir/*.json; do
          if [ -f \"$$file\" ]; then
            echo \"Loading $$file\"
            curl -s -X POST http://hapi-fhir:8080/fhir \
              -H 'Content-Type: application/fhir+json' \
              -d @\"$$file\" > /dev/null
          fi
        done
        echo 'Data loading complete!'
      "
    volumes:
      - synthea_output:/synthea-data:ro
    networks:
      - fhir-network

networks:
  fhir-network:
    name: fhir-external-network
    driver: bridge
  demo-network:
    name: hdim-demo-network
    external: true

volumes:
  hapi_data:
    name: hapi-fhir-data
  synthea_output:
    name: synthea-generated-data
