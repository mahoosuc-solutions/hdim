version: '3.8'

services:
  # PostgreSQL Database with all required databases
  postgres:
    image: postgres:16-alpine
    container_name: healthdata-postgres-local
    environment:
      POSTGRES_DB: healthdata_db
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: healthdata_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: healthdata-redis-local
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - healthdata-network

  # PgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: healthdata-pgadmin-local
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@healthdata.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - healthdata-network
    profiles:
      - tools

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:0.8.0
    container_name: healthdata-redis-commander-local
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - healthdata-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  healthdata-network:
    driver: bridge
