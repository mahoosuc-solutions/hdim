services:
  mcp-edge-platform:
    build:
      context: .
      dockerfile: mcp-edge-platform/Dockerfile
    env_file: ./mcp-edge-platform/.env
    restart: unless-stopped
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 2s
      start_period: 5s
      retries: 6

  mcp-edge-devops:
    build:
      context: .
      dockerfile: mcp-edge-devops/Dockerfile
    env_file: ./mcp-edge-devops/.env
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3200/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 2s
      start_period: 5s
      retries: 6

  mcp-edge-clinical:
    build:
      context: .
      dockerfile: mcp-edge-clinical/Dockerfile
    ports:
      - "3300:3300"
    env_file: ./mcp-edge-clinical/.env
    environment:
      CLINICAL_TOOL_STRATEGY: composite
      HDIM_DEMO_MODE: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3300/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 2s
      start_period: 5s
      retries: 6
