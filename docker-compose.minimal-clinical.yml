# HDIM Minimal Clinical Portal
# Connects to external PostgreSQL (WSL) and optional external FHIR server
#
# Usage:
#   cp .env.customer-simulation .env
#   docker compose -f docker-compose.minimal-clinical.yml up -d
#
# Prerequisites:
#   1. PostgreSQL running in WSL with databases initialized
#   2. Run: psql -U postgres -f docker/postgres/external-db-setup.sql
#
# Services included (~5GB RAM):
#   - Redis (caching)
#   - Jaeger (tracing)
#   - Gateway Service (authentication)
#   - FHIR Service (clinical data)
#   - Patient Service (patient management)
#   - Quality Measure Service (CQL evaluation)
#   - Care Gap Service (gap detection)
#   - Clinical Portal (Angular UI)

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  redis:
    container_name: hdim-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdim-network

  jaeger:
    container_name: hdim-jaeger
    image: jaegertracing/all-in-one:1.53
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdim-network

  zookeeper:
    container_name: hdim-zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hdim-network

  kafka:
    container_name: hdim-kafka
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdim-network

  postgres:
    container_name: hdim-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: healthdata_password
    # No host port mapping to avoid conflicts; internal-only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/minimal-db-setup.sql:/docker-entrypoint-initdb.d/01-minimal-db-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdim-network

  # ============================================
  # CORE SERVICES
  # ============================================

  gateway-admin-service:
    container_name: hdim-gateway-admin
    image: hdim-master-gateway-admin-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      GATEWAY_AUTH_HEADER_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      # Demo mode - disable auth enforcement and inject demo user headers
      GATEWAY_AUTH_ENFORCED: "false"
      GATEWAY_AUTH_DEMO_USER_USER_ID: "00000000-0000-0000-0000-000000000001"
      GATEWAY_AUTH_DEMO_USER_USERNAME: "demo-user"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS: "demo-tenant,acme-health"
      GATEWAY_AUTH_DEMO_USER_ROLES: "ADMIN,CLINICIAN,ANALYST,EVALUATOR"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: gateway-admin-service
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_AUTH: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_AUTHENTICATION: DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-network

  gateway-fhir-service:
    container_name: hdim-gateway-fhir
    image: hdim-master-gateway-fhir-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      GATEWAY_AUTH_HEADER_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      # Demo mode - disable auth enforcement and inject demo user headers
      GATEWAY_AUTH_ENFORCED: "false"
      GATEWAY_AUTH_DEMO_USER_USER_ID: "00000000-0000-0000-0000-000000000001"
      GATEWAY_AUTH_DEMO_USER_USERNAME: "demo-user"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS: "demo-tenant,acme-health"
      GATEWAY_AUTH_DEMO_USER_ROLES: "ADMIN,CLINICIAN,ANALYST,EVALUATOR"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: gateway-fhir-service
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_AUTH: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_AUTHENTICATION: DEBUG
      # Backend service URLs for Docker networking (include context paths)
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8085/fhir
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084/patient
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087/quality-measure
      BACKEND_SERVICES_CQL_ENGINE_URL: http://cql-engine-service:8081/cql-engine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-network

  gateway-clinical-service:
    container_name: hdim-gateway-clinical
    image: hdim-master-gateway-clinical-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      GATEWAY_AUTH_HEADER_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      # Demo mode - disable auth enforcement and inject demo user headers
      GATEWAY_AUTH_ENFORCED: "false"
      GATEWAY_AUTH_DEMO_USER_USER_ID: "00000000-0000-0000-0000-000000000001"
      GATEWAY_AUTH_DEMO_USER_USERNAME: "demo-user"
      GATEWAY_AUTH_DEMO_USER_TENANT_IDS: "demo-tenant,acme-health"
      GATEWAY_AUTH_DEMO_USER_ROLES: "ADMIN,CLINICIAN,ANALYST,EVALUATOR"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: gateway-clinical-service
      LOGGING_LEVEL_COM_HEALTHDATA_GATEWAY_AUTH: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_AUTHENTICATION: DEBUG
      # Backend service URLs for Docker networking (include context paths)
      BACKEND_SERVICES_CARE_GAP_URL: http://care-gap-service:8086/care-gap
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-network

  gateway-edge:
    container_name: hdim-gateway-edge
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8001:8080"
    depends_on:
      gateway-admin-service:
        condition: service_healthy
      gateway-fhir-service:
        condition: service_healthy
      gateway-clinical-service:
        condition: service_healthy
    volumes:
      - ./docker/gateway-edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hdim-network

  fhir-service:
    container_name: hdim-fhir
    image: hdim-master-fhir-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      # Use simple cache instead of Redis to avoid FHIR resource serialization issues
      SPRING_CACHE_TYPE: simple
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EXTERNAL_FHIR_URL: http://host.docker.internal:8080/fhir
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: fhir-service
      # Disable Elasticsearch health check (not used in minimal setup)
      MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/fhir/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - hdim-network

  patient-service:
    container_name: hdim-patient
    image: hdim-master-patient-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: patient-service
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
      LOGGING_LEVEL_COM_HEALTHDATA_PATIENT: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
      LOGGING_LEVEL_FEIGN: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_OPENFEIGN: DEBUG
      LOGGING_LEVEL_ROOT: DEBUG
      # Service URLs for Docker networking
      # FeignClient adds /fhir to paths, so base URL should NOT include /fhir
      FHIR_SERVER_URL: http://host.docker.internal:8080
      CONSENT_SERVER_URL: http://care-gap-service:8086
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/patient/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-network

  quality-measure-service:
    container_name: hdim-quality-measure
    image: hdim-master-quality-measure-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quality_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FHIR_SERVICE_URL: http://host.docker.internal:8080/fhir
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: quality-measure-service
      CQL_ENGINE_SERVICE_URL: http://cql-engine-service:8081/cql-engine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8087/quality-measure/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - hdim-network

  cql-engine-service:
    container_name: hdim-cql-engine
    image: hdim-master-cql-engine-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cql_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8081
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      FHIR_SERVICE_URL: http://host.docker.internal:8080/fhir
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: cql-engine-service
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/cql-engine/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - hdim-network

  care-gap-service:
    container_name: hdim-care-gap
    image: hdim-master-care-gap-service:${VERSION:-latest}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: external-db
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caregap_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FHIR_SERVICE_URL: http://host.docker.internal:8080/fhir
      QUALITY_MEASURE_SERVICE_URL: http://quality-measure-service:8087/quality-measure
      JWT_SECRET: ${JWT_SECRET:-hdim-dev-jwt-secret-key-for-local-development-minimum-64-characters-required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      GATEWAY_AUTH_DEV_MODE: ${GATEWAY_AUTH_DEV_MODE:-true}
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-dev-signing-secret-for-local-testing-only-minimum-32-chars}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TRACING_URL: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: care-gap-service
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      quality-measure-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/care-gap/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hdim-network

  # ============================================
  # CLINICAL PORTAL (Frontend)
  # ============================================

  clinical-portal:
    container_name: hdim-clinical-portal
    image: hdim-master-clinical-portal:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile
    pull_policy: never
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      API_URL: http://gateway-edge:8080
    depends_on:
      gateway-edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - hdim-network

networks:
  hdim-network:
    name: hdim-clinical-network
    driver: bridge

volumes:
  redis_data:
  postgres_data:
