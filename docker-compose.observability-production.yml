# Production observability stack with Elasticsearch-backed Jaeger
# Replaces the default in-memory/Badger storage used in docker-compose.observability.yml
#
# Prerequisites:
#   - 8 GB RAM available (Elasticsearch requires at least 2-4 GB)
#   - Ports 9200, 5601, 4317, 4318, 14268, 16686 available
#
# Usage:
#   docker compose -f docker-compose.observability-production.yml up -d
#
# Verify:
#   curl http://localhost:9200/_cluster/health
#   open http://localhost:16686   # Jaeger UI
#   open http://localhost:5601    # Kibana
#
# To integrate with main HDIM services (so service spans reach this Jaeger):
#   docker compose -f docker-compose.yml -f docker-compose.observability-production.yml up -d
#   (services already export to http://jaeger:4318/v1/traces — jaeger container_name matches)

services:

  # ---------------------------------------------------------------------------
  # Elasticsearch — persistent span storage
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hdim-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - cluster.name=hdim-traces
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hdim-observability

  # ---------------------------------------------------------------------------
  # Jaeger Collector — receives spans from HDIM services via OTLP
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/jaeger-collector:1.53
    container_name: jaeger
    environment:
      SPAN_STORAGE_TYPE: elasticsearch
      ES_SERVER_URLS: http://elasticsearch:9200
      ES_INDEX_PREFIX: hdim
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"   # OTLP gRPC  (matches OTEL_EXPORTER_OTLP_ENDPOINT used by services)
      - "4318:4318"   # OTLP HTTP  (matches OTEL_EXPORTER_OTLP_ENDPOINT used by services)
      - "14268:14268" # Jaeger Thrift HTTP collector
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hdim-observability

  # ---------------------------------------------------------------------------
  # Jaeger Query — serves the Jaeger UI and query API
  # ---------------------------------------------------------------------------
  jaeger-query:
    image: jaegertracing/jaeger-query:1.53
    container_name: hdim-jaeger-query
    environment:
      SPAN_STORAGE_TYPE: elasticsearch
      ES_SERVER_URLS: http://elasticsearch:9200
      ES_INDEX_PREFIX: hdim
    ports:
      - "16686:16686" # Jaeger UI
    depends_on:
      - jaeger
    networks:
      - hdim-observability

  # ---------------------------------------------------------------------------
  # Kibana — optional: direct ES index inspection / index lifecycle management
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: hdim-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hdim-observability

volumes:
  elasticsearch-data:
    driver: local

networks:
  hdim-observability:
    driver: bridge
    name: hdim-observability
