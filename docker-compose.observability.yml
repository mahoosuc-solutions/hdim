version: '3.8'

# Observability Stack: Distributed Tracing, Metrics, and Logging
# Includes Jaeger for tracing, enhanced Prometheus, and Grafana dashboards

services:
  # Jaeger All-in-One for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    ports:
      - "6831:6831/udp"   # Jaeger Thrift compact (agent)
      - "6832:6832/udp"   # Jaeger Thrift binary (agent)
      - "5778:5778"       # Agent configs
      - "16686:16686"     # Jaeger UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
      - "14250:14250"     # gRPC (model.proto)
      - "14268:14268"     # Jaeger Thrift HTTP
      - "14269:14269"     # Admin port (health check)
      - "9411:9411"       # Zipkin compatible endpoint
    volumes:
      - jaeger-data:/badger
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector for unified telemetry collection
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "1888:1888"   # pprof extension
      - "8888:8888"   # Prometheus metrics from collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "55679:55679" # zpages extension
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - observability-net

  # Prometheus with enhanced configuration
  prometheus-tracing:
    image: prom/prometheus:v2.48.0
    container_name: prometheus-tracing
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./docker/prometheus/prometheus-tracing.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts-tracing.yml:/etc/prometheus/alerts-tracing.yml:ro
      - prometheus-tracing-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana with tracing dashboards
  grafana-tracing:
    image: grafana/grafana:10.2.3
    container_name: grafana-tracing
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./docker/grafana/provisioning-tracing:/etc/grafana/provisioning:ro
      - grafana-tracing-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - jaeger
      - prometheus-tracing
    networks:
      - observability-net

volumes:
  jaeger-data:
  prometheus-tracing-data:
  grafana-tracing-data:

networks:
  observability-net:
    driver: bridge
