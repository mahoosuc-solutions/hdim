# Docker Compose Override for Local Development
# This file automatically applies when running docker compose commands
# Purpose: Add memory limits to prevent WSL crashes
#
# Memory Budget (targeting 12GB total for Docker):
# - Infrastructure: ~2GB (Postgres 512MB, Redis 128MB, Kafka 1GB, Zookeeper 512MB)
# - Core Services: ~4GB (8 services @ 512MB each)
# - Buffer: ~6GB for Gradle builds and act runner
#
# To bypass these limits temporarily:
#   docker compose -f docker-compose.yml up -d

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  zookeeper:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

  kafka:
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"

  # ============================================
  # CORE CLINICAL SERVICES - Limited to 512MB each
  # ============================================

  gateway-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      JAVA_OPTS: "-Xmx384m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"

  cql-engine-service:
