      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-https://your-domain.com}

  # ============================================
  # AI SERVICES - PRODUCTION CONFIG
  # ============================================

  agent-runtime-service:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      HDIM_AGENT_SECURITY_ENCRYPTION_MASTER_KEY: ${AGENT_ENCRYPTION_KEY}
      HDIM_AGENT_SECURITY_ENCRYPTION_SALT: ${AGENT_ENCRYPTION_SALT:-hdim-agent-salt-production}

