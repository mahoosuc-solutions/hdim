      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-hdim-phi-salt-production}

  patient-service:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-hdim-phi-salt-production}

  fhir-service:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-hdim-phi-salt-production}

  care-gap-service:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-hdim-phi-salt-production}

  quality-measure-service:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-hdim-phi-salt-production}
