# Docker Compose for Production Environment - High Availability
# Production-grade configuration with replication, clustering, and persistent storage
# Usage: docker compose -f docker-compose.production.yml up -d
#
# WARNING: This configuration requires:
# - 4+ CPU cores, 32GB+ RAM
# - Production-grade network infrastructure
# - SSL/TLS certificates (Let's Encrypt or CA-signed)
# - Backup and recovery procedures in place
# - Monitoring and alerting configured
# - Secrets management (Vault or equivalent)
#
# DO NOT use in development. Use docker-compose.dev.sales-agents.yml instead.

version: '3.9'

x-app-security: &app_security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=128m
    - /run:rw,noexec,nosuid,size=32m

services:
  # ============================================================================
  # AI Sales Agent (HA: 2+ replicas with load balancing)
  # ============================================================================
  ai-sales-agent-1:
    <<: *app_security
    container_name: ai-sales-agent-prod-1
    image: hdim-ai-sales-agent:${BUILD_VERSION:-latest}
    ports:
      - "8090:8090"
    environment:
      - DEBUG=false
      - LOG_LEVEL=WARN
      - ENVIRONMENT=production
      - REGION=${AWS_REGION:-us-east-1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SAMPLER=parentbased_traceidratio
      - OTEL_SAMPLER_ARG=0.01
      - OTEL_METRICS_EXPORTER=prometheus
      - AI_SALES_AGENT_URL=http://localhost:8090
      - WEBSOCKET_URL=ws://clinical-workflow-service:8090/ws
      - POSTGRES_HOST=postgres-primary
      - POSTGRES_PORT=5432
      - POSTGRES_DB=customer_deployments_db
      - POSTGRES_USER=${POSTGRES_USER:-healthdata}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis-primary
      - REDIS_PORT=6379
      - REDIS_CLUSTER_ENABLED=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=claude-3-5-sonnet-20241022
    volumes:
      - ./logs/production/ai-sales-agent-1:/app/logs
    networks:
      - production-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-sales-agent-2:
    <<: *app_security
    container_name: ai-sales-agent-prod-2
    image: hdim-ai-sales-agent:${BUILD_VERSION:-latest}
    ports:
      - "8091:8090"
    environment:
      - DEBUG=false
      - LOG_LEVEL=WARN
      - ENVIRONMENT=production
      - REGION=${AWS_REGION:-us-east-1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SAMPLER_ARG=0.01
      - POSTGRES_HOST=postgres-primary
      - REDIS_HOST=redis-primary
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./logs/production/ai-sales-agent-2:/app/logs
    networks:
      - production-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================================
  # Live Call Sales Agent (HA: 2+ replicas with Chrome support)
  # ============================================================================
  live-call-sales-agent-1:
    <<: *app_security
    container_name: live-call-sales-agent-prod-1
    image: hdim-live-call-sales-agent:${BUILD_VERSION:-latest}
    ports:
      - "8095:8095"
    environment:
      - DEBUG=false
      - LOG_LEVEL=WARN
      - ENVIRONMENT=production
      - OTEL_SAMPLER_ARG=0.01
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-meet-service-account.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-hdim-production}
      - MOCK_GOOGLE_MEET=false
      - MOCK_SPEECH_TO_TEXT=false
      - AI_SALES_AGENT_URL=http://ai-sales-agent-1:8090
      - WEBSOCKET_URL=ws://clinical-workflow-service:8090/ws
      - POSTGRES_HOST=postgres-primary
      - REDIS_HOST=redis-primary
      - TRANSCRIPT_STORAGE_PATH=/data/transcripts
    volumes:
      - ./secrets:/secrets:ro
      - ./logs/production/live-call-sales-agent-1:/app/logs
      - call_transcripts_production:/data/transcripts
    networks:
      - production-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8095/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  live-call-sales-agent-2:
    <<: *app_security
    container_name: live-call-sales-agent-prod-2
    image: hdim-live-call-sales-agent:${BUILD_VERSION:-latest}
    ports:
      - "8096:8095"
    environment:
      - DEBUG=false
      - LOG_LEVEL=WARN
      - ENVIRONMENT=production
      - OTEL_SAMPLER_ARG=0.01
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-meet-service-account.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-hdim-production}
      - AI_SALES_AGENT_URL=http://ai-sales-agent-2:8090
      - POSTGRES_HOST=postgres-primary
      - REDIS_HOST=redis-primary
    volumes:
      - ./secrets:/secrets:ro
      - ./logs/production/live-call-sales-agent-2:/app/logs
      - call_transcripts_production:/data/transcripts
    networks:
      - production-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8095/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================================================
  # Coaching UI (HA: 2 replicas behind load balancer)
  # ============================================================================
  coaching-ui-1:
    container_name: coaching-ui-prod-1
    image: hdim-coaching-ui:${BUILD_VERSION:-latest}
    ports:
      - "4200:4200"
    environment:
      - ANGULAR_HOST=0.0.0.0
      - ANGULAR_PORT=4200
      - DEBUG=false
      - ENVIRONMENT=production
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  coaching-ui-2:
    container_name: coaching-ui-prod-2
    image: hdim-coaching-ui:${BUILD_VERSION:-latest}
    ports:
      - "4201:4200"
    environment:
      - ANGULAR_HOST=0.0.0.0
      - ANGULAR_PORT=4200
      - DEBUG=false
      - ENVIRONMENT=production
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # PostgreSQL Primary (with WAL archiving for backup)
  # ============================================================================
  postgres-primary:
    container_name: postgres-primary-prod
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-healthdata}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=-c shared_buffers=2GB -c max_connections=500 -c log_min_duration_statement=1000 -c wal_level=replica -c max_wal_senders=10 -c max_replication_slots=10
    volumes:
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/01-init-multi-db.sh:ro
      - ./scripts/pg-backup-prod.sh:/usr/local/bin/pg-backup.sh:ro
      - postgres_data_primary:/var/lib/postgresql/data
      - postgres_wal_archive:/pg_wal_archive
      - ./logs/production/postgres:/var/log/postgresql
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '1.0'
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthdata}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # PostgreSQL Replica (for read scaling and HA)
  # ============================================================================
  postgres-replica:
    container_name: postgres-replica-prod
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - PGUSER=${POSTGRES_USER:-healthdata}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_replica:/var/lib/postgresql/data
      - ./logs/production/postgres-replica:/var/log/postgresql
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '1.0'
          memory: 2048M
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: |
      bash -c "
        mkdir -p /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
        pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U ${POSTGRES_USER:-healthdata} -v -P -W
        echo 'standby_mode = on' >> /var/lib/postgresql/data/recovery.conf
        exec postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthdata}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Primary (Cluster mode for HA)
  # ============================================================================
  redis-primary:
    container_name: redis-primary-prod
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec --loglevel notice
    volumes:
      - redis_data_primary:/data
      - ./logs/production/redis:/var/log/redis
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2560M
        reservations:
          cpus: '0.5'
          memory: 1280M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Redis Replica (for read scaling and HA)
  # ============================================================================
  redis-replica:
    container_name: redis-replica-prod
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes --replicaof redis-primary 6379
    volumes:
      - redis_data_replica:/data
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2560M
        reservations:
          cpus: '0.5'
          memory: 1280M
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Jaeger - Distributed Tracing (with persistent backend)
  # ============================================================================
  jaeger:
    container_name: jaeger-prod
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - MEMORY_MAX_TRACES=100000
      - SPAN_STORAGE_TYPE=memory
    volumes:
      - ./logs/production/jaeger:/var/log/jaeger
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686/api/traces"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    container_name: prometheus-prod
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-production.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules-production.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
      - ./logs/production/prometheus:/var/log/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Alertmanager - Alert Routing and Notifications
  # ============================================================================
  alertmanager:
    container_name: alertmanager-prod
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager-production.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
      - ./logs/production/alertmanager:/var/log/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Grafana - Monitoring Dashboards
  # ============================================================================
  grafana:
    container_name: grafana-prod
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SECURITY_ALLOW_EMBED_INIT_STATUS_TOKEN=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
      - ./logs/production/grafana:/var/log/grafana
    networks:
      - production-network
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - prometheus
      - jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

# ============================================================================
# Networks
# ============================================================================
networks:
  production-network:
    driver: bridge
    name: production-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data_primary:
    driver: local
  postgres_data_replica:
    driver: local
  postgres_wal_archive:
    driver: local
  redis_data_primary:
    driver: local
  redis_data_replica:
    driver: local
  call_transcripts_production:
    driver: local
  jaeger_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
