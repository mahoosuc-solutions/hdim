# =============================================================================
# HealthData-in-Motion - Secrets Management Stack
# =============================================================================
# HashiCorp Vault for secure secrets management
# Use with: docker-compose -f docker-compose.yml -f docker-compose.secrets.yml up
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # HashiCorp Vault - Secrets Management
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.15
    container_name: healthdata-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://vault:8200
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/data"}}, "listener": [{"tcp": {"address": "0.0.0.0:8200", "tls_disable": true}}], "ui": true, "disable_mlock": true}'
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - ./docker/vault/config:/vault/config:ro
      - ./docker/vault/init-vault.sh:/vault/init-vault.sh:ro
    command: server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthdata-network

  # ===========================================================================
  # Vault Agent Sidecar (optional - for auto-auth and template rendering)
  # ===========================================================================
  # vault-agent:
  #   image: hashicorp/vault:1.15
  #   container_name: healthdata-vault-agent
  #   restart: unless-stopped
  #   depends_on:
  #     vault:
  #       condition: service_healthy
  #   environment:
  #     VAULT_ADDR: http://vault:8200
  #   volumes:
  #     - ./docker/vault/agent-config.hcl:/vault/config/agent.hcl:ro
  #     - vault_agent_secrets:/vault/secrets
  #   command: agent -config=/vault/config/agent.hcl
  #   networks:
  #     - healthdata-network

volumes:
  vault_data:
  vault_logs:
  # vault_agent_secrets:

networks:
  healthdata-network:
    external: true
