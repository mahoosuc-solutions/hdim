version: '3.9'

# HealthData-in-Motion - Staging Environment
# Complete Event-Driven Architecture with All Services
# Version: 2.0.0 - Event Intelligence Platform

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: healthdata-postgres-staging
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: staging_password_2025
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./docker/postgres/init-staging.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: healthdata-redis-staging
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================================================
  # Zookeeper (for Kafka)
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: healthdata-zookeeper-staging
    restart: unless-stopped
    ports:
      - "2182:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_staging_data:/var/lib/zookeeper/data
      - zookeeper_staging_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # Kafka Event Streaming
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: healthdata-kafka-staging
    restart: unless-stopped
    ports:
      - "9094:9092"
      - "9095:9093"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      # Performance tuning for staging
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
    volumes:
      - kafka_staging_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ============================================================================
  # FHIR Service (HAPI FHIR Server)
  # ============================================================================
  fhir-service:
    build:
      context: ./backend/modules/services/fhir-service
      dockerfile: Dockerfile
    image: healthdata/fhir-service:staging
    container_name: healthdata-fhir-staging
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_fhir
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      LOGGING_LEVEL_COM_HEALTHDATA_FHIR: DEBUG
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/fhir:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8083/fhir/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ============================================================================
  # CQL Engine Service
  # ============================================================================
  cql-engine-service:
    build:
      context: ./backend/modules/services/cql-engine-service
      dockerfile: Dockerfile
    image: healthdata/cql-engine-service:staging
    container_name: healthdata-cql-engine-staging
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fhir-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_cql
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FHIR_SERVICE_URL: http://fhir-service:8080/fhir
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      LOGGING_LEVEL_COM_HEALTHDATA_CQL: DEBUG
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/cql-engine:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8081/cql-engine/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ============================================================================
  # Quality Measure Service (Event Intelligence Hub)
  # ============================================================================
  quality-measure-service:
    build:
      context: ./backend/modules/services/quality-measure-service
      dockerfile: Dockerfile
    image: healthdata/quality-measure-service:staging
    container_name: healthdata-quality-measure-staging
    restart: unless-stopped
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cql-engine-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_quality_measure
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CQL_ENGINE_URL: http://cql-engine-service:8081/cql-engine
      FHIR_SERVER_URL: http://fhir-service:8080/fhir
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      LOGGING_LEVEL_COM_HEALTHDATA_QUALITY: DEBUG
      # Event-driven features
      HEALTH_SCORE_WEBSOCKET_ENABLED: "true"
      CARE_GAP_AUTO_CLOSURE_ENABLED: "true"
      RISK_ASSESSMENT_AUTO_ENABLED: "true"
      CLINICAL_ALERTS_ENABLED: "true"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/quality-measure:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8087/quality-measure/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ============================================================================
  # Event Router Service (NEW)
  # ============================================================================
  event-router-service:
    build:
      context: ./backend/modules/services/event-router-service
      dockerfile: Dockerfile
    image: healthdata/event-router-service:staging
    container_name: healthdata-event-router-staging
    restart: unless-stopped
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_event_router
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      LOGGING_LEVEL_COM_HEALTHDATA_EVENTROUTER: DEBUG
      # Priority queue configuration
      PRIORITY_QUEUE_CAPACITY: 50000
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/event-router:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

  # ============================================================================
  # Patient Service
  # ============================================================================
  patient-service:
    build:
      context: ./backend/modules/services/patient-service
      dockerfile: Dockerfile
    image: healthdata/patient-service:staging
    container_name: healthdata-patient-staging
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_patient
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      LOGGING_LEVEL_COM_HEALTHDATA_PATIENT: DEBUG
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/patient:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8084/patient/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================================================
  # Care Gap Service
  # ============================================================================
  care-gap-service:
    build:
      context: ./backend/modules/services/care-gap-service
      dockerfile: Dockerfile
    image: healthdata/care-gap-service:staging
    container_name: healthdata-care-gap-staging
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_care_gap
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: staging_password_2025
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: staging_jwt_secret_key_for_docker_environment_minimum_256_bits_required_for_hs512_algorithm_2025
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      LOGGING_LEVEL_COM_HEALTHDATA_CAREGAP: DEBUG
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    volumes:
      - ./logs/staging/care-gap:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8085/care-gap/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================================================
  # Gateway Service (Authentication & API Gateway)
  # ============================================================================
  gateway-service:
    build:
      context: ./backend/modules/services/gateway-service
      dockerfile: Dockerfile
    image: healthdata/gateway-service:staging
    container_name: healthdata-gateway-staging
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      cql-engine-service:
        condition: service_started
      quality-measure-service:
        condition: service_started
      patient-service:
        condition: service_started
      care-gap-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 9000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: healthdata_gateway
      DB_USERNAME: healthdata
      DB_PASSWORD: staging_password_2025
      JWT_SECRET: healthdata-gateway-staging-secret-key-minimum-256-bits-required-2025
      JWT_ACCESS_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      CQL_ENGINE_URL: http://cql-engine-service:8081
      QUALITY_MEASURE_URL: http://quality-measure-service:8087
      FHIR_SERVICE_URL: http://fhir-service:8080
      PATIENT_SERVICE_URL: http://patient-service:8084
      CARE_GAP_URL: http://care-gap-service:8085
      EVENT_ROUTER_URL: http://event-router-service:8089
      AUTH_ENFORCED: "true"
      CORS_ORIGINS: http://localhost:4200,http://localhost:80
      JAVA_OPTS: -Xms512m -Xmx1024m -XX:+UseG1GC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

  # ============================================================================
  # Clinical Portal Frontend
  # ============================================================================
  clinical-portal:
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile
    image: healthdata/clinical-portal:staging
    container_name: healthdata-clinical-portal-staging
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      - NODE_ENV=production
      - API_GATEWAY_URL=http://gateway-service:9000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - healthdata-staging
    depends_on:
      - gateway-service
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # Prometheus Monitoring
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: healthdata-prometheus-staging
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus-staging.yml:/etc/prometheus/prometheus.yml
      - prometheus_staging_data:/prometheus
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================================================
  # Grafana Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: healthdata-grafana-staging
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: staging_grafana_2025
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_SERVER_ROOT_URL: http://localhost:3002
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - healthdata-staging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# ============================================================================
# Networks
# ============================================================================
networks:
  healthdata-staging:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  zookeeper_staging_data:
    driver: local
  zookeeper_staging_logs:
    driver: local
  kafka_staging_data:
    driver: local
  prometheus_staging_data:
    driver: local
  grafana_staging_data:
    driver: local
