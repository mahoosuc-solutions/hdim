# HDIM Healthcare Platform - Complete Docker Compose
# All 26 Backend Services with Profiles (including migration-workflow-service)
#
# Usage:
#   docker compose --profile light up -d     # Infrastructure only (Postgres, Redis) - ~1GB RAM
#   docker compose --profile core up -d      # Infrastructure + 10 core clinical services
#   docker compose --profile ai up -d        # Infrastructure + 3 AI services
#   docker compose --profile analytics up -d # Infrastructure + 3 analytics services
#   docker compose --profile full up -d      # All 22 services
#
# For local CI testing with act runner:
#   docker compose --profile light up -d     # Start minimal infrastructure
#   act -j build                             # Run GitHub Actions locally

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  postgres:
    container_name: healthdata-postgres
    restart: unless-stopped
    image: postgres:15-alpine
    profiles: ["light", "core", "ai", "analytics", "full"]
    environment:
      POSTGRES_USER: healthdata
      POSTGRES_PASSWORD: healthdata_password
      POSTGRES_DB: healthdata_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthdata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  redis:
    container_name: healthdata-redis
    restart: unless-stopped
    image: redis:7-alpine
    profiles: ["light", "core", "ai", "analytics", "full"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  # Jaeger - Distributed Tracing Backend
  # Access UI at http://localhost:16686
  jaeger:
    container_name: healthdata-jaeger
    restart: unless-stopped
    image: jaegertracing/all-in-one:1.52
    profiles: ["core", "ai", "analytics", "full"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # Model used by Jaeger
      - "6831:6831/udp" # Thrift compact
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  zookeeper:
    container_name: healthdata-zookeeper
    restart: unless-stopped
    image: confluentinc/cp-zookeeper:7.5.0
    profiles: ["core", "ai", "analytics", "full"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthdata-network

  kafka:
    container_name: healthdata-kafka
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.5.0
    profiles: ["core", "ai", "analytics", "full"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9092"
      - "9095:9093"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - healthdata-network

  # PostgreSQL Backup Service
  # Runs scheduled backups with configurable retention
  # Manual backup: docker exec healthdata-backup /usr/local/bin/backup.sh
  # List backups:  docker exec healthdata-backup /usr/local/bin/restore.sh --list
  postgres-backup:
    container_name: healthdata-backup
    restart: unless-stopped
    build:
      context: ./docker/postgres/backup
      dockerfile: Dockerfile
    profiles: ["core", "ai", "analytics", "full"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: healthdata
      PGPASSWORD: healthdata_password
      BACKUP_RETENTION_DAYS: 7
      BACKUP_OUTPUT_DIR: /backups
      BACKUP_CRON: "0 2 * * *"  # Daily at 2 AM
      BACKUP_ON_STARTUP: "false"
      # SLACK_WEBHOOK_URL: ""  # Optional: Slack notifications
      # BACKUP_ENCRYPTION_KEY: ""  # Optional: GPG key for encryption
    volumes:
      - postgres_backups:/backups
    networks:
      - healthdata-network

  # ============================================
  # CORE CLINICAL SERVICES (8080-8087)
  # ============================================

  # Port 8080 - API Gateway
  gateway-service:
    container_name: healthdata-gateway-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: modules/services/gateway-service/Dockerfile
    profiles: ["core", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JWT_SECRET: mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm123456
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gateway_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      # Backend service URLs (include context-path + internal controller path)
      BACKEND_SERVICES_FHIR_URL: http://fhir-service:8085/fhir/fhir
      BACKEND_SERVICES_CQL_ENGINE_URL: http://cql-engine-service:8081/cql-engine
      BACKEND_SERVICES_QUALITY_MEASURE_URL: http://quality-measure-service:8087/quality-measure
      BACKEND_SERVICES_PATIENT_URL: http://patient-service:8084/patient
      BACKEND_SERVICES_CARE_GAP_URL: http://care-gap-service:8086/care-gap
      BACKEND_SERVICES_CONSENT_URL: http://consent-service:8082/consent
      BACKEND_SERVICES_EVENTS_URL: http://event-processing-service:8083/events
      BACKEND_SERVICES_AGENT_BUILDER_URL: http://agent-builder-service:8096
      BACKEND_SERVICES_AGENT_RUNTIME_URL: http://agent-runtime-service:8088
      BACKEND_SERVICES_QRDA_EXPORT_URL: http://qrda-export-service:8104
      BACKEND_SERVICES_HCC_URL: http://hcc-service:8105
      BACKEND_SERVICES_ECR_URL: http://ecr-service:8101
      BACKEND_SERVICES_PRIOR_AUTH_URL: http://prior-auth-service:8102
      BACKEND_SERVICES_SALES_AUTOMATION_URL: http://sales-automation-service:8106/sales-automation
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Port 8081 - CQL Engine Service
  cql-engine-service:
    container_name: healthdata-cql-engine-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: modules/services/cql-engine-service/Dockerfile
    profiles: ["core", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cql_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8081
      JWT_SECRET: mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm123456
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Gateway Trust Authentication - trusts gateway-injected X-Auth-* headers
      GATEWAY_AUTH_DEV_MODE: "true"
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/cql-engine/actuator/health"]
      interval: 30s
