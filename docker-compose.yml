      - "8106:8106"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8106/sales-automation/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # ============================================
  # SUPPORT SERVICES (8091)
  # ============================================

  # Port 8091 - Documentation Service
  documentation-service:
    container_name: healthdata-documentation-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: modules/services/documentation-service/Dockerfile
    profiles: ["full"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docs_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8091
      JWT_SECRET: mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm123456
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # Port 8107 - Notification Service
  notification-service:
    container_name: healthdata-notification-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: modules/services/notification-service/Dockerfile
    profiles: ["core", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: healthdata
      SPRING_DATASOURCE_PASSWORD: healthdata_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8107
      JWT_SECRET: mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm123456
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      TRACING_URL: http://jaeger:4318/v1/traces
      NOTIFICATION_EMAIL_ENABLED: "true"
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      # Gateway Trust Authentication - trusts gateway-injected X-Auth-* headers
      GATEWAY_AUTH_DEV_MODE: "true"
      GATEWAY_AUTH_SIGNING_SECRET: ${GATEWAY_AUTH_SIGNING_SECRET:-}
    ports:
      - "8107:8107"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8107/notification/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - healthdata-network

  # ============================================
  # FRONTEND SERVICE
  # ============================================

  clinical-portal:
    container_name: healthdata-clinical-portal
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/clinical-portal/Dockerfile
    profiles: ["full"]  # Removed from core - requires build
    depends_on:
      - gateway-service
    environment:
      API_URL: http://gateway-service:8080
    ports:
      - "4200:80"
    networks:
      - healthdata-network

networks:
  healthdata-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_backups:
