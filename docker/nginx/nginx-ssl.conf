# ====================================================================================================
# Nginx SSL/TLS Configuration for HealthData-in-Motion
# ====================================================================================================
# This configuration provides SSL termination, reverse proxy, and security headers
#
# Prerequisites:
# 1. SSL certificates generated and placed in /etc/ssl/
# 2. Update server_name with your actual domain
# 3. Update upstream backend addresses if needed

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=websocket_limit:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backend services
upstream cql_engine_backend {
    least_conn;
    server cql-engine-service:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream quality_measure_backend {
    least_conn;
    server quality-measure-service:8087 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream fhir_backend {
    least_conn;
    server fhir-service-mock:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.healthdata.example.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ====================================================================================================
# Main HTTPS Server
# ====================================================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.healthdata.example.com;

    # SSL Certificate Configuration
    ssl_certificate /etc/ssl/production/certificate.pem;
    ssl_certificate_key /etc/ssl/production/private-key.pem;

    # SSL Session Configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/healthdata-access.log combined;
    error_log /var/log/nginx/healthdata-error.log warn;

    # Connection limits
    limit_conn addr 10;

    # Client settings
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ================================================================================================
    # CQL Engine Service Routes
    # ================================================================================================
    location /cql-engine/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass https://cql_engine_backend/cql-engine/;
        proxy_ssl_verify off;  # If backend uses self-signed cert
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Connection pooling
        proxy_set_header Connection "";
    }

    # WebSocket endpoint for real-time updates
    location /cql-engine/ws/ {
        limit_req zone=websocket_limit burst=10 nodelay;

        proxy_pass https://cql_engine_backend/cql-engine/ws/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;

        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Actuator endpoints (health checks, metrics)
    location /cql-engine/actuator/ {
        # Restrict access to monitoring tools only
        allow 172.26.0.0/16;  # Docker network
        allow 127.0.0.1;       # Localhost
        deny all;

        proxy_pass https://cql_engine_backend/cql-engine/actuator/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ================================================================================================
    # Quality Measure Service Routes
    # ================================================================================================
    location /quality-measure/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass https://quality_measure_backend/quality-measure/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket endpoint for real-time health score updates
    location /quality-measure/ws/ {
        limit_req zone=websocket_limit burst=10 nodelay;

        proxy_pass https://quality_measure_backend/ws/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;

        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (long-lived connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    location /quality-measure/actuator/ {
        allow 172.26.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass https://quality_measure_backend/quality-measure/actuator/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ================================================================================================
    # FHIR Service Routes
    # ================================================================================================
    location /fhir/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://fhir_backend/fhir/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # ================================================================================================
    # Health Check Endpoint
    # ================================================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ================================================================================================
    # API Documentation (if using Swagger/OpenAPI)
    # ================================================================================================
    location /api-docs/ {
        proxy_pass https://cql_engine_backend/cql-engine/v3/api-docs/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass https://cql_engine_backend/cql-engine/swagger-ui/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
    }

    # ================================================================================================
    # Error Pages
    # ================================================================================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '{"error": "Not Found", "status": 404}';
        add_header Content-Type application/json;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 '{"error": "Internal Server Error", "status": 500}';
        add_header Content-Type application/json;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ====================================================================================================
# Grafana Dashboard (Monitoring)
# ====================================================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.healthdata.example.com;

    ssl_certificate /etc/ssl/production/certificate.pem;
    ssl_certificate_key /etc/ssl/production/private-key.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for live updates
    location /api/live/ {
        proxy_pass http://grafana:3000/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
