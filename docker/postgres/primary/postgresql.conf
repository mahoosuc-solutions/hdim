# =============================================================================
# PostgreSQL Primary Configuration for HDIM
# =============================================================================
# Optimized for healthcare data workloads with replication enabled
# =============================================================================

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# Memory Configuration (adjust based on container memory)
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
work_mem = 4MB
wal_buffers = 16MB

# Write-Ahead Log (WAL) - Replication
wal_level = replica
max_wal_senders = 5
wal_keep_size = 1GB
max_replication_slots = 5
hot_standby = on

# Synchronous Replication (optional - for strong consistency)
# synchronous_standby_names = 'replica_1'
# synchronous_commit = on

# Checkpoint Settings
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 2GB
min_wal_size = 512MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Parallel Query
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Logging - HIPAA Audit Requirements
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'ddl'

# Security
ssl = off  # Enable in production with proper certificates
password_encryption = scram-sha-256

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Miscellaneous
timezone = 'UTC'
datestyle = 'iso, mdy'
