# Prometheus Configuration for HealthData-in-Motion
# Scrapes metrics from CQL Engine Service and other services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'healthdata-in-motion'
    environment: 'docker'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # CQL Engine Service
  - job_name: 'cql-engine-service'
    metrics_path: '/cql-engine/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['cql-engine-service:8081']
        labels:
          service: 'cql-engine'
          application: 'cql-engine-service'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        target_label: hostname

  # Quality Measure Service
  - job_name: 'quality-measure-service'
    metrics_path: '/quality-measure/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['quality-measure-service:8087']
        labels:
          service: 'quality-measure'
          application: 'quality-measure-service'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: '([^:]+)(?::\d+)?'
        target_label: hostname

  # FHIR Service (HAPI FHIR)
  - job_name: 'fhir-service'
    metrics_path: '/fhir/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['fhir-service-mock:8080']
        labels:
          service: 'fhir'
          application: 'hapi-fhir'

  # Patient Service
  - job_name: 'patient-service'
    metrics_path: '/patient/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['patient-service:8084']
        labels:
          service: 'patient'

  # Care Gap Service
  - job_name: 'care-gap-service'
    metrics_path: '/care-gap/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['care-gap-service:8086']
        labels:
          service: 'care-gap'

  # Prior Auth Service
  - job_name: 'prior-auth-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['prior-auth-service:8102']
        labels:
          service: 'prior-auth'

  # Migration Workflow Service
  - job_name: 'migration-workflow-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['migration-workflow-service:8103']
        labels:
          service: 'migration-workflow'

  # QRDA Export Service
  - job_name: 'qrda-export-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['qrda-export-service:8104']
        labels:
          service: 'qrda-export'

  # HCC Service
  - job_name: 'hcc-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['hcc-service:8105']
