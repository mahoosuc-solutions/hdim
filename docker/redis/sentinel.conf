# Redis Sentinel Configuration
# Monitors the Redis master and handles automatic failover

# Sentinel port
port 26379

# Monitor the master named "hdim-master" at redis-master:6379
# Quorum of 2 means at least 2 sentinels must agree for failover
sentinel monitor hdim-master redis-master 6379 2

# Authentication for master (if REDIS_PASSWORD is set)
# sentinel auth-pass hdim-master ${REDIS_PASSWORD}

# Time in milliseconds to consider master down (30 seconds)
sentinel down-after-milliseconds hdim-master 30000

# Failover timeout in milliseconds (3 minutes)
sentinel failover-timeout hdim-master 180000

# Number of replicas that can be reconfigured in parallel during failover
sentinel parallel-syncs hdim-master 1

# Prevent Sentinel from modifying its configuration
# protected-mode no

# Logging
loglevel notice

# Announce IP for Docker networking
sentinel announce-ip redis-sentinel-1
sentinel announce-port 26379

# Deny scripts (security)
sentinel deny-scripts-reconfig yes
