template:
  name: "Clinical Dashboard"
  category: "dashboard"
  ai_tool: "dalle-3"
  
  base_prompt: |
    Create a modern healthcare analytics dashboard UI mockup for a clinical care management platform.
    
    LAYOUT:
    - Top navigation bar (white background, subtle shadow) with HDIM logo on the left, user menu on the right
    - Left sidebar navigation (240px wide, light gray background {sidebar_bg}) with icons: Dashboard, Patients, Care Gaps, Quality Measures, Analytics, Settings
    - Main content area (white background) showing:
      - Summary statistics row at top: 4 cards showing "Total Patients: {total_patients}", "Open Care Gaps: {open_gaps}", "Closed This Month: +{closed_month}", "HEDIS Score: {hedis_score}%"
      - Large bar chart showing care gap closure trend over 10 weeks (ascending blue bars, teal accent {accent_color})
      - Data table below showing priority patients with columns: Name, MRN, Risk Score, Care Gaps, Status
      - Map visualization on right side showing geographic distribution of patients
    
    STYLE:
    - Clean, modern SaaS aesthetic (similar to Stripe, Linear, or Vercel dashboards)
    - Primary color: Deep Blue {primary_color}
    - Accent color: Teal {accent_color}
    - Background: White {background_color} with subtle gray cards {card_bg}
    - Typography: Clean sans-serif (Inter or similar), clear hierarchy
    - Generous whitespace, minimal borders
    - Subtle shadows on cards for depth
    - Professional, trustworthy, modern
    
    TECHNICAL:
    - Resolution: {width}x{height} pixels
    - Format: High-quality PNG
    - No text artifacts or distortions
    - Realistic UI elements, not wireframes
    - Professional healthcare software appearance
    
    AVOID:
    - Generic stock photography
    - Cluttered interfaces
    - Cold/clinical aesthetics
    - Unrealistic data displays
    - Text rendering issues
  
  parameters:
    primary_color: "#1E3A5F"
    accent_color: "#00A9A5"
    background_color: "#FFFFFF"
    card_bg: "#F5F7FA"
    sidebar_bg: "#F5F7FA"
    total_patients: "12,847"
    open_gaps: "2,340"
    closed_month: "847"
    hedis_score: "78.4"
    width: 1920
    height: 1080
    size: "1024x1024"
    quality: "hd"
  
  variations:
    - name: "light"
      parameters:
        background: "light"
        theme: "light-mode"
    
    - name: "dark"
      parameters:
        background: "dark"
        background_color: "#1A1A1A"
        card_bg: "#2C2C2C"
        sidebar_bg: "#2C2C2C"
        primary_color: "#2C5282"
        theme: "dark-mode"
    
    - name: "mobile"
      parameters:
        width: 375
        height: 812
        size: "1024x1024"
        layout: "mobile"
        theme: "mobile-app"
