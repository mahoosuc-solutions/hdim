version: 2
updates:
  # Backend - Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "backend-team"
    assignees:
      - "devops-team"
    labels:
      - "dependencies"
      - "backend"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Ignore major version updates for stable dependencies
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
    groups:
      spring-dependencies:
        patterns:
          - "org.springframework*"
      testing-dependencies:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.testcontainers*"

  # Frontend - Clinical Portal NPM dependencies
  - package-ecosystem: "npm"
    directory: "/apps/clinical-portal"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "frontend-team"
    assignees:
      - "devops-team"
    labels:
      - "dependencies"
      - "frontend"
      - "clinical-portal"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Ignore major Angular updates until tested
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
    groups:
      angular-dependencies:
        patterns:
          - "@angular/*"
      testing-dependencies:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "vitest*"

  # Frontend - React App NPM dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "frontend-team"
    labels:
      - "dependencies"
      - "frontend"
      - "react-app"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      react-dependencies:
        patterns:
          - "react*"
      testing-dependencies:
        patterns:
          - "vitest*"
          - "@testing-library/*"

  # Docker - Base images and containers
  - package-ecosystem: "docker"
    directory: "/backend/modules/services/fhir-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    reviewers:
      - "devops-team"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "docker"
    directory: "/backend/modules/services/quality-measure-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    reviewers:
      - "devops-team"
    labels:
      - "dependencies"
      - "docker"
      - "security"

  - package-ecosystem: "docker"
    directory: "/apps/clinical-portal"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    reviewers:
      - "devops-team"
    labels:
      - "dependencies"
      - "docker"
      - "security"

  # GitHub Actions - Workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "devops-team"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-dependencies:
        patterns:
          - "actions/*"
          - "github/*"
