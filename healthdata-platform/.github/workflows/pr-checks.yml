name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, master, develop]

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Validate PR Title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          chore
          ci
          build
        requireScope: false
        subjectPattern: ^(?![A-Z]).+$
        subjectPatternError: |
          The subject "{subject}" found in the pull request title "{title}"
          didn't match the configured pattern. Please ensure that the subject
          doesn't start with an uppercase character.

    - name: Check PR Size
      run: |
        # Count changed lines
        changed_lines=$(git diff --stat ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | tail -n1 | awk '{print $4+$6}')
        echo "Changed lines: $changed_lines"

        if [ "$changed_lines" -gt 500 ]; then
          echo "⚠️ This PR is quite large ($changed_lines lines changed). Consider breaking it into smaller PRs."
          echo "large-pr=true" >> $GITHUB_OUTPUT
        fi

    - name: Check for Breaking Changes
      run: |
        if git log ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} --pretty=format:"%s %b" | grep -i "BREAKING CHANGE"; then
          echo "⚠️ This PR contains breaking changes. Please ensure they are documented."
        fi

  code-review-reminders:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Check for TODOs
      run: |
        todos=$(git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep -i "TODO" || true)
        if [ -n "$todos" ]; then
          echo "⚠️ New TODOs detected in this PR:"
          echo "$todos"
        fi

    - name: Check for Console Logs
      run: |
        console_logs=$(git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep -E "console\.(log|debug|info|warn|error)" || true)
        if [ -n "$console_logs" ]; then
          echo "⚠️ Console logs detected. Please remove before merging:"
          echo "$console_logs"
        fi

  automated-tests:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Run Quick Tests
      run: |
        echo "Running quick validation tests..."
        # Add quick test commands here

  pr-labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/labeler@v4
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler.yml

  pr-size-labeler:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
    - name: Add size label
      uses: codelytv/pr-size-labeler@v1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        xs_label: 'size/xs'
        xs_max_size: 10
        s_label: 'size/s'
        s_max_size: 100
        m_label: 'size/m'
        m_max_size: 500
        l_label: 'size/l'
        l_max_size: 1000
        xl_label: 'size/xl'
        message_if_xl: >
          This PR is extra large! Consider breaking it into smaller PRs for easier review.

  comment-on-pr:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    permissions:
      pull-requests: write

    steps:
    - name: Comment on new PR
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `👋 Thank you for your contribution!

            ## PR Checklist
            - [ ] Tests added/updated
            - [ ] Documentation updated
            - [ ] No breaking changes (or documented)
            - [ ] Code follows style guidelines
            - [ ] All CI checks passing

            A maintainer will review your PR soon. Please ensure all checks pass.`
          })
