name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sunday at midnight
  workflow_dispatch:

jobs:
  codeql-scanning:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java', 'javascript']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Set up JDK 21
      if: matrix.language == 'java'
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      if: matrix.language == 'java'
      working-directory: ./backend
      run: chmod +x gradlew

    - name: Build Java Code
      if: matrix.language == 'java'
      working-directory: ./backend
      run: ./gradlew build -x test --no-daemon

    - name: Set up Node.js
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Build JavaScript Code
      if: matrix.language == 'javascript'
      run: |
        cd apps/clinical-portal && npm ci && npm run build || echo "Build completed"
        cd ../../frontend && npm ci && npm run build || echo "Build completed"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{ matrix.language }}"

  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        path: '.'
        format: 'ALL'
        args: >-
          --enableRetired
          --enableExperimental
          --scan ./backend
          --scan ./apps/clinical-portal
          --scan ./frontend

    - name: Upload Dependency Check Report
      uses: actions/upload-artifact@v3
      with:
        name: dependency-check-report
        path: reports/

    - name: Publish Dependency Check Results
      if: always()
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: reports/dependency-check-report.sarif
      continue-on-error: true

  trivy-fs-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Run Trivy Vulnerability Scanner (Filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        ignore-unfixed: true

    - name: Upload Trivy FS Results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: 'trivy-filesystem'

    - name: Upload Trivy FS Results as Artifact
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: trivy-fs-results
        path: trivy-fs-results.sarif

  trivy-config-scanning:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Run Trivy Configuration Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-config-results.json'

    - name: Upload Trivy Config Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: trivy-config-results
        path: trivy-config-results.json

  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ['apps/clinical-portal', 'frontend']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      working-directory: ./${{ matrix.app }}
      run: npm ci

    - name: Run npm audit
      working-directory: ./${{ matrix.app }}
      run: npm audit --audit-level=moderate || echo "Audit completed with warnings"

    - name: Run npm audit fix
      working-directory: ./${{ matrix.app }}
      run: npm audit fix --dry-run || echo "Audit fix simulation completed"

  gradle-dependency-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      working-directory: ./backend
      run: chmod +x gradlew

    - name: Run Gradle Dependency Check
      working-directory: ./backend
      run: ./gradlew dependencyCheckAnalyze --no-daemon || echo "Dependency check completed"

    - name: Upload Gradle Dependency Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: gradle-dependency-check
        path: backend/build/reports/dependency-check-report.html

  secret-scanning:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: TruffleHog Secret Scanning
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified

  docker-image-scanning:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Images for Scanning
      run: |
        docker build -f backend/modules/services/fhir-service/Dockerfile -t fhir-service:scan backend/modules/services/fhir-service || echo "Build skipped"
        docker build -f backend/modules/services/quality-measure-service/Dockerfile -t quality-measure-service:scan backend/modules/services/quality-measure-service || echo "Build skipped"
        docker build -f apps/clinical-portal/Dockerfile -t clinical-portal:scan apps/clinical-portal || echo "Build skipped"

    - name: Run Trivy on FHIR Service Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fhir-service:scan'
        format: 'sarif'
        output: 'trivy-fhir-results.sarif'
      continue-on-error: true

    - name: Run Trivy on Quality Measure Service Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'quality-measure-service:scan'
        format: 'sarif'
        output: 'trivy-quality-results.sarif'
      continue-on-error: true

    - name: Run Trivy on Clinical Portal Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'clinical-portal:scan'
        format: 'sarif'
        output: 'trivy-portal-results.sarif'
      continue-on-error: true

    - name: Upload Docker Scanning Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: docker-scan-results
        path: trivy-*-results.sarif

  sast-sonarqube:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Grant execute permission for gradlew
      working-directory: ./backend
      run: chmod +x gradlew

    - name: SonarQube Scan
      working-directory: ./backend
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        if [ -n "$SONAR_TOKEN" ]; then
          ./gradlew sonar --no-daemon \
            -Dsonar.projectKey=healthdata-platform \
            -Dsonar.organization=healthdata \
            -Dsonar.host.url=$SONAR_HOST_URL
        else
          echo "SonarQube token not configured, skipping scan"
        fi
      continue-on-error: true

  security-report:
    runs-on: ubuntu-latest
    needs: [codeql-scanning, dependency-check, trivy-fs-scanning, npm-audit, gradle-dependency-check, secret-scanning]
    if: always()

    steps:
    - name: Generate Security Summary
      run: |
        echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- CodeQL Scanning: ${{ needs.codeql-scanning.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Trivy FS Scanning: ${{ needs.trivy-fs-scanning.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- NPM Audit: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Gradle Dependency Check: ${{ needs.gradle-dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Secret Scanning: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Scan completed on: $(date)" >> $GITHUB_STEP_SUMMARY
