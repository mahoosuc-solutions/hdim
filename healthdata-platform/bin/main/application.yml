spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: healthdata-platform

  # Single Database Configuration
  # ⚠️ SECURITY: Database credentials MUST be provided via environment variables
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthdata}
    username: ${SPRING_DATASOURCE_USERNAME:healthdata}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        default_schema: public
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false

  liquibase:
    enabled: false
    # Temporarily disabled due to SQL syntax errors in migration scripts
    # change-log: classpath:db/changelog/db.changelog-master.xml
    # default-schema: public

  # Caching Configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m
    cache-names:
      - patients
      - measures
      - caregaps
      - fhir-resources

  # Security Configuration
  # ⚠️ SECURITY: JWT secret MUST be provided via environment variable in production
  # Generate with: openssl rand -base64 32
  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration: 900000 # 15 minutes
      refresh-expiration: 604800000 # 7 days

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false

  # WebSocket Configuration
  websocket:
    message-broker:
      relay-host: localhost
      relay-port: 61613
      client-login: guest
      client-passcode: guest
      system-login: guest
      system-passcode: guest

  # Task Execution
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 1000
    scheduling:
      pool:
        size: 4

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans,conditions,modulith
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Logging Configuration
logging:
  level:
    root: INFO
    com.healthdata: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.modulith: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Spring Modulith Configuration
spring.modulith:
  verify:
    enabled: false  # Disable architectural verification for development/testing
  events:
    jdbc:
      enabled: true
    completion:
      enabled: true
  runtime:
    observability:
      enabled: true

# Application-Specific Configuration
healthdata:
  # FHIR Configuration
  fhir:
    server-base: ${FHIR_SERVER_BASE:http://localhost:8080/fhir}
    terminology-server: ${TERMINOLOGY_SERVER:http://localhost:8080/terminology}

  # Quality Measures Configuration
  quality:
    measures:
      cache-ttl: 3600
      batch-size: 100
      parallel-execution: true
      max-threads: 8

  # Care Gap Configuration
  caregap:
    auto-close:
      enabled: true
      grace-period-days: 30
    priority-calculation:
      enabled: true
      refresh-interval: 86400

  # Notification Configuration
  notification:
    channels:
      email:
        enabled: ${EMAIL_ENABLED:false}
        from: noreply@healthdata.com
        template-path: classpath:templates/email/
      sms:
        enabled: ${SMS_ENABLED:false}
        provider: ${SMS_PROVIDER:twilio}
      push:
        enabled: ${PUSH_ENABLED:false}
    batch:
      size: 100
      delay-ms: 1000
    retry:
      max-attempts: 3
      backoff-ms: 5000

  # CQL Engine Configuration
  cql:
    cache:
      libraries: true
      valuesets: true
      ttl: 3600
    execution:
      timeout-seconds: 30
      parallel: true

  # Batch Processing Configuration
  batch:
    core-pool-size: 16
    max-pool-size: 32
    queue-capacity: 1000
    thread-prefix: batch-

  # Feature Flags
  features:
    real-time-updates: true
    batch-processing: true
    audit-logging: true
    mental-health-assessments: true
    risk-stratification: true
    predictive-analytics: false
    ai-recommendations: false

# Environment-Specific Overrides
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/healthdata

---
spring:
  config:
    activate:
      on-profile: production
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: false
  cache:
    caffeine:
      spec: maximumSize=50000,expireAfterWrite=10m

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/healthdata_test
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop