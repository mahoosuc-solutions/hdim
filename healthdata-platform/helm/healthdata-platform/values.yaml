# HealthData Platform Helm Chart Values
# Default values for healthdata-platform

# Number of replicas
replicaCount: 3

# Image configuration
image:
  repository: healthdata/platform
  pullPolicy: IfNotPresent
  tag: "2.0.0"

# Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# Override names
nameOverride: ""
fullnameOverride: ""

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: http
  annotations: {}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
  hosts:
    - host: healthdata.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: healthdata-tls
      hosts:
        - healthdata.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
    ephemeral-storage: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 30

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  # maxUnavailable: 1

# Probes configuration
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Volume configuration
volumes:
  tmp:
    sizeLimit: 500Mi
  appTmp:
    sizeLimit: 500Mi
  appLogs:
    sizeLimit: 1Gi
  cache:
    sizeLimit: 1Gi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - healthdata-platform
          topologyKey: kubernetes.io/hostname

# Application configuration
application:
  profile: production
  name: healthdata-platform

  # JVM configuration
  jvm:
    memory:
      initial: 512m
      maximum: 2048m
    options: |
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:+UseStringDeduplication
      -XX:+ParallelRefProcEnabled
      -XX:+UseContainerSupport
      -XX:MaxRAMPercentage=75.0

# Database configuration
database:
  host: healthdata-postgres
  port: 5432
  name: healthdata
  user: healthdata
  # Password should be provided via secrets
  # password: ""
  hikari:
    maximumPoolSize: 20
    minimumIdle: 5
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000

# Redis configuration
redis:
  enabled: true
  host: healthdata-redis
  port: 6379
  # Password should be provided via secrets
  # password: ""
  timeout: 60000
  cache:
    ttl: 3600000

# Kafka configuration
kafka:
  enabled: true
  bootstrapServers: healthdata-kafka:9092
  consumer:
    groupId: healthdata-platform
    autoOffsetReset: earliest

# Security configuration
security:
  jwt:
    expiration: 86400000
    refreshExpiration: 604800000
    # Secret should be provided via secrets
    # secret: ""

# Actuator configuration
actuator:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    showDetails: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    com:
      healthdata: DEBUG
    org:
      springframework:
        web: INFO
      hibernate: WARN

# Init containers
initContainers:
  waitForPostgres:
    enabled: true
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z {{ .Values.database.host }} {{ .Values.database.port }}; do echo waiting for postgres; sleep 2; done;']
  waitForRedis:
    enabled: true
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z {{ .Values.redis.host }} {{ .Values.redis.port }}; do echo waiting for redis; sleep 2; done;']

# Network Policy
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

# RBAC configuration
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get"]

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

# External secrets (if using external secrets operator)
externalSecrets:
  enabled: false
  backend: vault
  # vaultMountPoint: secret
  # vaultRole: healthdata-platform
