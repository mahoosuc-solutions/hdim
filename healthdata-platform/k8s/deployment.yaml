---
# HealthData Platform Main Application Deployment
# Production-ready deployment with best practices

apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthdata-platform
  namespace: healthdata
  labels:
    app: healthdata-platform
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/instance: healthdata-platform-prod
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: healthdata-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "HealthData Platform - Main Application Deployment"
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: healthdata-platform
      app.kubernetes.io/name: healthdata-platform
      app.kubernetes.io/component: application
  template:
    metadata:
      labels:
        app: healthdata-platform
        app.kubernetes.io/name: healthdata-platform
        app.kubernetes.io/instance: healthdata-platform-prod
        app.kubernetes.io/version: "2.0.0"
        app.kubernetes.io/component: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        kubectl.kubernetes.io/restartedAt: ""
    spec:
      serviceAccountName: healthdata
      automountServiceAccountToken: true

      # Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Init containers for health checks
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z healthdata-postgres 5432; do echo waiting for postgres; sleep 2; done;']
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z healthdata-redis 6379; do echo waiting for redis; sleep 2; done;']
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

      # Main application container
      containers:
      - name: healthdata-platform
        image: healthdata/platform:2.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: healthdata-config

        # Sensitive environment variables from Secrets
        env:
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: healthdata-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: healthdata-secrets
              key: jwt-secret
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: healthdata-secrets
              key: redis-password
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # Resource limits and requests
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
            ephemeral-storage: 2Gi

        # Liveness probe - checks if application is alive
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe - checks if application is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # Startup probe - for slow-starting applications
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30

        # Lifecycle hooks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

        # Security context at container level
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-tmp
          mountPath: /app/tmp
        - name: app-logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/cache
        - name: app-config
          mountPath: /app/config
          readOnly: true

      # Volumes
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 500Mi
      - name: app-tmp
        emptyDir:
          sizeLimit: 500Mi
      - name: app-logs
        emptyDir:
          sizeLimit: 1Gi
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      - name: app-config
        configMap:
          name: healthdata-app-config
          optional: true

      # DNS configuration
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30

      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          # Prefer not to schedule on the same node
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - healthdata-platform
              topologyKey: kubernetes.io/hostname

          # In multi-zone setup, prefer different zones
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - healthdata-platform
              topologyKey: topology.kubernetes.io/zone

      # Tolerations for node taints (if using dedicated nodes)
      tolerations:
      - key: "healthdata-workload"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      # Node selector (if using labeled nodes)
      nodeSelector:
        # Uncomment if you have specific node labels
        # workload-type: application
        # environment: production
