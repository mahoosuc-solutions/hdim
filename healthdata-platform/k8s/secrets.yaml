---
# HealthData Platform Secrets
# IMPORTANT: In production, use external secret management (Vault, AWS Secrets Manager, etc.)
# This file should be encrypted with tools like sealed-secrets or SOPS

apiVersion: v1
kind: Secret
metadata:
  name: healthdata-secrets
  namespace: healthdata
  labels:
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: configuration
type: Opaque
stringData:
  # Database credentials
  db-password: "REPLACE_WITH_SECURE_PASSWORD"
  db-user: "healthdata"

  # JWT configuration
  jwt-secret: "REPLACE_WITH_SECURE_JWT_SECRET_AT_LEAST_256_BITS"

  # Redis password
  redis-password: "REPLACE_WITH_SECURE_REDIS_PASSWORD"

  # Kafka credentials (if authentication enabled)
  kafka-username: "healthdata"
  kafka-password: "REPLACE_WITH_SECURE_KAFKA_PASSWORD"

---
# Database connection string secret
apiVersion: v1
kind: Secret
metadata:
  name: healthdata-db-connection
  namespace: healthdata
  labels:
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: database
type: Opaque
stringData:
  connection-string: "jdbc:postgresql://healthdata-postgres:5432/healthdata"

---
# TLS Certificate Secret (for HTTPS)
# This would typically be managed by cert-manager in production
apiVersion: v1
kind: Secret
metadata:
  name: healthdata-tls
  namespace: healthdata
  labels:
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # In production, use cert-manager to automatically provision these
  tls.crt: ""
  tls.key: ""
