---
# HealthData Platform Service Account
# Used by pods for Kubernetes API access

apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthdata
  namespace: healthdata
  labels:
    app: healthdata-platform
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: rbac
automountServiceAccountToken: true

---
# Role for application-specific permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: healthdata-role
  namespace: healthdata
  labels:
    app: healthdata-platform
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: rbac
rules:
# Allow reading ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Allow reading Secrets (limited)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["healthdata-secrets", "healthdata-db-connection"]

# Allow reading Services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

# Allow reading Endpoints for service discovery
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]

# Allow reading own Pod information
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

# Allow reading Events for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding to bind the Role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healthdata-rolebinding
  namespace: healthdata
  labels:
    app: healthdata-platform
    app.kubernetes.io/name: healthdata-platform
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: healthdata-role
subjects:
- kind: ServiceAccount
  name: healthdata
  namespace: healthdata

---
