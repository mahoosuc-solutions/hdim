# Alertmanager Configuration for HealthData Platform
# Production-grade alert routing and notification

# ======================== Global Configuration =========================
global:
  # Time to wait before sending notifications after an alert is resolved
  resolve_timeout: 5m

  # Slack configuration
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # PagerDuty configuration
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

  # SMTP configuration for email alerts
  smtp_smarthost: '${SMTP_HOST:smtp.gmail.com}:${SMTP_PORT:587}'
  smtp_from: 'alerts@healthdata-platform.io'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # VictorOps configuration
  victorops_api_url: 'https://alert.victorops.com/integrations/generic/20131114/alert/'

  # Opsgenie configuration
  opsgenie_api_url: 'https://api.opsgenie.com/'

# ======================== Templates ====================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ======================== Route Configuration ==========================
route:
  # Default receiver for alerts
  receiver: 'default'

  # Grouping configuration
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 10s          # Wait before sending the first notification
  group_interval: 10s      # Wait before sending notifications about new alerts in a group
  repeat_interval: 12h     # Repeat notifications for firing alerts

  # Child routes (evaluated in order)
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: critical
      group_wait: 0s
      repeat_interval: 5m
      continue: true  # Continue to other routes

    # Database alerts
    - match:
        component: database
      receiver: database-team
      group_wait: 30s
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: database-oncall
          repeat_interval: 15m

    # Application alerts
    - match:
        component: application
      receiver: application-team
      group_wait: 30s
      repeat_interval: 1h

    # JVM alerts
    - match:
        component: jvm
      receiver: application-team
      group_wait: 1m
      repeat_interval: 2h

    # Cache alerts (Redis)
    - match:
        component: cache
      receiver: infrastructure-team
      group_wait: 1m
      repeat_interval: 1h

    # Messaging alerts (Kafka)
    - match:
        component: messaging
      receiver: infrastructure-team
      group_wait: 1m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: infrastructure-oncall

    # Business metrics alerts
    - match:
        business: quality
      receiver: business-alerts
      group_wait: 5m
      repeat_interval: 1h

    - match:
        business: caregaps
      receiver: business-alerts
      group_wait: 5m
      repeat_interval: 1h

    # System resource alerts
    - match:
        component: system
      receiver: infrastructure-team
      group_wait: 2m
      repeat_interval: 2h

    # Kubernetes alerts
    - match:
        component: kubernetes
      receiver: devops-team
      group_wait: 1m
      repeat_interval: 1h

    # Deployment alerts
    - match:
        component: deployment
      receiver: devops-team
      group_wait: 30s
      repeat_interval: 30m

    # Security alerts
    - match_re:
        alertname: '.*[Ss]ecurity.*'
      receiver: security-team
      group_wait: 0s
      repeat_interval: 15m

    # Warning alerts (lower priority)
    - match:
        severity: warning
      receiver: warnings
      group_wait: 5m
      repeat_interval: 1h

# ======================== Inhibit Rules ================================
# Rules to suppress notifications when other alerts are firing
inhibit_rules:
  # If ApplicationDown is firing, don't alert on HighErrorRate for the same service
  - source_match:
      alertname: 'ApplicationDown'
    target_match:
      alertname: 'HighErrorRate'
    equal: ['job', 'instance']

  # If PostgreSQLDown is firing, don't alert on connection issues
  - source_match:
      alertname: 'PostgreSQLDown'
    target_match:
      component: 'database'
    equal: ['database', 'instance']

  # If critical alert is firing, suppress warnings
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']

  # If KafkaDown, suppress lag alerts
  - source_match:
      alertname: 'KafkaDown'
    target_match:
      alertname: 'HighKafkaConsumerLag'
    equal: ['instance']

  # If node is down, suppress all alerts from that node
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      component: '.*'
    equal: ['instance']

# ======================== Receivers ====================================
receivers:
  # Default receiver - low priority alerts
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        username: 'AlertManager'
        icon_emoji: ':warning:'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  # Critical alerts - immediate action required
  - name: 'critical'
    slack_configs:
      - channel: '#critical-alerts'
        username: 'AlertManager - CRITICAL'
        icon_emoji: ':rotating_light:'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}*Service:* {{ .Labels.service }}\n*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'danger'

    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        description: '{{ .GroupLabels.alertname }}: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        severity: 'critical'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          num_firing: '{{ .Alerts.Firing | len }}'

    email_configs:
      - to: 'critical-alerts@healthdata-platform.io'
        from: 'alerts@healthdata-platform.io'
        headers:
          Subject: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Alert Fired</h2>
          {{ range .Alerts }}
          <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
          <p><strong>Service:</strong> {{ .Labels.service }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Runbook:</strong> <a href="{{ .Annotations.runbook_url }}">{{ .Annotations.runbook_url }}</a></p>
          <hr>
          {{ end }}
        send_resolved: true

  # Database team
  - name: 'database-team'
    slack_configs:
      - channel: '#database-alerts'
        username: 'Database Alerts'
        icon_emoji: ':database:'
        title: 'Database Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

    email_configs:
      - to: 'database-team@healthdata-platform.io'
        from: 'alerts@healthdata-platform.io'
        headers:
          Subject: 'Database Alert: {{ .GroupLabels.alertname }}'

  # Database on-call (critical only)
  - name: 'database-oncall'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_DB_KEY}'
        description: 'CRITICAL Database Alert: {{ .GroupLabels.alertname }}'
        severity: 'critical'

  # Application team
  - name: 'application-team'
    slack_configs:
      - channel: '#application-alerts'
        username: 'Application Alerts'
        icon_emoji: ':gear:'
        title: 'Application Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

  # Infrastructure team
  - name: 'infrastructure-team'
    slack_configs:
      - channel: '#infrastructure-alerts'
        username: 'Infrastructure Alerts'
        icon_emoji: ':cloud:'
        title: 'Infrastructure Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

  # Infrastructure on-call
  - name: 'infrastructure-oncall'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_INFRA_KEY}'
        description: 'CRITICAL Infrastructure Alert: {{ .GroupLabels.alertname }}'

  # DevOps team
  - name: 'devops-team'
    slack_configs:
      - channel: '#devops-alerts'
        username: 'DevOps Alerts'
        icon_emoji: ':rocket:'
        title: 'DevOps Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

  # Business alerts (for quality metrics, care gaps, etc.)
  - name: 'business-alerts'
    slack_configs:
      - channel: '#business-metrics'
        username: 'Business Metrics'
        icon_emoji: ':chart_with_upwards_trend:'
        title: '📊 Business Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

    email_configs:
      - to: 'business-team@healthdata-platform.io'
        from: 'alerts@healthdata-platform.io'
        headers:
          Subject: 'Business Metrics Alert: {{ .GroupLabels.alertname }}'

  # Security team
  - name: 'security-team'
    slack_configs:
      - channel: '#security-alerts'
        username: 'Security Alerts'
        icon_emoji: ':lock:'
        title: '🔒 Security Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true
        color: 'danger'

    pagerduty_configs:
      - service_key: '${PAGERDUTY_SECURITY_KEY}'
        description: 'Security Alert: {{ .GroupLabels.alertname }}'
        severity: 'critical'

    email_configs:
      - to: 'security-team@healthdata-platform.io'
        from: 'alerts@healthdata-platform.io'
        headers:
          Subject: '🔒 SECURITY ALERT: {{ .GroupLabels.alertname }}'

  # Warnings - lower priority
  - name: 'warnings'
    slack_configs:
      - channel: '#warnings'
        username: 'Warning Alerts'
        icon_emoji: ':warning:'
        title: '⚠️  WARNING: {{ .GroupLabels.alertname }}'
        send_resolved: true
        color: 'warning'

# ======================== Time Intervals ===============================
# Define time intervals for notification suppression
time_intervals:
  - name: business-hours
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '17:00'
        weekdays: ['monday:friday']

  - name: off-hours
    time_intervals:
      - times:
          - start_time: '17:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
      - weekdays: ['saturday', 'sunday']

  - name: weekends
    time_intervals:
      - weekdays: ['saturday', 'sunday']
