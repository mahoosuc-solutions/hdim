# Kibana Configuration for HealthData Platform
# Production-grade log visualization and analysis

# ======================== Kibana Configuration =========================

# ---------------------------------- Server ----------------------------------
server.name: healthdata-kibana
server.host: "0.0.0.0"
server.port: 5601
server.basePath: ""
server.rewriteBasePath: false
server.publicBaseUrl: "https://kibana.healthdata-platform.io"

# Maximum payload size
server.maxPayloadBytes: 1048576

# Compression
server.compression.enabled: true

# -------------------------------- Elasticsearch ------------------------------
elasticsearch.hosts: ["http://elasticsearch:9200"]
elasticsearch.username: "${ELASTIC_USER:elastic}"
elasticsearch.password: "${ELASTIC_PASSWORD:changeme}"

# Elasticsearch request timeout
elasticsearch.requestTimeout: 30000
elasticsearch.shardTimeout: 30000
elasticsearch.pingTimeout: 30000

# SSL/TLS (disabled for internal network)
elasticsearch.ssl.verificationMode: none

# ---------------------------------- Kibana -----------------------------------
# Default application
kibana.defaultAppId: "discover"

# Index pattern
kibana.index: ".kibana"

# Auto complete timeout
kibana.autocompleteTimeout: 1000

# Auto complete max results
kibana.autocompleteTerminateAfter: 100000

# ---------------------------------- Logging ----------------------------------
logging:
  appenders:
    default:
      type: console
      layout:
        type: pattern
        pattern: "[%date][%level][%logger] %message"
    file:
      type: file
      fileName: /var/log/kibana/kibana.log
      layout:
        type: json

  root:
    appenders: [default, file]
    level: info

  loggers:
    - name: elasticsearch
      level: warn
    - name: http.server.response
      level: warn
    - name: metrics.ops
      level: warn

# -------------------------------- Monitoring ---------------------------------
monitoring.enabled: true
monitoring.kibana.collection.enabled: true
monitoring.kibana.collection.interval: 30000
monitoring.ui.enabled: true
monitoring.ui.container.elasticsearch.enabled: true

# -------------------------------- X-Pack -------------------------------------
# Security
xpack.security.enabled: true
xpack.security.encryptionKey: "${KIBANA_ENCRYPTION_KEY:a-32-character-long-encryption-key}"
xpack.security.session.idleTimeout: "1h"
xpack.security.session.lifespan: "30d"

# Audit logging
xpack.security.audit.enabled: true

# Reporting
xpack.reporting.enabled: true
xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY:a-32-character-long-encryption-key}"
xpack.reporting.kibanaServer.hostname: "localhost"
xpack.reporting.kibanaServer.port: 5601
xpack.reporting.queue.timeout: 120000
xpack.reporting.capture.browser.chromium.disableSandbox: true

# Alerting
xpack.alerting.enabled: true
xpack.alerting.healthCheck.interval: "60s"

# Actions
xpack.actions.enabled: true
xpack.actions.preconfigured:
  email-healthdata-alerts:
    actionTypeId: .email
    name: 'HealthData Alerts Email'
    config:
      service: 'gmail'
      from: 'kibana@healthdata-platform.io'
      host: 'smtp.gmail.com'
      port: 587
      secure: false
    secrets:
      user: "${SMTP_USER}"
      password: "${SMTP_PASSWORD}"

# Machine Learning
xpack.ml.enabled: true

# Canvas
xpack.canvas.enabled: true

# Maps
xpack.maps.enabled: true
xpack.maps.showMapVisualizationTypes: true

# APM
xpack.apm.enabled: true
xpack.apm.ui.enabled: true

# Uptime
xpack.uptime.enabled: true

# Infra
xpack.infra.enabled: true
xpack.infra.sources.default.logAlias: "healthdata-*"
xpack.infra.sources.default.metricAlias: "metricbeat-*"

# Logs
xpack.logs.enabled: true

# -------------------------------- Advanced -----------------------------------
# Field formatters
savedObjects.maxImportPayloadBytes: 10485760

# Telemetry
telemetry.enabled: false
telemetry.optIn: false

# Usage collection
xpack.usageCollection.enabled: false

# Newsfeed
newsfeed.enabled: false

# -------------------------------- Custom -------------------------------------
# Index patterns for HealthData Platform
healthdata.indexPatterns:
  - "healthdata-*"
  - "healthdata-audit-*"
  - "healthdata-security-*"
  - "healthdata-metrics-*"

# Default time range
healthdata.defaultTimeRange: "Last 24 hours"

# Retention policy (aligned with Elasticsearch ILM)
healthdata.retention.days: 30

# Dashboard refresh intervals
healthdata.refreshIntervals: ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"]

# -------------------------------- Performance --------------------------------
# Response headers
server.customResponseHeaders:
  X-Frame-Options: "SAMEORIGIN"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"

# Compression
server.compression.referrerWhitelist: []

# Request timeout
elasticsearch.requestHeadersWhitelist: ["authorization"]

# Health check
status.allowAnonymous: true

# -------------------------------- Spaces -------------------------------------
xpack.spaces.enabled: true
xpack.spaces.maxSpaces: 100

# -------------------------------- Notifications ------------------------------
xpack.notifications.connectors:
  - id: slack-healthdata
    name: "HealthData Slack Alerts"
    actionTypeId: .slack
    config:
      webhookUrl: "${SLACK_WEBHOOK_URL}"

# -------------------------------- Index Patterns -----------------------------
# Auto-create index patterns
xpack.index_management.enabled: true
xpack.index_lifecycle_management.enabled: true

# -------------------------------- Saved Objects ------------------------------
# Saved object encryption
xpack.encryptedSavedObjects.encryptionKey: "${SAVED_OBJECTS_KEY:a-32-character-long-encryption-key}"

# -------------------------------- Data Views ---------------------------------
data.search.aggs.shardDelay.enabled: true
data.search.sessions.enabled: true
