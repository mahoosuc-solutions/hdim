# Logstash Configuration for HealthData Platform
# Production-grade log processing pipeline

# ============================================================
# INPUT PLUGINS
# ============================================================
input {
  # TCP input for application logs (JSON format)
  tcp {
    port => 5000
    codec => json_lines
    type => "application"
    tags => ["healthdata", "application"]
  }

  # TCP input for structured logs
  tcp {
    port => 5001
    codec => json
    type => "structured"
    tags => ["healthdata", "structured"]
  }

  # Beats input (Filebeat, Metricbeat, etc.)
  beats {
    port => 5044
    type => "beats"
    tags => ["healthdata", "beats"]
  }

  # Kafka input for event streaming
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["application-logs", "audit-logs", "error-logs"]
    codec => json
    group_id => "logstash-healthdata"
    consumer_threads => 4
    type => "kafka"
    tags => ["healthdata", "kafka"]
  }

  # HTTP input for webhook-based logs
  http {
    port => 8080
    codec => json
    type => "webhook"
    tags => ["healthdata", "webhook"]
  }

  # Syslog input
  syslog {
    port => 5514
    type => "syslog"
    tags => ["healthdata", "syslog"]
  }

  # Kubernetes logs (if using K8s)
  kubernetes {
    type => "kubernetes"
    tags => ["healthdata", "k8s"]
  }
}

# ============================================================
# FILTER PLUGINS
# ============================================================
filter {
  # Add common metadata
  mutate {
    add_field => {
      "[@metadata][index_name]" => "healthdata-%{+YYYY.MM.dd}"
      "[@metadata][pipeline]" => "healthdata-platform"
      "platform" => "healthdata"
      "environment" => "${ENVIRONMENT:prod}"
    }
  }

  # Parse application logs
  if [type] == "application" {
    # Grok pattern for standard Spring Boot logs
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
      }
      tag_on_failure => ["_grokparsefailure_application"]
    }

    # Parse timestamp
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
      timezone => "UTC"
    }

    # Extract additional fields from logger
    if [logger] {
      grok {
        match => {
          "logger" => "com\.healthdata\.%{DATA:service_name}\.%{GREEDYDATA:class_name}"
        }
        tag_on_failure => ["_grokparsefailure_logger"]
      }
    }

    # Tag errors and warnings
    if [level] == "ERROR" or [level] == "WARN" {
      mutate {
        add_tag => ["alert", "needs_attention"]
      }
    }

    # Tag critical errors
    if [level] == "ERROR" and [log_message] =~ /(?i)(exception|error|failed|fatal)/ {
      mutate {
        add_tag => ["critical"]
        add_field => {
          "alert_severity" => "critical"
        }
      }
    }
  }

  # Parse structured JSON logs
  if [type] == "structured" {
    # JSON is already parsed by codec
    # Add service-specific enrichment
    if [service] {
      mutate {
        add_field => {
          "service_category" => "%{service}"
        }
      }
    }
  }

  # Parse Kubernetes logs
  if [type] == "kubernetes" {
    # Extract pod metadata
    if [kubernetes][pod][name] {
      mutate {
        add_field => {
          "pod_name" => "%{[kubernetes][pod][name]}"
          "namespace" => "%{[kubernetes][namespace]}"
          "container" => "%{[kubernetes][container][name]}"
        }
      }
    }
  }

  # Parse HTTP access logs
  if [type] == "webhook" or [http_method] {
    grok {
      match => {
        "message" => "%{COMBINEDAPACHELOG}"
      }
      tag_on_failure => ["_grokparsefailure_http"]
    }

    # Extract response time if present
    if [response_time] {
      mutate {
        convert => {
          "response_time" => "integer"
        }
      }
    }

    # Tag slow requests
    if [response_time] and [response_time] > 1000 {
      mutate {
        add_tag => ["slow_request"]
      }
    }

    # Tag HTTP errors
    if [status] and [status] >= 400 {
      mutate {
        add_tag => ["http_error"]
      }
    }
  }

  # Enrich with GeoIP for remote addresses
  if [remote_addr] or [client_ip] {
    geoip {
      source => "remote_addr"
      target => "geoip"
      database => "/usr/share/logstash/GeoLite2-City.mmdb"
      fields => ["city_name", "country_name", "location", "region_name"]
    }
  }

  # Extract user agent information
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # Parse audit logs
  if "audit" in [tags] {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "healthdata-audit-%{+YYYY.MM.dd}"
      }
    }

    # Add compliance flags
    if [action] =~ /(?i)(PHI|PII|HIPAA)/ {
      mutate {
        add_tag => ["compliance_sensitive"]
      }
    }
  }

  # Parse security logs
  if "security" in [tags] {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "healthdata-security-%{+YYYY.MM.dd}"
      }
    }

    # Tag failed authentication
    if [event] =~ /(?i)(failed|denied|unauthorized)/ {
      mutate {
        add_tag => ["security_alert", "failed_auth"]
      }
    }
  }

  # Parse performance metrics
  if [type] == "metric" {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "healthdata-metrics-%{+YYYY.MM.dd}"
      }
    }

    # Convert numeric fields
    mutate {
      convert => {
        "duration" => "float"
        "cpu_usage" => "float"
        "memory_usage" => "float"
      }
    }
  }

  # Drop debug logs in production
  if "${ENVIRONMENT:prod}" == "prod" and [level] == "DEBUG" {
    drop { }
  }

  # Clean up unnecessary fields
  mutate {
    remove_field => ["[@metadata][timestamp]", "beat", "prospector", "input", "offset", "source"]
  }

  # Add fingerprint for deduplication
  fingerprint {
    source => ["message", "timestamp", "logger"]
    target => "[@metadata][fingerprint]"
    method => "SHA256"
    key => "healthdata-platform"
  }
}

# ============================================================
# OUTPUT PLUGINS
# ============================================================
output {
  # Primary output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    user => "${ELASTIC_USER:elastic}"
    password => "${ELASTIC_PASSWORD:changeme}"
    document_id => "%{[@metadata][fingerprint]}"

    # ILM settings
    ilm_enabled => true
    ilm_rollover_alias => "healthdata-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "healthdata-logs-policy"

    # Template settings
    template_name => "healthdata-logs"
    template_overwrite => true
    manage_template => true

    # Performance tuning
    pool_max => 512
    pool_max_per_route => 256
  }

  # Send critical alerts to Kafka for real-time processing
  if "critical" in [tags] {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id => "critical-alerts"
      codec => json
      compression_type => "snappy"
    }
  }

  # Send security alerts to dedicated topic
  if "security_alert" in [tags] {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id => "security-alerts"
      codec => json
      compression_type => "snappy"
    }
  }

  # Email alerts for critical errors
  if "critical" in [tags] and [level] == "ERROR" {
    email {
      to => "alerts@healthdata-platform.io"
      from => "logstash@healthdata-platform.io"
      subject => "CRITICAL Alert: %{service} - %{level}"
      body => "Service: %{service}\nLevel: %{level}\nLogger: %{logger}\nMessage: %{log_message}\nTimestamp: %{timestamp}\n\nFull Log:\n%{message}"
      address => "${SMTP_HOST:smtp.gmail.com}"
      port => "${SMTP_PORT:587}"
      username => "${SMTP_USER}"
      password => "${SMTP_PASSWORD}"
      use_tls => true
    }
  }

  # Send metrics to InfluxDB for time-series analysis
  if [type] == "metric" {
    influxdb {
      host => "influxdb"
      port => 8086
      db => "healthdata_metrics"
      measurement => "application_metrics"
      send_as_tags => ["service", "environment", "host"]
      data_points => {
        "value" => "%{metric_value}"
      }
    }
  }

  # Debug output to file (disabled in production)
  if "${ENVIRONMENT:prod}" != "prod" {
    file {
      path => "/var/log/logstash/debug-%{+YYYY-MM-dd}.log"
      codec => json_lines
    }
  }

  # Send to S3 for long-term archival
  s3 {
    region => "${AWS_REGION:us-east-1}"
    bucket => "healthdata-logs-archive"
    prefix => "logs/%{+YYYY}/%{+MM}/%{+dd}/"
    codec => json_lines
    time_file => 15
    size_file => 104857600  # 100MB
    canned_acl => "private"
    encoding => "gzip"
    rotation_strategy => "size_and_time"
  }

  # Monitoring output
  if [type] == "monitoring" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => ".monitoring-logstash-%{+YYYY.MM.dd}"
      user => "${ELASTIC_USER:elastic}"
      password => "${ELASTIC_PASSWORD:changeme}"
    }
  }

  # Console output for debugging (disabled in production)
  # stdout {
  #   codec => rubydebug {
  #     metadata => true
  #   }
  # }
}
