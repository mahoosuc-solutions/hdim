apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-credentials
  namespace: hdim-production
  labels:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: hdim-platform
  annotations:
    # This secret is populated from .env.alertmanager via:
    #   kubectl create secret generic alertmanager-credentials \
    #     --from-env-file=monitoring/.env.alertmanager \
    #     -n hdim-production
    #
    # DO NOT store real credentials in this file.
    # This file is a schema reference only — all values are placeholders.
    hdim.io/secret-source: env-file
    hdim.io/env-file: monitoring/.env.alertmanager
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
  PAGERDUTY_INTEGRATION_KEY: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
  PAGERDUTY_SECURITY_KEY: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
  PAGERDUTY_COMPLIANCE_KEY: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
  EMAIL_USERNAME: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
  EMAIL_PASSWORD: "PLACEHOLDER_CONFIGURE_BEFORE_DEPLOY"
