apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base kustomization for HDIM Platform
# Contains only base resources - secrets and configmaps
# Infrastructure and services are referenced directly from overlays

resources:
  - secrets.yaml
  - configmap.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: hdim-platform
