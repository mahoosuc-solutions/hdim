---
apiVersion: v1
kind: Namespace
metadata:
  name: hdim
  labels:
    app.kubernetes.io/name: hdim
    app.kubernetes.io/part-of: hdim-platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hdim-quota
  namespace: hdim
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hdim-limits
  namespace: hdim
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      type: Container
