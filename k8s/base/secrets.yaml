---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-db-credentials
  namespace: hdim
  labels:
    app.kubernetes.io/part-of: hdim-platform
type: Opaque
stringData:
  POSTGRES_USER: healthdata
  POSTGRES_PASSWORD: healthdata_dev_password
  POSTGRES_DB: healthdata_db
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthdata_db
  SPRING_DATASOURCE_USERNAME: healthdata
  SPRING_DATASOURCE_PASSWORD: healthdata_dev_password
---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-redis-credentials
  namespace: hdim
  labels:
    app.kubernetes.io/part-of: hdim-platform
type: Opaque
stringData:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-kafka-credentials
  namespace: hdim
  labels:
    app.kubernetes.io/part-of: hdim-platform
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-jwt-credentials
  namespace: hdim
  labels:
    app.kubernetes.io/part-of: hdim-platform
type: Opaque
stringData:
  JWT_SECRET: hdim-development-jwt-secret-key-change-in-production-minimum-256-bits
  JWT_EXPIRATION_MS: "86400000"
  JWT_REFRESH_EXPIRATION_MS: "604800000"
