# =============================================================================
# Vault Kubernetes Auth - ServiceAccount and RBAC
# =============================================================================
# These resources allow HDIM pods to authenticate with Vault using their
# Kubernetes ServiceAccount JWT, eliminating the need for static credentials.
#
# Setup:
#   1. Deploy this manifest: kubectl apply -f vault-serviceaccount.yaml
#   2. Run Vault init with ENABLE_K8S_AUTH=true
#   3. Inject VAULT_ADDR and VAULT_ROLE into pod environment
#   4. Use vault-agent sidecar OR Spring Cloud Vault for secret retrieval
# =============================================================================

# ServiceAccount for all HDIM backend services
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hdim-services
  namespace: hdim
  annotations:
    # Vault Kubernetes auth uses this SA's JWT to authenticate pods
    vault.hashicorp.com/role: "hdim-backend"

# ServiceAccount for CI/CD jobs (GitHub Actions, etc.)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hdim-cicd
  namespace: hdim

# ClusterRole: allows Vault to validate ServiceAccount tokens
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hdim-vault-token-reviewer
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts", "serviceaccounts/token"]
    verbs: ["get", "create"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]

# Bind the Vault reviewer role to the hdim-services SA
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hdim-vault-token-reviewer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hdim-vault-token-reviewer
subjects:
  - kind: ServiceAccount
    name: hdim-services
    namespace: hdim
