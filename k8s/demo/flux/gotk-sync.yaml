apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hdim
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/mahoosuc-solutions/hdim.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hdim-demo
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: hdim
  path: ./k8s/demo
  prune: true
  wait: true
  timeout: 10m
