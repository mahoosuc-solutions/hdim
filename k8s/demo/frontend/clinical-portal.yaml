apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-portal
  labels:
    app: clinical-portal
    app.kubernetes.io/part-of: hdim-platform
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clinical-portal
  template:
    metadata:
      labels:
        app: clinical-portal
        tier: frontend
    spec:
      containers:
        - name: clinical-portal
          image: ghcr.io/mahoosuc-solutions/hdim/clinical-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clinical-portal
  labels:
    app: clinical-portal
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: clinical-portal
