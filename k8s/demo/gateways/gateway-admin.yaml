apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-admin-service
  labels:
    app: gateway-admin-service
    app.kubernetes.io/part-of: hdim-platform
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-admin-service
  template:
    metadata:
      labels:
        app: gateway-admin-service
        tier: gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["gateway-admin-service"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway-admin-service
          image: ghcr.io/mahoosuc-solutions/hdim/gateway-admin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-gateway-db
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          env:
            - name: OTEL_SERVICE_NAME
              value: gateway-admin-service
            - name: HEALTH_TENANT_ID
              value: service-health-gateway-admin
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true -Dsun.net.inetaddr.ttl=60 -Dsun.net.inetaddr.negative.ttl=0"
            - name: AUTHENTICATION_COOKIE_SECURE
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-admin-service
  labels:
    app: gateway-admin-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gateway-admin-service
