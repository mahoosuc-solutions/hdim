apiVersion: v1
kind: Namespace
metadata:
  name: hdim-demo
  labels:
    app.kubernetes.io/name: hdim-demo
    app.kubernetes.io/part-of: hdim-platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hdim-demo-quota
  namespace: hdim-demo
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hdim-demo-limits
  namespace: hdim-demo
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      type: Container
