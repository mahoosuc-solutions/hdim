apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-query-service
  labels:
    app: audit-query-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-query-service
  template:
    metadata:
      labels:
        app: audit-query-service
        tier: core
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["audit-query-service"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: audit-query-service
          image: ghcr.io/mahoosuc-solutions/hdim/audit-query-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          env:
            - name: OTEL_SERVICE_NAME
              value: audit-query-service
            - name: HEALTH_TENANT_ID
              value: service-health-audit-query
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/audit_db
            - name: HEALTHDATA_PERSISTENCE_PRIMARY_URL
              value: jdbc:postgresql://postgres:5432/audit_db
            - name: HEALTHDATA_PERSISTENCE_PRIMARY_USERNAME
              value: healthdata
            - name: HEALTHDATA_PERSISTENCE_PRIMARY_PASSWORD
              value: demo_password_2024
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
---
apiVersion: v1
kind: Service
metadata:
  name: audit-query-service
  labels:
    app: audit-query-service
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: 8088
  selector:
    app: audit-query-service
