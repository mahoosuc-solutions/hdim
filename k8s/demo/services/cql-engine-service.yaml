apiVersion: apps/v1
kind: Deployment
metadata:
  name: cql-engine-service
  labels:
    app: cql-engine-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cql-engine-service
  template:
    metadata:
      labels:
        app: cql-engine-service
        tier: core
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["cql-engine-service"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cql-engine-service
          image: ghcr.io/mahoosuc-solutions/hdim/cql-engine-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          env:
            - name: OTEL_SERVICE_NAME
              value: cql-engine-service
            - name: HEALTH_TENANT_ID
              value: service-health-cql-engine
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/cql_engine_db
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /cql-engine/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /cql-engine/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
---
apiVersion: v1
kind: Service
metadata:
  name: cql-engine-service
  labels:
    app: cql-engine-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: cql-engine-service
