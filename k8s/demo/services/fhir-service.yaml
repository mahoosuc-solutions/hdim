apiVersion: apps/v1
kind: Deployment
metadata:
  name: fhir-service
  labels:
    app: fhir-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fhir-service
  template:
    metadata:
      labels:
        app: fhir-service
        tier: core
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["fhir-service"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: fhir-service
          image: ghcr.io/mahoosuc-solutions/hdim/fhir-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          env:
            - name: OTEL_SERVICE_NAME
              value: fhir-service
            - name: HEALTH_TENANT_ID
              value: service-health-fhir
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/fhir_db
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=85.0 -XX:InitialRAMPercentage=40.0 -XX:+UseG1GC"
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          livenessProbe:
            httpGet:
              path: /fhir/actuator/health/liveness
              port: 8085
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /fhir/actuator/health/readiness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fhir-service
  labels:
    app: fhir-service
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: fhir-service
