apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcc-service
  labels:
    app: hcc-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hcc-service
  template:
    metadata:
      labels:
        app: hcc-service
        tier: core
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["hcc-service"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: hcc-service
          image: ghcr.io/mahoosuc-solutions/hdim/hcc-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8105
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          env:
            - name: OTEL_SERVICE_NAME
              value: hcc-service
            - name: HEALTH_TENANT_ID
              value: service-health-hcc
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/hcc_db
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.net.preferIPv4Stack=true"
            - name: HCC_MODEL_V24_WEIGHT
              value: "0.33"
            - name: HCC_MODEL_V28_WEIGHT
              value: "0.67"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /hcc/actuator/health/liveness
              port: 8105
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /hcc/actuator/health/readiness
              port: 8105
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hcc-service
  labels:
    app: hcc-service
spec:
  type: ClusterIP
  ports:
    - port: 8105
      targetPort: 8105
  selector:
    app: hcc-service
