# Replica count for pilot environment
# Single replica per service to minimize cost during pilot.
# PDBs are not applied in pilot (no HA requirement during POC).
# Upgrade to replicas: 2 before converting pilot → production.

# Gateway - single but ready to scale
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1

---
apiVersion: apps/v1
