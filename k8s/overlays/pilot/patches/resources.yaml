# Resource limits for pilot environment
# Conservative sizing: enough for a single customer's production workload
# with ~5,000 attributed members. Scale up before GA.

# Gateway Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  template:
    spec:
      containers:
        - name: gateway-service
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

