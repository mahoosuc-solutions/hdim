# Replica count patch for production environment
# Multiple replicas for high availability
# Note: HPA will override these as minReplicas

# Gateway Service - primary entry point, 3 replicas
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: hdim
spec:
  replicas: 3

# FHIR Service - high traffic, 3 replicas
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fhir-service
  namespace: hdim
spec:
  replicas: 3

