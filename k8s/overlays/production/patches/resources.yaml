# Resource limits patch for production environment
# Higher resources for production workloads

# Gateway Service - production resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: hdim
spec:
  template:
    spec:
      containers:
        - name: gateway-service
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"

