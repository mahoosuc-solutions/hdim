# Rolling update strategy patch for production environment
# Ensures zero-downtime deployments across all services

# Gateway Service - max 1 unavailable (critical entry point)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: hdim
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

