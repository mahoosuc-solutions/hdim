# ServiceAccount patch for production environment
# Associates all HDIM pods with hdim-services ServiceAccount
# This enables Vault Kubernetes auth (pod-level secret access with no static credentials)

# Gateway Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: hdim
spec:
  template:
    spec:
      serviceAccountName: hdim-services

