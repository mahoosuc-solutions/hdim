# Pod Disruption Budgets for production
# Ensures high availability during node maintenance and updates

# Gateway Service PDB - critical entry point
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-service-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway-service

# FHIR Service PDB - critical data service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fhir-service-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fhir-service

