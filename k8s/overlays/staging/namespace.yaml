---
apiVersion: v1
kind: Namespace
metadata:
  name: hdim-staging
  labels:
    app.kubernetes.io/name: hdim
    app.kubernetes.io/part-of: hdim-platform
    environment: staging
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hdim-staging-quota
  namespace: hdim-staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hdim-staging-limits
  namespace: hdim-staging
spec:
  limits:
    - default:
        cpu: "300m"
        memory: "384Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      type: Container
