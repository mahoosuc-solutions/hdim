# Resource limits patch for staging environment
# Lower resources for cost-effective staging deployment

# Gateway Service - reduced resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: hdim
spec:
  template:
    spec:
      containers:
        - name: gateway-service
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

