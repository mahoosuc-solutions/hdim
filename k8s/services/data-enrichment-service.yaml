---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-enrichment-service
  namespace: hdim
  labels:
    app: data-enrichment-service
    app.kubernetes.io/part-of: hdim-platform
    tier: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-enrichment-service
  template:
    metadata:
      labels:
        app: data-enrichment-service
        tier: data
    spec:
      containers:
        - name: data-enrichment-service
          image: hdim/data-enrichment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-enrichment-service
  namespace: hdim
  labels:
    app: data-enrichment-service
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
  selector:
    app: data-enrichment-service
