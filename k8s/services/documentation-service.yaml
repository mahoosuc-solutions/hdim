---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentation-service
  namespace: hdim
  labels:
    app: documentation-service
    app.kubernetes.io/part-of: hdim-platform
    tier: support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: documentation-service
  template:
    metadata:
      labels:
        app: documentation-service
        tier: support
    spec:
      containers:
        - name: documentation-service
          image: hdim/documentation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8091
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8091
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: documentation-service
  namespace: hdim
  labels:
    app: documentation-service
spec:
  type: ClusterIP
  ports:
    - port: 8091
      targetPort: 8091
  selector:
    app: documentation-service
