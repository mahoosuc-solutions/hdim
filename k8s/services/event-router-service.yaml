---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-router-service
  namespace: hdim
  labels:
    app: event-router-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-router-service
  template:
    metadata:
      labels:
        app: event-router-service
        tier: core
    spec:
      containers:
        - name: event-router-service
          image: hdim/event-router-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8095
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8095
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8095
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: event-router-service
  namespace: hdim
  labels:
    app: event-router-service
spec:
  type: ClusterIP
  ports:
    - port: 8095
      targetPort: 8095
  selector:
    app: event-router-service
