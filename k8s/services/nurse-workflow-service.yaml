---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nurse-workflow-service
  namespace: hdim
  labels:
    app: nurse-workflow-service
    app.kubernetes.io/part-of: hdim-platform
    tier: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nurse-workflow-service
  template:
    metadata:
      labels:
        app: nurse-workflow-service
        tier: core
    spec:
      containers:
        - name: nurse-workflow-service
          image: hdim/nurse-workflow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8093
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /nurse-workflow/actuator/health/liveness
              port: 8093
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /nurse-workflow/actuator/health/readiness
              port: 8093
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nurse-workflow-service
  namespace: hdim
  labels:
    app: nurse-workflow-service
spec:
  type: ClusterIP
  ports:
    - port: 8093
      targetPort: 8093
  selector:
    app: nurse-workflow-service
