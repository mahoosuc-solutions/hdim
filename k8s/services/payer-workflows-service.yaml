---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payer-workflows-service
  namespace: hdim
  labels:
    app: payer-workflows-service
    app.kubernetes.io/part-of: hdim-platform
    tier: workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payer-workflows-service
  template:
    metadata:
      labels:
        app: payer-workflows-service
        tier: workflow
    spec:
      containers:
        - name: payer-workflows-service
          image: hdim/payer-workflows-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8098
          envFrom:
            - configMapRef:
                name: hdim-common-config
            - configMapRef:
                name: hdim-service-urls
            - secretRef:
                name: hdim-db-credentials
            - secretRef:
                name: hdim-redis-credentials
            - secretRef:
                name: hdim-kafka-credentials
            - secretRef:
                name: hdim-jwt-credentials
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8098
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8098
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payer-workflows-service
  namespace: hdim
  labels:
    app: payer-workflows-service
spec:
  type: ClusterIP
  ports:
    - port: 8098
      targetPort: 8098
  selector:
    app: payer-workflows-service
