apiVersion: v1
kind: ConfigMap
metadata:
  name: hdim-common-config
  namespace: hdim-production
  labels:
    app.kubernetes.io/name: hdim
    app.kubernetes.io/version: "1.6.0"
data:
  # Spring Profiles
  SPRING_PROFILES_ACTIVE: "production,k8s"

  # HIPAA Compliance - Cache TTL (5 minutes max for PHI)
  SPRING_CACHE_REDIS_TIME_TO_LIVE: "300000"

  # Logging
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_HEALTHDATA: "INFO"

  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when_authorized"

  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"

  # Service URLs (internal K8s DNS)
  FHIR_SERVICE_URL: "http://fhir-service:8085/fhir"
  CQL_ENGINE_SERVICE_URL: "http://cql-engine-service:8081/cql-engine"
  PATIENT_SERVICE_URL: "http://patient-service:8084/patient"
  QUALITY_MEASURE_SERVICE_URL: "http://quality-measure-service:8087/quality-measure"
  CARE_GAP_SERVICE_URL: "http://care-gap-service:8086/care-gap"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdim-redis-config
  namespace: hdim-production
data:
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  # HIPAA: Redis cache TTL must be <= 5 minutes for PHI
  SPRING_CACHE_REDIS_TIME_TO_LIVE: "300000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdim-kafka-config
  namespace: hdim-production
data:
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
