# HDIM Kubernetes Secrets Template
#
# WARNING: This is a TEMPLATE file. Do not commit actual secrets to git!
#
# Usage:
#   1. Copy this file: cp secrets-template.yaml secrets.yaml
#   2. Replace placeholder values with base64-encoded secrets
#   3. Apply: kubectl apply -f secrets.yaml
#   4. Delete the file: rm secrets.yaml
#
# To encode a value: echo -n "your-secret" | base64
# To decode a value: echo "encoded-secret" | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: hdim-db-credentials
  namespace: hdim-production
  labels:
    app.kubernetes.io/name: hdim
    compliance: hipaa
type: Opaque
data:
  # Base64 encoded values - REPLACE THESE
  username: aGVhbHRoZGF0YQ==  # healthdata
  password: REPLACE_WITH_BASE64_ENCODED_PASSWORD

  # Database URLs (base64 encoded)
  # jdbc:postgresql://postgres:5432/cql_db
  cql-engine-db-url: REPLACE_WITH_BASE64_ENCODED_URL
  fhir-db-url: REPLACE_WITH_BASE64_ENCODED_URL
  patient-db-url: REPLACE_WITH_BASE64_ENCODED_URL
  quality-measure-db-url: REPLACE_WITH_BASE64_ENCODED_URL

---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-jwt-secret
  namespace: hdim-production
  labels:
    app.kubernetes.io/name: hdim
    compliance: hipaa
type: Opaque
data:
  # JWT Secret (minimum 256 bits / 32 characters)
  # Generate with: openssl rand -base64 32
  secret: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET

---
apiVersion: v1
kind: Secret
metadata:
  name: hdim-redis-credentials
  namespace: hdim-production
type: Opaque
data:
  password: REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD

---
# Example: How to create secrets using kubectl
#
# kubectl create secret generic hdim-db-credentials \
#   --namespace=hdim-production \
#   --from-literal=username=healthdata \
#   --from-literal=password=your-secure-password \
#   --from-literal=cql-engine-db-url="jdbc:postgresql://postgres:5432/cql_db"
#
# kubectl create secret generic hdim-jwt-secret \
#   --namespace=hdim-production \
#   --from-literal=secret=$(openssl rand -base64 32)
