apiVersion: v1
kind: ConfigMap
metadata:
  name: cql-engine-config
  labels:
    app: cql-engine-service
    component: backend
data:
  # Database configuration
  database.url: "jdbc:postgresql://postgres-service:5432/healthdata_cql"
  database.driver: "org.postgresql.Driver"
  database.platform: "org.hibernate.dialect.PostgreSQLDialect"

  # Redis configuration
  redis.host: "redis-service"
  redis.port: "6379"
  redis.database: "0"
  redis.timeout: "2000"

  # Kafka configuration
  kafka.bootstrap-servers: "kafka-service:9092"
  kafka.topic.audit: "cql-audit-events"
  kafka.topic.evaluation: "cql-evaluation-results"
  kafka.consumer-group: "cql-engine-service"

  # FHIR service configuration
  fhir.service.url: "http://fhir-service:8080/fhir"
  fhir.service.timeout: "30000"

  # Thread pool configuration
  thread-pool.core-size: "10"
  thread-pool.max-size: "50"
  thread-pool.queue-capacity: "500"

  # Caching configuration
  cache.ttl.measures: "3600"
  cache.ttl.valuesets: "7200"
  cache.ttl.libraries: "3600"
  cache.max-size: "10000"

  # Logging configuration
  logging.level.root: "INFO"
  logging.level.com.healthdata: "DEBUG"
  logging.level.org.springframework: "INFO"
  logging.level.org.hibernate: "WARN"

  # Actuator configuration
  management.endpoints.web.exposure.include: "health,info,metrics,prometheus"
  management.health.livenessstate.enabled: "true"
  management.health.readinessstate.enabled: "true"

  # Application configuration
  app.name: "CQL Engine Service"
  app.version: "1.0.0"
  app.description: "HEDIS Quality Measure Evaluation Service"
