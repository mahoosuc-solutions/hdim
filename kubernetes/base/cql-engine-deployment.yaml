apiVersion: apps/v1
kind: Deployment
metadata:
  name: cql-engine-service
  labels:
    app: cql-engine-service
    component: backend
    tier: application
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: cql-engine-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cql-engine-service
        component: backend
        tier: application
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: cql-engine-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: cql-engine
        image: healthdata/cql-engine-service:1.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        - name: management
          containerPort: 8081
          protocol: TCP

        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: SERVER_PORT
          value: "8081"

        # Database configuration
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: cql-engine-config
              key: database.url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: cql-engine-secrets
              key: database.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cql-engine-secrets
              key: database.password

        # Redis configuration
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cql-engine-config
              key: redis.host
        - name: SPRING_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cql-engine-config
              key: redis.port
        - name: SPRING_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cql-engine-secrets
              key: redis.password
              optional: true

        # Kafka configuration
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: cql-engine-config
              key: kafka.bootstrap-servers

        # FHIR service configuration
        - name: FHIR_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cql-engine-config
              key: fhir.service.url

        # Thread pool configuration
        - name: MEASURE_EVALUATION_CORE_POOL_SIZE
          value: "10"
        - name: MEASURE_EVALUATION_MAX_POOL_SIZE
          value: "50"
        - name: MEASURE_EVALUATION_QUEUE_CAPACITY
          value: "500"

        # JVM configuration
        - name: JAVA_OPTS
          value: >-
            -XX:+UseContainerSupport
            -XX:MaxRAMPercentage=75.0
            -XX:InitialRAMPercentage=50.0
            -XX:+UseG1GC
            -XX:+ExitOnOutOfMemoryError
            -XX:+HeapDumpOnOutOfMemoryError
            -XX:HeapDumpPath=/app/logs/heapdump.hprof
            -Djava.security.egd=file:/dev/./urandom

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 12

        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cql-engine-service
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
