apiVersion: v1
kind: Secret
metadata:
  name: cql-engine-secrets
  labels:
    app: cql-engine-service
    component: backend
type: Opaque
stringData:
  # Database credentials
  # IMPORTANT: Replace these with actual values before deploying
  database.username: "healthdata"
  database.password: "CHANGE_ME_IN_PRODUCTION"

  # Redis password (optional)
  redis.password: ""

  # FHIR service credentials
  fhir.service.username: "fhir-user"
  fhir.service.password: "CHANGE_ME_IN_PRODUCTION"

  # JWT secret for API authentication
  jwt.secret: "CHANGE_ME_TO_A_LONG_RANDOM_STRING_IN_PRODUCTION"

  # Encryption key for sensitive data
  encryption.key: "CHANGE_ME_TO_A_32_CHAR_KEY_IN_PROD"
---
# Note: In production, use external secret management:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Azure Key Vault
# - Google Secret Manager
#
# Example using External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: cql-engine-secrets
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: cql-engine-secrets
#     creationPolicy: Owner
#   data:
#   - secretKey: database.password
#     remoteRef:
#       key: healthdata/cql-engine/database
#       property: password
