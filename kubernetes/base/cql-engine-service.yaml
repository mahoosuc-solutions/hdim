apiVersion: v1
kind: Service
metadata:
  name: cql-engine-service
  labels:
    app: cql-engine-service
    component: backend
    tier: application
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app: cql-engine-service
  ports:
  - name: http
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: management
    port: 8081
    targetPort: 8081
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
