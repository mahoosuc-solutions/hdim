apiVersion: v1
kind: ServiceAccount
metadata:
  name: cql-engine-service
  labels:
    app: cql-engine-service
    component: backend
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cql-engine-role
  labels:
    app: cql-engine-service
    component: backend
rules:
# Allow reading ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Allow reading Secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

# Allow reading Pods (for service discovery)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

# Allow reading Services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cql-engine-rolebinding
  labels:
    app: cql-engine-service
    component: backend
subjects:
- kind: ServiceAccount
  name: cql-engine-service
roleRef:
  kind: Role
  name: cql-engine-role
  apiGroup: rbac.authorization.k8s.io
