apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: cql-engine-production

namespace: healthdata-prod

commonLabels:
  environment: production
  app.kubernetes.io/version: "1.0.0"

bases:
  - ../base

resources:
  - namespace.yaml

images:
  - name: healthdata/cql-engine-service
    newName: ghcr.io/your-org/healthdata-in-motion/cql-engine-service
    newTag: 1.0.0

replicas:
  - name: cql-engine-service
    count: 5

patches:
  # Increase production replicas
  - target:
      kind: HorizontalPodAutoscaler
      name: cql-engine-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 20

  # Production resource limits
  - target:
      kind: Deployment
      name: cql-engine-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi

  # Production ingress host
  - target:
      kind: Ingress
      name: cql-engine-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.healthdata-in-motion.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.healthdata-in-motion.com

  # Stricter PDB for production
  - target:
      kind: PodDisruptionBudget
      name: cql-engine-pdb
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 3

configMapGenerator:
  - name: cql-engine-env-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=production
      - LOGGING_LEVEL_COM_HEALTHDATA_CQL=INFO
      - MEASURE_EVALUATION_MAX_POOL_SIZE=100
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError

generatorOptions:
  disableNameSuffixHash: true
