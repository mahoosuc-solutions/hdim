apiVersion: v1
kind: Namespace
metadata:
  name: healthdata-prod
  labels:
    name: healthdata-prod
    environment: production
    istio-injection: enabled
  annotations:
    scheduler.alpha.kubernetes.io/node-selector: "workload-type=production"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: healthdata-prod
spec:
  hard:
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "3"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: healthdata-prod
spec:
  limits:
  - max:
      cpu: "8"
      memory: 16Gi
    min:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: "1"
      memory: 1Gi
    defaultRequest:
      cpu: 500m
      memory: 512Mi
    type: Container
