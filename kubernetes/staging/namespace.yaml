apiVersion: v1
kind: Namespace
metadata:
  name: healthdata-staging
  labels:
    name: healthdata-staging
    environment: staging
    istio-injection: enabled
  annotations:
    scheduler.alpha.kubernetes.io/node-selector: "workload-type=staging"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: healthdata-staging
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: healthdata-staging
spec:
  limits:
  - max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: 50m
      memory: 64Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
