name: Render Remotion Videos

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Which composition to render'
        required: true
        type: choice
        options:
          - all
          - 60s
          - 90s
          - 120s
        default: '90s'
  push:
    branches:
      - main
    paths:
      - 'remotion/**'
  schedule:
    # Render weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'remotion/package-lock.json'

      - name: Install dependencies
        working-directory: remotion
        run: npm ci

      - name: Install Playwright browsers
        working-directory: remotion
        run: npx playwright install --with-deps chromium

      - name: Render videos
        working-directory: remotion
        env:
          COMPOSITION: ${{ inputs.composition }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$COMPOSITION" = "all" ] || [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            npm run render:all
          else
            npm run "render:$COMPOSITION"
          fi

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remotion-videos-${{ github.run_number }}
          path: remotion/out/*.mp4
          retention-days: 30

      - name: Copy videos to public folder (on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          cd remotion
          npm run copy:videos

      - name: Commit updated videos (on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/videos/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update Remotion videos [skip ci]"
          git push
