<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#21cbf3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="400" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Hex Network Icon (scaled) -->
  <g transform="translate(100, 165) scale(3)">
    <rect width="100" height="100" rx="18" fill="none"/>
    <polygon
      points="50,12 83,31 83,69 50,88 17,69 17,31"
      fill="none"
      stroke="#2196f3"
      stroke-width="3"
      stroke-linejoin="round"/>
    <line x1="50" y1="34" x2="32" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>
    <line x1="50" y1="34" x2="68" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>
    <line x1="32" y1="65" x2="68" y2="65" stroke="#21cbf3" stroke-width="1.8" opacity="0.7"/>
    <circle cx="50" cy="34" r="5" fill="#21cbf3"/>
    <circle cx="32" cy="65" r="5" fill="#2196f3"/>
    <circle cx="68" cy="65" r="5" fill="#2196f3"/>
    <path d="M 59,16 Q 68,10 77,20" fill="none" stroke="#21cbf3" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- HDIM Text -->
  <text x="480" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">HDIM</text>

  <!-- Tagline -->
  <text x="480" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#93c5fd">Healthcare Quality Measurement Platform</text>

  <!-- Description -->
  <text x="480" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">Real-time HEDIS measures | Care gap detection | FHIR R4</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="60" y="617" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#93c5fd">healthdatainmotion.com</text>

  <!-- Accent line -->
  <rect x="480" y="350" width="120" height="3" rx="1.5" fill="url(#hex-grad)"/>
</svg>
