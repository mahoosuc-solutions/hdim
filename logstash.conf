input {
  # TCP input for JSON logs
  tcp {
    port => 5000
    codec => json
    type => "application"
  }

  # UDP input for syslog
  udp {
    port => 5000
    type => "syslog"
  }
}

filter {
  # Parse JSON if input is JSON
  if [@metadata][type] == "json" {
    mutate {
      add_field => { "[@metadata][parsed]" => true }
    }
  }

  # Parse syslog format
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGLINE}" }
    }
  }

  # Extract service name from fields or message
  if [fields][service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{[fields][service]}" }
    }
  } else if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][service]" => "unknown" }
    }
  }

  # Set index prefix based on service
  mutate {
    add_field => { "[@metadata][index_prefix]" => "%{[@metadata][service]}" }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Add environment metadata
  mutate {
    add_field => {
      "environment" => "production"
      "deployment" => "docker"
    }
  }

  # Tag errors and warnings
  if [level] =~ /ERROR|FATAL|EXCEPTION/ {
    mutate {
      add_tag => [ "error", "alert" ]
    }
  } else if [level] =~ /WARN/ {
    mutate {
      add_tag => [ "warning" ]
    }
  }

  # Remove null fields
  mutate {
    remove_field => [ "[@metadata][type]" ]
  }
}

output {
  # Index logs in Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    action => "index"
    document_type => "_doc"
  }

  # Also output to stdout for debugging (remove in production)
  # stdout {
  #   codec => rubydebug
  # }
}
