# nginx reverse proxy for MCP Edge TLS termination
# Deploy this in front of the MCP Edge sidecars for production HTTPS.
#
# Usage:
#   1. Place TLS certs at /etc/ssl/mcp-edge/{cert,key}.pem
#   2. Include this config in your nginx.conf
#   3. Sidecars remain HTTP-only on internal ports (3100/3200/3300)
#
# Architecture:
#   Client --[HTTPS]--> nginx :443 --[HTTP]--> sidecar :3100
#
# This avoids TLS overhead inside the container network while encrypting
# all external traffic. Standard pattern for healthcare deployments.

upstream mcp_platform {
    server mcp-edge-platform:3100;
    keepalive 32;
}

upstream mcp_devops {
    server mcp-edge-devops:3200;
    keepalive 32;
}

upstream mcp_clinical {
    server mcp-edge-clinical:3300;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name mcp.healthdatainmotion.com;

    ssl_certificate     /etc/ssl/mcp-edge/cert.pem;
    ssl_certificate_key /etc/ssl/mcp-edge/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS (HIPAA §164.312(e)(1) — transmission security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Platform sidecar
    location /platform/ {
        proxy_pass http://mcp_platform/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # DevOps sidecar
    location /devops/ {
        proxy_pass http://mcp_devops/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Clinical sidecar
    location /clinical/ {
        proxy_pass http://mcp_clinical/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name mcp.healthdatainmotion.com;
    return 301 https://$host$request_uri;
}
