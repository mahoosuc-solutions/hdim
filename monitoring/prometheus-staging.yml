# Prometheus Configuration for Staging Environment
# Scrapes metrics from all services and infrastructure components
# Retention: 30 days (configured in docker-compose)

global:
  # Scrape interval for all targets (default)
  scrape_interval: 15s
  # How long to wait for scrape requests
  scrape_timeout: 10s
  # How often to evaluate alert rules
  evaluation_interval: 15s
  # External labels attached to all time series
  external_labels:
    environment: 'staging'
    cluster: 'sales-agent-services'

# Load alerting rules
rule_files:
  - '/etc/prometheus/rules.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'alertmanager:9093'

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================================
  # Application Services (Python/FastAPI)
  # ============================================================================

  # AI Sales Agent Service
  - job_name: 'ai-sales-agent'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['ai-sales-agent:8090']
        labels:
          service: 'ai-sales-agent'
          instance_type: 'api'

  # Live Call Sales Agent Service
  - job_name: 'live-call-sales-agent'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['live-call-sales-agent:8095']
        labels:
          service: 'live-call-sales-agent'
          instance_type: 'api'

  # ============================================================================
  # Infrastructure Components
  # ============================================================================

  # PostgreSQL exporter metrics (via pg_stat_statements, if exposed)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
          instance_type: 'database'

  # Redis exporter (if available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          instance_type: 'cache'

  # ============================================================================
  # Observability Stack
  # ============================================================================

  # Jaeger collector metrics
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'jaeger'
          instance_type: 'tracing'

  # Grafana (if metrics exposed)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
          instance_type: 'dashboard'

  # ============================================================================
  # Service Discovery (Docker containers)
  # ============================================================================

  # Docker daemon (optional - if monitoring Docker host)
  - job_name: 'docker'
    static_configs:
      - targets: ['unix:///var/run/docker.sock']
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
      - source_labels: [__meta_docker_image_name]
        target_label: image

  # ============================================================================
  # Node Exporter (if monitoring host machine)
  # ============================================================================

  # Host system metrics (enable if node_exporter runs on host)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         instance_type: 'host'

# ============================================================================
# Notes
# ============================================================================

# Scrape Intervals by Service:
# - Application APIs: 15s (balanced observability)
# - Infrastructure: 15s
# - Slow targets: 30s (to reduce load)
# - Fast targets: 5s (for critical metrics)

# Metrics Retention:
# - Configured in docker-compose.staging.sales-agents.yml
# - Command: --storage.tsdb.retention.time=30d

# For enabling additional exporters:
# 1. postgres_exporter: https://github.com/prometheus-community/postgres_exporter
# 2. redis_exporter: https://github.com/oliver006/redis_exporter
# 3. node_exporter: https://github.com/prometheus/node_exporter

# For custom application metrics:
# - Application must expose /metrics endpoint (Prometheus-compatible format)
# - Recommended libraries:
#   - Python: prometheus_client (for FastAPI)
#   - Angular: custom metrics published to backend
