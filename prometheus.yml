# Prometheus Configuration for HealthData Platform
# Global settings
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'healthdata-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Load alert rules
rule_files:
  - '/etc/prometheus/alert-rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Quality-Measure Service
  - job_name: 'quality-measure-service'
    metrics_path: '/quality-measure/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8087']
        labels:
          service: 'quality-measure'
          team: 'backend'

  # CQL Engine Service
  - job_name: 'cql-engine-service'
    metrics_path: '/cql/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8088']
        labels:
          service: 'cql-engine'
          team: 'backend'

  # FHIR Service
  - job_name: 'fhir-service'
    metrics_path: '/fhir/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8089']
        labels:
          service: 'fhir'
          team: 'backend'

  # Health Score Service
  - job_name: 'health-score-service'
    metrics_path: '/health-score/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8090']
        labels:
          service: 'health-score'
          team: 'backend'

  # Clinical Alert Service
  - job_name: 'clinical-alert-service'
    metrics_path: '/alerts/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8091']
        labels:
          service: 'clinical-alert'
          team: 'backend'

  # Notification Service
  - job_name: 'notification-service'
    metrics_path: '/notifications/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8092']
        labels:
          service: 'notification'
          team: 'backend'

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgresql'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service: 'postgres'
          team: 'infrastructure'

  # Redis (via redis_exporter)
  - job_name: 'redis'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9121']
        labels:
          service: 'redis'
          team: 'infrastructure'

  # Kafka (via JMX exporter)
  - job_name: 'kafka'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:5556']
        labels:
          service: 'kafka'
          team: 'infrastructure'

  # Zookeeper (via JMX exporter)
  - job_name: 'zookeeper'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:5557']
        labels:
          service: 'zookeeper'
          team: 'infrastructure'

  # Docker monitoring (via cAdvisor)
  - job_name: 'docker'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'docker'
          team: 'infrastructure'

  # Node Exporter for system metrics
  - job_name: 'node'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node'
          team: 'infrastructure'
